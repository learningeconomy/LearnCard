# Per-PR full-stack preview environment (no Caddy — uses the shared edge proxy)
#
# Usage:
#   PREVIEW_DOMAIN=pr-123.preview.learncard.ai docker compose -p pr-123 -f docker-compose.preview.yaml up --build -d
#
# The shared Caddy edge proxy (docker-compose.edge.yaml) handles TLS and routes
# traffic to this stack's containers by name on the shared "preview-net" network.
# Multiple PR previews can run concurrently on the same host.

services:
    app:
        image: learncard-monorepo-local
        build:
            context: ../
            dockerfile: Dockerfile.monorepo
        expose:
            - 3000
        # Run vite directly (not docker-start) so we can control env vars for the proxy domain
        command: ['sh', '-c', 'cd apps/learn-card-app && pnpm exec vite --host']
        depends_on:
            - brain
            - cloud
            - api
        networks:
            - learn-card
            - preview-net
        extra_hosts:
            - 'localhost:host-gateway'
        environment:
            # These URLs are what the BROWSER uses — they must go through the Caddy proxy
            LCN_URL: https://${PREVIEW_DOMAIN:-localhost}/brain/trpc
            LCN_API_URL: https://${PREVIEW_DOMAIN:-localhost}/brain/api
            CLOUD_URL: https://${PREVIEW_DOMAIN:-localhost}/cloud/trpc
            LEARN_CLOUD_XAPI_URL: https://${PREVIEW_DOMAIN:-localhost}/cloud/xapi
            API_URL: https://${PREVIEW_DOMAIN:-localhost}/lca-api/trpc
            VITE_SSS_SERVER_URL: https://${PREVIEW_DOMAIN:-localhost}/lca-api
            REACT_APP_KEY_DERIVATION_PROVIDER: sss
            REACT_APP_SSS_SERVER_URL: https://${PREVIEW_DOMAIN:-localhost}/lca-api
            SKIP_DIDKIT_NAPI: '1'

    brain:
        image: learncard-monorepo-local
        build:
            context: ../
            dockerfile: Dockerfile.monorepo
        expose:
            - 4000
        command: ['sh', '-c', 'cd services/learn-card-network/brain-service && pnpm dev']
        depends_on:
            neo4j:
                condition: service_healthy
            redis:
                condition: service_started
            elasticmq:
                condition: service_started
            signing:
                condition: service_started
        networks:
            - learn-card
            - preview-net
        extra_hosts:
            - 'localhost:host-gateway'
        environment:
            PORT: 4000
            SEED: a
            IS_OFFLINE: true
            IS_E2E_TEST: true
            SKIP_DIDKIT_NAPI: '1'
            DOMAIN_NAME: ${PREVIEW_DOMAIN:-localhost%3A4000}:brain
            NEO4J_URI: bolt://neo4j:7687
            NEO4J_USERNAME: neo4j
            NEO4J_PASSWORD: this-is-the-password
            REDIS_HOST: redis
            REDIS_PORT: 6379
            AWS_REGION: us-east-1
            AWS_ACCESS_KEY_ID: notARealKey
            AWS_SECRET_ACCESS_KEY: notARealSecretKey
            NOTIFICATIONS_QUEUE_POLL_URL: http://elasticmq:9324/notifications
            NOTIFICATIONS_QUEUE_URL: http://elasticmq:9324/notifications
            SKILL_EMBEDDING_GOOGLE_API_KEY: ''
            SKILL_EMBEDDING_GOOGLE_MODEL: gemini-embedding-001
            APP_STORE_ADMIN_PROFILE_IDS: testa

    cloud:
        image: learncard-monorepo-local
        build:
            context: ../
            dockerfile: Dockerfile.monorepo
        expose:
            - 4100
        command: ['sh', '-c', 'cd services/learn-card-network/learn-cloud-service && pnpm dev']
        depends_on:
            - mongodb
            - redis2
        networks:
            - learn-card
            - preview-net
        extra_hosts:
            - 'localhost:host-gateway'
        environment:
            PORT: 4100
            LEARN_CLOUD_SEED: b
            SKIP_DIDKIT_NAPI: '1'
            LEARN_CLOUD_MONGO_URI: mongodb://mongodb:27017?ssl=false&replicaSet=rs0
            LEARN_CLOUD_MONGO_DB_NAME: learn-cloud
            REDIS_HOST: redis2
            REDIS_PORT: 6379
            XAPI_ENDPOINT: http://lrs:8080/xapi
            XAPI_USERNAME: test-api-key
            XAPI_PASSWORD: test-api-secret
            SERVER_URL: http://cloud:4100
            JWT_SIGNING_KEY: test

    signing:
        image: learncard-monorepo-local
        build:
            context: ../
            dockerfile: Dockerfile.monorepo
        expose:
            - 4200
        command: ['sh', '-c', 'cd services/learn-card-network/simple-signing-service && pnpm dev']
        depends_on:
            - mongodb
            - redis3
        networks:
            - learn-card
        extra_hosts:
            - 'localhost:host-gateway'
        environment:
            PORT: 4200
            IS_OFFLINE: true
            SKIP_DIDKIT_NAPI: '1'
            SEED: c
            AUTHORIZED_DIDS: did:web:${PREVIEW_DOMAIN:-localhost%3A4000}:brain
            MONGO_URI: mongodb://mongodb:27017?ssl=false&replicaSet=rs0
            MONGO_DB_NAME: simple-signing
            REDIS_HOST: redis3
            REDIS_PORT: 6379

    api:
        image: lca-api-service
        build:
            context: ../
            dockerfile: services/learn-card-network/lca-api/Dockerfile
        expose:
            - 5100
        depends_on:
            mongodb:
                condition: service_healthy
            redis3:
                condition: service_started
        networks:
            - learn-card
            - preview-net
        extra_hosts:
            - 'localhost:host-gateway'
        environment:
            PORT: 5100
            IS_OFFLINE: true
            IS_E2E_TEST: true
            SEED: d
            AUTHORIZED_DIDS: did:web:${PREVIEW_DOMAIN:-localhost%3A4000}:brain
            MONGO_URI: mongodb://mongodb:27017?ssl=false&replicaSet=rs0
            MONGO_DB_NAME: lca-api
            REDIS_HOST: redis3
            REDIS_PORT: 6379
            METABASE_SECRET_KEY: test-key

    # --- Infrastructure ---

    neo4j:
        image: neo4j:latest
        healthcheck:
            test: ['CMD-SHELL', 'wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1']
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 30s
        environment:
            NEO4J_AUTH: none
            NEO4J_server_jvm_additional: --add-modules=jdk.incubator.vector
        networks:
            - learn-card

    redis:
        image: redis:alpine
        environment:
            - ALLOW_EMPTY_PASSWORD=yes
            - REDIS_DISABLE_COMMANDS=FLUSHDB,FLUSHALL
        networks:
            - learn-card

    redis2:
        image: redis:alpine
        environment:
            - ALLOW_EMPTY_PASSWORD=yes
            - REDIS_DISABLE_COMMANDS=FLUSHDB,FLUSHALL
        networks:
            - learn-card

    redis3:
        image: redis:alpine
        environment:
            - ALLOW_EMPTY_PASSWORD=yes
            - REDIS_DISABLE_COMMANDS=FLUSHDB,FLUSHALL
        networks:
            - learn-card

    mongodb:
        command: ['--replSet', 'rs0', '--bind_ip_all', '--port', '27017', '--quiet', '--logpath', '/var/log/mongodb/mongod.log']
        image: mongo:latest
        extra_hosts:
            - 'localhost:host-gateway'
        healthcheck:
            test: >
                mongosh --host localhost --port 27017 --quiet --eval "try { rs.status().ok } catch (err) { rs.initiate({_id:'rs0',members:[{_id:0,host:'localhost:27017'}]}) }"
            interval: 5s
            timeout: 30s
            start_period: 0s
            start_interval: 1s
            retries: 30
        networks:
            - learn-card

    elasticmq:
        image: softwaremill/elasticmq-native
        expose:
            - 9324
        networks:
            - learn-card

    postgres:
        image: postgres
        networks:
            - learn-card
        environment:
            POSTGRES_USER: lrsql_user
            POSTGRES_PASSWORD: lrsql_password
            POSTGRES_DB: lrsql_db

    lrs:
        image: yetanalytics/lrsql:latest
        command:
            - /lrsql/bin/run_postgres.sh
        networks:
            - learn-card
        extra_hosts:
            - 'localhost:host-gateway'
        depends_on:
            - postgres
            - cloud
        environment:
            LRSQL_API_KEY_DEFAULT: test-api-key
            LRSQL_API_SECRET_DEFAULT: test-api-secret
            LRSQL_ADMIN_USER_DEFAULT: test_username
            LRSQL_ADMIN_PASS_DEFAULT: test_password
            LRSQL_DB_HOST: postgres
            LRSQL_DB_NAME: lrsql_db
            LRSQL_DB_USER: lrsql_user
            LRSQL_DB_PASSWORD: lrsql_password
            LRSQL_OIDC_ISSUER: http://cloud:4100
            LRSQL_OIDC_AUDIENCE: http://lrs:8080/xapi
            LRSQL_OIDC_SCOPE_PREFIX: 'lrs:'
            LRSQL_POOL_INITIALIZATION_FAIL_TIMEOUT: 10000
            LRSQL_ALLOW_ALL_ORIGINS: true

networks:
    learn-card:
        driver: bridge
    preview-net:
        external: true
