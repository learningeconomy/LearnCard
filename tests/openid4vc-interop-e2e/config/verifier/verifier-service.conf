# Minimum walt.id verifier-api config required for boot.
#
# Mirrors the defaults shipped at:
# https://github.com/walt-id/waltid-identity/blob/main/waltid-services/waltid-verifier-api/config/verifier-service.conf
#
# `baseUrl` MUST match the externally-reachable origin: it's emitted
# in the Authorization Request URL the verifier mints (in particular
# inside `response_uri`/`redirect_uri`), and the holder posts the VP
# token back to that exact URL during direct_post submission.
baseUrl = "http://localhost:7003"

# Placeholder DNS for x509-bound client_id flows. Not used in our
# interop tests (we use the implicit `redirect_uri` client_id binding
# walt.id falls back to), but the verifier requires the field present.
x509SanDnsClientId = "verifier.localhost"
