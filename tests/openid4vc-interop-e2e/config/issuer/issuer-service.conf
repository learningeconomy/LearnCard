# Minimum walt.id issuer-api config required for boot.
#
# Mirrors the defaults shipped at:
# https://github.com/walt-id/waltid-identity/blob/main/waltid-services/waltid-issuer-api/config/issuer-service.conf
#
# `baseUrl` MUST match the externally-reachable origin: the value is
# embedded in `credential_issuer` inside the OID4VCI metadata document,
# and the holder (running on the docker host) calls back to that exact
# URL to fetch metadata, exchange tokens, and request credentials.
baseUrl = "http://localhost:7002"
