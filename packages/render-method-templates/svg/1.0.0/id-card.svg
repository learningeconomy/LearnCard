<svg width="640" height="400" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <clipPath id="photoClip">
      <rect x="40" y="100" width="140" height="140" rx="12"/>
    </clipPath>
    <clipPath id="cardClip">
      <rect width="640" height="400" rx="28"/>
    </clipPath>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#121423;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1e2240;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Card background -->
  <rect width="640" height="400" rx="28" fill="url(#bgGradient)" clip-path="url(#cardClip)"/>

  <!-- Accent bar -->
  <rect x="0" y="0" width="640" height="6" rx="0" fill="url(#accentGradient)"/>

  <!-- LearnCard label -->
  <text x="40" y="50" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#6366f1" letter-spacing="2">LEARNCARD ID</text>

  <!-- Divider -->
  <line x1="40" y1="62" x2="600" y2="62" stroke="#2a2d4a" stroke-width="1"/>

  <!-- Photo placeholder background -->
  <rect x="40" y="100" width="140" height="140" rx="12" fill="#1e2240"/>
  {{#credentialSubject.photo}}
  <image href="{{credentialSubject.photo}}" x="40" y="100" width="140" height="140" clip-path="url(#photoClip)" preserveAspectRatio="xMidYMid slice"/>
  {{/credentialSubject.photo}}
  {{^credentialSubject.photo}}
  <text x="110" y="178" font-family="system-ui, sans-serif" font-size="40" fill="#2a2d4a" text-anchor="middle">?</text>
  {{/credentialSubject.photo}}

  <!-- Name -->
  <text x="210" y="135" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" fill="#ffffff">{{credentialSubject.name}}</text>

  <!-- Achievement / credential name -->
  {{#name}}
  <text x="210" y="165" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#c7c9ff">{{name}}</text>
  {{/name}}

  <!-- Issued by -->
  {{#issuer.name}}
  <text x="210" y="205" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#8b8db8">Issued by</text>
  <text x="210" y="225" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#c7c9ff">{{issuer.name}}</text>
  {{/issuer.name}}

  <!-- Valid from -->
  {{#validFrom}}
  <text x="210" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#6b6d8a">Valid from {{validFrom}}</text>
  {{/validFrom}}

  <!-- Bottom bar -->
  <rect x="0" y="360" width="640" height="40" rx="0" fill="#0d0f1c" opacity="0.6"/>
  <text x="40" y="385" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#6366f1" letter-spacing="1">learncard.com</text>
</svg>
