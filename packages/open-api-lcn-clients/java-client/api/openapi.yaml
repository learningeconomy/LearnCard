openapi: 3.0.3
info:
  description: API for interacting with LearnCloud Network
  title: LearnCloud Network API
  version: 1.0.0
externalDocs:
  url: https://docs.learncard.com
servers:
- url: https://network.learncard.com/api
tags:
- name: Profiles
- name: Profile Managers
- name: Credentials
- name: Boosts
- name: Presentations
- name: Storage
- name: Contracts
- name: DID Metadata
- name: Claim Hooks
- name: Auth Grants
- name: Utilities
paths:
  /boost/send/{profileId}:
    post:
      description: This endpoint sends a boost to a profile
      operationId: boost-sendBoost
      parameters:
      - explode: false
        in: path
        name: profileId
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/boost_sendBoost_request"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                type: string
          description: Successful response
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/error.BAD_REQUEST"
          description: Invalid input data
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/error.UNAUTHORIZED"
          description: Authorization not provided
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/error.FORBIDDEN"
          description: Insufficient access
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/error.INTERNAL_SERVER_ERROR"
          description: Internal server error
      security:
      - Authorization: []
      summary: Send a Boost
      tags:
      - Boosts
      x-content-type: application/json
      x-accepts:
      - application/json
