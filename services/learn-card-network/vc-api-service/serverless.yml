# serverless.yml
#
# Stateless W3C VC-API conformance issuer/verifier. Single did:key issuer derived
# from SEED. No VPC / DB / Redis — this service only signs and verifies.

service: ${env:SERVERLESS_SERVICE_NAME, 'lcn-vc-api-service'}

frameworkVersion: '3'

useDotenv: true

plugins:
    - serverless-esbuild
    - serverless-offline
    - serverless-domain-manager
    - serverless-certificate-creator

custom:
    esbuild:
        # serverless-esbuild does not support Bun as a Lambda artifact packager.
        # Bun remains the repo installer/runner; pnpm is used only for packaging externals.
        packager: pnpm
        plugins: esbuildPlugins.cjs
        bundle: true
        minify: true
        external: ['@learncard/didkit-plugin/dist/didkit_wasm_bg.wasm', 'p-limit']
        exclude: ['aws-sdk']
        sourcemap: external
        target: 'node20'

    domains:
        production:
            hostedZoneName: ${env:SERVERLESS_HOSTED_ZONE_NAMES, 'learncard.com.'}
            domainName: ${env:SERVERLESS_DOMAIN_NAME, 'vc-api.learncard.com'}
            certificateName: ${env:SERVERLESS_DOMAIN_NAME, 'vc-api.learncard.com'}

        dev:
            hostedZoneName: ${env:SERVERLESS_HOSTED_ZONE_NAMES, 'learncard.com.'}
            domainName: ${env:SERVERLESS_DOMAIN_NAME, 'staging.vc-api.learncard.com'}
            certificateName: ${env:SERVERLESS_DOMAIN_NAME, 'staging.vc-api.learncard.com'}

    customCertificate:
        hostedZoneNames: ${self:custom.domains.${self:provider.stage}.hostedZoneName}
        certificateName: ${self:custom.domains.${self:provider.stage}.certificateName}
        region: ${self:provider.region}

    customDomain:
        domainName: ${self:custom.domains.${self:provider.stage}.domainName}
        certificateName: ${self:custom.domains.${self:provider.stage}.certificateName}
        createRoute53Record: true
        autoDomain: true
        basePath: ''
        endpointType: regional
        apiType: http

package:
    individually: true
    patterns:
        - '!node_modules/**'

provider:
    name: aws
    runtime: nodejs20.x
    memorySize: 2048
    timeout: 29
    stage: ${opt:stage, "dev"}
    region: ${opt:region, "us-east-1"}
    environment:
        SEED: ${env:SEED}
    httpApi:
        cors:
            allowedOrigins: '*'
            allowedHeaders: '*'
            allowedMethods: '*'

functions:
    api:
        handler: lambda.handler
        events:
            - httpApi: '*'
