<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>AI Agent Debug</title>
        <style>
            :root {
                --grayscale-900: #18224e;
                --grayscale-800: #353e64;
                --grayscale-700: #52597a;
                --grayscale-600: #6f7590;
                --grayscale-500: #8b91a7;
                --grayscale-400: #a8acbd;
                --grayscale-300: #c5c8d3;
                --grayscale-200: #e2e3e9;
                --grayscale-100: #eff0f5;
                --grayscale-10: #fbfbfc;
                --emerald-50: #ecfdf5;
                --emerald-600: #059669;
                --emerald-700: #047857;
                --red-50: #fef2f2;
                --red-100: #fee2e2;
                --red-700: #b91c1c;
            }

            * {
                box-sizing: border-box;
            }

            body {
                margin: 0;
                min-height: 100vh;
                background: var(--grayscale-100);
                color: var(--grayscale-900);
                font-family: Poppins, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
                    'Segoe UI', sans-serif;
            }

            button,
            input,
            textarea {
                font: inherit;
            }

            .app {
                display: grid;
                grid-template-rows: auto 1fr auto;
                width: min(100%, 920px);
                min-height: 100vh;
                margin: 0 auto;
                background: white;
                border-left: 1px solid var(--grayscale-200);
                border-right: 1px solid var(--grayscale-200);
            }

            header {
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 16px;
                padding: 20px 24px;
                border-bottom: 1px solid var(--grayscale-200);
            }

            h1 {
                margin: 0;
                font-size: 20px;
                font-weight: 600;
                line-height: 1.2;
            }

            .status {
                display: flex;
                align-items: center;
                gap: 8px;
                min-height: 28px;
                color: var(--grayscale-600);
                font-size: 12px;
                white-space: nowrap;
            }

            .status-dot {
                width: 8px;
                height: 8px;
                border-radius: 999px;
                background: var(--grayscale-400);
            }

            .status-dot.ready {
                background: var(--emerald-600);
            }

            main {
                min-height: 0;
                overflow-y: auto;
                padding: 24px;
                background: linear-gradient(180deg, white 0%, var(--grayscale-10) 100%);
            }

            .messages {
                display: flex;
                flex-direction: column;
                gap: 14px;
            }

            .empty {
                display: grid;
                min-height: 45vh;
                place-items: center;
                color: var(--grayscale-500);
                font-size: 14px;
                text-align: center;
            }

            .message {
                max-width: min(74%, 680px);
                padding: 12px 14px;
                border: 1px solid var(--grayscale-200);
                border-radius: 18px;
                color: var(--grayscale-800);
                font-size: 14px;
                line-height: 1.55;
                overflow-wrap: anywhere;
                white-space: pre-wrap;
            }

            .message.user {
                align-self: flex-end;
                background: var(--grayscale-900);
                color: white;
                border-color: var(--grayscale-900);
                border-bottom-right-radius: 6px;
            }

            .message.assistant {
                align-self: flex-start;
                background: white;
                border-bottom-left-radius: 6px;
            }

            .tool-panel {
                align-self: flex-start;
                width: min(74%, 680px);
                border: 1px solid var(--grayscale-200);
                border-radius: 16px;
                background: var(--grayscale-10);
                overflow: hidden;
            }

            .tool-panel summary {
                cursor: pointer;
                padding: 10px 12px;
                color: var(--grayscale-700);
                font-size: 12px;
                font-weight: 500;
            }

            .tool-panel pre {
                max-height: 280px;
                margin: 0;
                overflow: auto;
                padding: 12px;
                border-top: 1px solid var(--grayscale-200);
                color: var(--grayscale-800);
                font-size: 12px;
                line-height: 1.45;
                white-space: pre-wrap;
            }

            .error {
                margin: 0 24px 16px;
                padding: 12px 14px;
                border: 1px solid var(--red-100);
                border-radius: 16px;
                background: var(--red-50);
                color: var(--red-700);
                font-size: 14px;
                line-height: 1.5;
            }

            form {
                display: grid;
                gap: 12px;
                padding: 18px 24px 24px;
                border-top: 1px solid var(--grayscale-200);
                background: white;
            }

            label {
                color: var(--grayscale-700);
                font-size: 12px;
                font-weight: 500;
            }

            .context-fields {
                display: grid;
                gap: 8px;
            }

            .composer {
                display: grid;
                grid-template-columns: 1fr auto;
                gap: 12px;
                align-items: end;
            }

            input,
            textarea {
                width: 100%;
                max-height: 180px;
                resize: vertical;
                padding: 12px 14px;
                border: 1px solid var(--grayscale-300);
                border-radius: 14px;
                background: white;
                color: var(--grayscale-900);
                font-size: 14px;
                line-height: 1.45;
                outline: none;
            }

            input {
                height: 46px;
            }

            textarea {
                min-height: 52px;
            }

            input::placeholder,
            textarea::placeholder {
                color: var(--grayscale-400);
            }

            input:focus,
            textarea:focus {
                border-color: transparent;
                box-shadow: 0 0 0 2px var(--emerald-600);
            }

            button {
                min-width: 96px;
                height: 52px;
                padding: 0 18px;
                border: 0;
                border-radius: 20px;
                background: var(--grayscale-900);
                color: white;
                font-size: 14px;
                font-weight: 500;
                cursor: pointer;
                transition: opacity 160ms ease;
            }

            button:hover {
                opacity: 0.9;
            }

            button:disabled {
                cursor: not-allowed;
                opacity: 0.4;
            }

            .button-content {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                gap: 8px;
            }

            .spinner {
                width: 16px;
                height: 16px;
                border: 2px solid rgba(255, 255, 255, 0.3);
                border-top-color: white;
                border-radius: 999px;
                animation: spin 700ms linear infinite;
            }

            @keyframes spin {
                to {
                    transform: rotate(360deg);
                }
            }

            @media (max-width: 640px) {
                .app {
                    border: 0;
                }

                header,
                main,
                form {
                    padding-left: 16px;
                    padding-right: 16px;
                }

                header {
                    align-items: flex-start;
                    flex-direction: column;
                }

                .message,
                .tool-panel {
                    max-width: 92%;
                }

                .composer {
                    grid-template-columns: 1fr;
                }

                button {
                    width: 100%;
                }
            }
        </style>
    </head>
    <body>
        <div class="app">
            <header>
                <h1>AI Agent Debug</h1>
                <div class="status" id="status">
                    <span class="status-dot" id="status-dot"></span>
                    <span id="status-text">Checking service</span>
                </div>
            </header>

            <main id="scroll-region">
                <div class="messages" id="messages">
                    <div class="empty" id="empty-state">Start a conversation with the agent.</div>
                </div>
            </main>

            <div class="error" id="error" hidden></div>

            <form id="chat-form">
                <div class="context-fields">
                    <label for="did-input">User DID</label>
                    <input
                        id="did-input"
                        name="did"
                        placeholder="did:key:..."
                        autocomplete="off"
                        list="did-options"
                    />
                    <datalist id="did-options"></datalist>
                </div>
                <label for="message-input">Message</label>
                <div class="composer">
                    <textarea
                        id="message-input"
                        name="message"
                        placeholder="Type a message"
                        rows="2"
                        autocomplete="off"
                    ></textarea>
                    <button type="submit" id="send-button">
                        <span class="button-content" id="button-content">Send</span>
                    </button>
                </div>
            </form>
        </div>

        <script>
            const messagesEl = document.getElementById('messages');
            const emptyStateEl = document.getElementById('empty-state');
            const formEl = document.getElementById('chat-form');
            const didEl = document.getElementById('did-input');
            const didOptionsEl = document.getElementById('did-options');
            const inputEl = document.getElementById('message-input');
            const buttonEl = document.getElementById('send-button');
            const buttonContentEl = document.getElementById('button-content');
            const errorEl = document.getElementById('error');
            const scrollRegionEl = document.getElementById('scroll-region');
            const statusDotEl = document.getElementById('status-dot');
            const statusTextEl = document.getElementById('status-text');

            let messages = [];
            let isSending = false;
            const recentDidsKey = 'learnCardAiAgentRecentDids';

            const getRecentDids = () => {
                try {
                    const parsed = JSON.parse(localStorage.getItem(recentDidsKey) ?? '[]');

                    return Array.isArray(parsed)
                        ? parsed.filter(did => typeof did === 'string')
                        : [];
                } catch {
                    return [];
                }
            };

            const renderRecentDids = () => {
                didOptionsEl.innerHTML = '';

                for (const did of getRecentDids()) {
                    const option = document.createElement('option');
                    option.value = did;
                    didOptionsEl.appendChild(option);
                }
            };

            const rememberDid = did => {
                if (!did) return;

                const nextDids = [
                    did,
                    ...getRecentDids().filter(recentDid => recentDid !== did),
                ].slice(0, 8);
                localStorage.setItem(recentDidsKey, JSON.stringify(nextDids));
                renderRecentDids();
            };

            const scrollToBottom = () => {
                scrollRegionEl.scrollTop = scrollRegionEl.scrollHeight;
            };

            const setError = message => {
                errorEl.textContent = message;
                errorEl.hidden = !message;
            };

            const setSending = sending => {
                isSending = sending;
                buttonEl.disabled = sending;
                didEl.disabled = sending;
                inputEl.disabled = sending;
                buttonContentEl.innerHTML = sending
                    ? '<span class="spinner" aria-hidden="true"></span><span>Sending...</span>'
                    : 'Send';
            };

            const renderMessage = message => {
                const el = document.createElement('div');
                el.className = `message ${message.role}`;
                el.textContent = message.content;
                messagesEl.appendChild(el);
            };

            const renderToolRuns = toolRuns => {
                if (!toolRuns.length) return;

                const details = document.createElement('details');
                details.className = 'tool-panel';

                const summary = document.createElement('summary');
                summary.textContent = `${toolRuns.length} tool call${
                    toolRuns.length === 1 ? '' : 's'
                }`;

                const body = document.createElement('pre');
                body.textContent = JSON.stringify(toolRuns, null, 2);

                details.appendChild(summary);
                details.appendChild(body);
                messagesEl.appendChild(details);
            };

            const render = latestToolRuns => {
                messagesEl.innerHTML = '';

                if (messages.length === 0) {
                    messagesEl.appendChild(emptyStateEl);
                    emptyStateEl.hidden = false;
                    return;
                }

                emptyStateEl.hidden = true;

                for (const message of messages) renderMessage(message);
                renderToolRuns(latestToolRuns ?? []);
                scrollToBottom();
            };

            const refreshHealth = async () => {
                try {
                    const response = await fetch('/api/health');
                    const health = await response.json();

                    if (!response.ok || !health.ok) throw new Error('Service is unavailable.');

                    statusDotEl.classList.add('ready');
                    statusTextEl.textContent = health.providerConfigured
                        ? `${health.model} | ${health.tools.join(', ')}`
                        : `Missing OPENAI_API_KEY | ${health.tools.join(', ')}`;
                } catch {
                    statusDotEl.classList.remove('ready');
                    statusTextEl.textContent = 'Service unavailable';
                }
            };

            formEl.addEventListener('submit', async event => {
                event.preventDefault();

                if (isSending) return;

                const content = inputEl.value.trim();
                if (!content) return;
                const did = didEl.value.trim();

                setError('');
                setSending(true);
                rememberDid(did);

                const nextMessages = [...messages, { role: 'user', content }];
                messages = nextMessages;
                inputEl.value = '';
                render();

                try {
                    const response = await fetch('/api/agent/run', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            messages: nextMessages,
                            ...(did ? { did } : {}),
                        }),
                    });
                    const payload = await response.json();

                    if (!response.ok) throw new Error(payload.error ?? 'Something went wrong.');

                    messages = payload.messages;
                    render(payload.toolRuns ?? []);
                } catch (error) {
                    setError(error instanceof Error ? error.message : 'Something went wrong.');
                    render();
                } finally {
                    setSending(false);
                    inputEl.focus();
                }
            });

            refreshHealth();
            renderRecentDids();
            render();
        </script>
    </body>
</html>
