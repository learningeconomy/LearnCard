# serverless.yml

service: ${env:SERVERLESS_SERVICE_NAME, 'lca-api-service'}

frameworkVersion: '3'

useDotenv: true

plugins:
    - serverless-esbuild
    - serverless-domain-manager
    - serverless-certificate-creator
    - serverless-prune-plugin

custom:
    prune:
        automatic: true
        number: 3
    config:
        CACHE_INSTANCE_SIZE: cache.t2.micro
    esbuild:
        # serverless-esbuild does not support Bun as a Lambda artifact packager.
        # Bun remains the repo installer/runner; pnpm is used only for packaging externals.
        packager: pnpm
        plugins: esbuildPlugins.cjs
        bundle: true
        minify: true
        # @learncard/init's default (node.import) entry uses createRequire('./index.cjs'),
        # which esbuild cannot bundle — the emitted Lambda bundle is left with a runtime
        # require('./index.cjs') that does not exist next to the output, so the function
        # throws at init and every route 500s. Point esbuild at init's self-contained
        # bundler ESM build instead. (See LC staging incident 2026-06-11 / PR #1297.)
        alias:
            '@learncard/init': '@learncard/init/dist/init.esm.js'
        external:
            [
                'snappy',
                '@learncard/didkit-plugin/dist/didkit_wasm_bg.wasm',
                '@learncard/didkit-plugin-node/*.node',
            ]
        # didkit-plugin-node ships via the didkitNative Lambda Layer. `exclude` both
        # marks it esbuild-external AND stops the packager from installing a
        # binary-less registry copy into the artifact (which would shadow the layer,
        # since /var/task/node_modules wins over NODE_PATH). 'aws-sdk' is the
        # serverless-esbuild default and must be preserved when overriding.
        exclude: ['aws-sdk', '@learncard/didkit-plugin-node']
        sourcemap: external
        target: 'node20'
        watch:
            pattern: ['src/**/*.ts', 'dids.ts']

    domains:
        # References to 'prod' stage
        production:
            hostedZoneName: ${env:SERVERLESS_HOSTED_ZONE_NAMES, 'api.learncard.app.'}
            domainName: ${env:SERVERLESS_DOMAIN_NAME, 'api.learncard.app'}
            certificateName: ${env:SERVERLESS_DOMAIN_NAME, 'api.learncard.app'}

        # References to 'dev' stage
        dev:
            hostedZoneName: ${env:SERVERLESS_HOSTED_ZONE_NAMES, 'api.learncard.app.'}
            domainName: ${env:SERVERLESS_DOMAIN_NAME, 'staging.api.learncard.app'}
            certificateName: ${env:SERVERLESS_DOMAIN_NAME, 'staging.api.learncard.app'}

    # Amazon Certificate Manager
    customCertificate:
        # Route 53 Hosted Zone name
        # don't forget the dot on the end!
        hostedZoneNames: ${self:custom.domains.${self:provider.stage}.hostedZoneName}

        # Here we get our certificate name inside custom.domain.STAGE.certificateName
        # STAGE will be automatically filled with the value from "provider > stage"
        certificateName: ${self:custom.domains.${self:provider.stage}.certificateName}

        region: ${self:provider.region}

    # Route53
    customDomain:
        # Get value from "domains" section using stage that is being deployed
        domainName: ${self:custom.domains.${self:provider.stage}.domainName}

        # Same case of certificaName inside customCertificate
        certificateName: ${self:custom.domains.${self:provider.stage}.certificateName}

        # Enable plugin to create an A Alias and AAAA Alias records in Route53
        # mapping the domainName to the generated distribution domain name.
        createRoute53Record: true

        # Enable plugin to autorun create_domain/delete_domain as part of sls deploy/remove
        autoDomain: true

        basePath: ''
        endpointType: regional
        apiType: http

package:
    individually: true
    patterns:
        - '!node_modules/**'
        - 'node_modules/@learncard/didkit-plugin/dist/didkit_wasm_bg.wasm'
        - 'node_modules/@learncard/didkit-plugin-node/*.node'
        - 'node_modules/@learncard/didkit-plugin-node/package.json'
        - 'node_modules/@learncard/didkit-plugin-node/dist/**'
        - 'src/swagger-ui'

# Ships @learncard/didkit-plugin-node (JS wrapper + linux-x64 napi binary) at
# /opt/nodejs/node_modules so the native-first DIDKit path in learnCard.helpers.ts
# resolves in Lambda instead of silently falling back to WASM. Assembled by
# scripts/prepare-didkit-native-layer.cjs (see the serverless-deploy npm script).
layers:
    didkitNative:
        path: didkit-native-layer
        name: ${self:service}-${opt:stage, 'dev'}-didkit-native
        description: Native DIDKit napi addon (@learncard/didkit-plugin-node)
        compatibleRuntimes:
            - nodejs20.x
        compatibleArchitectures:
            - x86_64

provider:
    name: aws
    runtime: nodejs20.x
    # Attach the native DIDKit layer to every function in this service.
    layers:
        - { Ref: DidkitNativeLambdaLayer }
    memorySize: 2048
    timeout: 29
    stage: ${opt:stage, "dev"}
    region: ${opt:region, "us-east-1"}
    environment:
        LAMBDA_STAGE: ${opt:stage, "dev"}
        SEED: ${env:SEED, ''}
        DOMAIN_NAME: ${env:DOMAIN_NAME, ''}
        OPENAI_API_KEY: ${env:OPENAI_API_KEY, ''}
        METABASE_SECRET_KEY: ${env:METABASE_SECRET_KEY, ''}
        POSTMARK_SERVER_TOKEN: ${env:POSTMARK_SERVER_TOKEN, ''}
        POSTMARK_LOGIN_CODE_TEMPLATE_ALIAS: ${env:POSTMARK_LOGIN_CODE_TEMPLATE_ALIAS, ''}
        POSTMARK_ENDORSEMENT_REQUEST_TEMPLATE_ALIAS: ${env:POSTMARK_ENDORSEMENT_REQUEST_TEMPLATE_ALIAS, ''}
        POSTMARK_RECOVERY_EMAIL_CODE_TEMPLATE_ALIAS: ${env:POSTMARK_RECOVERY_EMAIL_CODE_TEMPLATE_ALIAS, ''}
        POSTMARK_RECOVERY_KEY_TEMPLATE_ALIAS: ${env:POSTMARK_RECOVERY_KEY_TEMPLATE_ALIAS, ''}
        POSTMARK_FROM_EMAIL: ${env:POSTMARK_FROM_EMAIL, ''}
        POSTMARK_BRAND_NAME: ${env:POSTMARK_BRAND_NAME, ''}
        PORT: ${opt:httpPort, "3000"}
        MONGO_URI: ${env:MONGO_URI, ''}
        MONGO_DB_NAME: ${env:MONGO_DB_NAME, ''}
        AUTHORIZED_DIDS: ${env:AUTHORIZED_DIDS, ''}
        GOOGLE_APPLICATION_CREDENTIAL: ${env:GOOGLE_APPLICATION_CREDENTIAL, ''}
        SCOUTS_SSO_CLIENT_SECRET: ${env:SCOUTS_SSO_CLIENT_SECRET, ''}
        LEARN_CLOUD_URL: ${env:LEARN_CLOUD_URL, ''}
        SENTRY_DSN: ${env:SENTRY_DSN, ''}
        SENTRY_ENV: ${env:SENTRY_ENV, ''}
        REDIS_HOST:
            'Fn::GetAtt': [ElasticCacheCluster, RedisEndpoint.Address]
        REDIS_PORT:
            'Fn::GetAtt': [ElasticCacheCluster, RedisEndpoint.Port]
    tracing:
        apiGateway: true
        lambda: true
    httpApi:
        cors:
            allowedOrigins: '*'
            allowedHeaders: '*'
            allowedMethods: '*'

functions:
    trpc:
        handler: lambda.trpcHandler
        vpc:
            securityGroupIds:
                - 'Fn::GetAtt': [ServerlessSecurityGroup, GroupId]
            subnetIds:
                - Ref: PrivateSubnetA
        events:
            - httpApi: ANY /trpc/{trpc+}

    api:
        handler: lambda.openApiHandler
        vpc:
            securityGroupIds:
                - 'Fn::GetAtt': [ServerlessSecurityGroup, GroupId]
            subnetIds:
                - Ref: PrivateSubnetA
        events:
            - httpApi: ANY /api/{trpc+}

    didWeb:
        handler: lambda.didWebHandler
        vpc:
            securityGroupIds:
                - 'Fn::GetAtt': [ServerlessSecurityGroup, GroupId]
            subnetIds:
                - Ref: PrivateSubnetA
        events:
            - httpApi: GET /users/{params+}
            - httpApi: GET /.well-known/did.json
        url:
            cors: true

    swagger:
        handler: lambda.swaggerUiHandler
        package:
            patterns:
                - src/swagger-ui/**
        events:
            - httpApi: GET /docs
            - httpApi: GET /docs/{trpc+}

resources:
    Resources:
        VPC:
            Type: AWS::EC2::VPC
            Properties:
                CidrBlock: '10.0.0.0/16'
        IP:
            Type: AWS::EC2::EIP
            Properties:
                Domain: vpc
        InternetGateway:
            Type: AWS::EC2::InternetGateway
        VPCGatewayAttachment:
            Type: AWS::EC2::VPCGatewayAttachment
            Properties:
                VpcId:
                    Ref: VPC
                InternetGatewayId:
                    Ref: InternetGateway
        NatGateway:
            Type: AWS::EC2::NatGateway
            Properties:
                AllocationId:
                    Fn::GetAtt:
                        - IP
                        - AllocationId
                SubnetId:
                    Ref: PublicSubnetA
        PrivateSubnetA:
            DependsOn: VPC
            Type: AWS::EC2::Subnet
            Properties:
                VpcId:
                    Ref: VPC
                AvailabilityZone: ${self:provider.region}a
                CidrBlock: '10.0.1.0/24'
        PublicSubnetA:
            DependsOn: VPC
            Type: AWS::EC2::Subnet
            Properties:
                VpcId:
                    Ref: VPC
                AvailabilityZone: ${self:provider.region}a
                CidrBlock: '10.0.2.0/24'
        PrivateRouteTable:
            Type: AWS::EC2::RouteTable
            Properties:
                VpcId:
                    Ref: VPC
        PrivateRoute:
            Type: AWS::EC2::Route
            Properties:
                RouteTableId:
                    Ref: PrivateRouteTable
                DestinationCidrBlock: 0.0.0.0/0
                NatGatewayId:
                    Ref: NatGateway
        PublicRouteTable:
            Type: AWS::EC2::RouteTable
            Properties:
                VpcId:
                    Ref: VPC
        PublicRoute:
            Type: AWS::EC2::Route
            Properties:
                RouteTableId:
                    Ref: PublicRouteTable
                DestinationCidrBlock: 0.0.0.0/0
                GatewayId:
                    Ref: InternetGateway
        SubnetRouteTableAssociationLambdaPrivateA:
            Type: AWS::EC2::SubnetRouteTableAssociation
            Properties:
                SubnetId:
                    Ref: PrivateSubnetA
                RouteTableId:
                    Ref: PrivateRouteTable
        SubnetRouteTableAssociationLambdaPublicA:
            Type: AWS::EC2::SubnetRouteTableAssociation
            Properties:
                SubnetId:
                    Ref: PublicSubnetA
                RouteTableId:
                    Ref: PublicRouteTable
        ServerlessSecurityGroup:
            DependsOn: VPC
            Type: AWS::EC2::SecurityGroup
            Properties:
                GroupDescription: SecurityGroup for Serverless Functions
                VpcId:
                    Ref: VPC
        ServerlessStorageSecurityGroup:
            DependsOn: VPC
            Type: AWS::EC2::SecurityGroup
            Properties:
                GroupDescription: Ingress for Redis Cluster
                VpcId:
                    Ref: VPC
                SecurityGroupIngress:
                    - IpProtocol: tcp
                      FromPort: '6379'
                      ToPort: '6379'
                      SourceSecurityGroupId:
                          Ref: ServerlessSecurityGroup
        ServerlessCacheSubnetGroup:
            Type: AWS::ElastiCache::SubnetGroup
            Properties:
                Description: 'Cache Subnet Group'
                SubnetIds:
                    - Ref: PrivateSubnetA
        ElasticCacheCluster:
            DependsOn: ServerlessStorageSecurityGroup
            Type: AWS::ElastiCache::CacheCluster
            Properties:
                AutoMinorVersionUpgrade: true
                Engine: redis
                CacheNodeType: ${self:custom.config.CACHE_INSTANCE_SIZE}
                NumCacheNodes: 1
                VpcSecurityGroupIds:
                    - 'Fn::GetAtt': [ServerlessStorageSecurityGroup, GroupId]
                CacheSubnetGroupName:
                    Ref: ServerlessCacheSubnetGroup
