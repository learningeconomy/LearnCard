id: no-credential-in-trace
language: TypeScript
rule:
  any:
    - pattern: trace($OP, $NAME, $FN, { $$$FIELDS })
    - pattern: traceDb($NAME, $FN, { $$$FIELDS })
    - pattern: traceHttp($NAME, $FN, { $$$FIELDS })
    - pattern: traceCrypto($NAME, $FN, { $$$FIELDS })
    - pattern: traceInternal($NAME, $FN, { $$$FIELDS })
  has:
    pattern: $KEY: $VAL
    where:
      KEY:
        regex: '^(credentialSubject|proof|evidence|verifiableCredential|credential|presentation|verifiablePresentation)$'
message: Do not pass credential fields as trace span data — use Sensitive<T> wrapper or omit
severity: warning
