# serverless.yml

service: ${env:SERVERLESS_SERVICE_NAME, 'lcn-brain-service'}

frameworkVersion: '3'

useDotenv: true

plugins:
    - serverless-esbuild
    - serverless-offline
    - serverless-domain-manager
    - serverless-certificate-creator
    - serverless-lift
    - serverless-prune-plugin

constructs:
    notifications-queue:
        type: queue
        worker:
            handler: lambda.notificationsWorker

custom:
    prune:
        automatic: true
        number: 3
    config:
        CACHE_INSTANCE_SIZE: ${env:SERVERLESS_CACHE_INSTANCE_SIZE, 'cache.t2.micro'}
    esbuild:
        # serverless-esbuild does not support Bun as a Lambda artifact packager.
        # Bun remains the repo installer/runner; pnpm is used only for packaging externals.
        packager: pnpm
        plugins: esbuildPlugins.cjs
        bundle: true
        minify: true
        external: ['@learncard/didkit-plugin/dist/didkit_wasm_bg.wasm', '*.node', 'p-limit']
        # didkit-plugin-node ships via the didkitNative Lambda Layer. `exclude` both
        # marks it esbuild-external AND stops the packager from installing a
        # binary-less registry copy into the artifact (which would shadow the layer,
        # since /var/task/node_modules wins over NODE_PATH). 'aws-sdk' is the
        # serverless-esbuild default and must be preserved when overriding.
        exclude: ['aws-sdk', '@learncard/didkit-plugin-node']
        sourcemap: external
        target: 'node20'
        watch:
            pattern: ['src/**/*.ts', 'dids.ts']

    domains:
        # References to 'prod' stage
        production:
            hostedZoneName: ${env:SERVERLESS_HOSTED_ZONE_NAMES, 'network.learncard.com.'}
            domainName: ${env:SERVERLESS_DOMAIN_NAME, 'network.learncard.com'}
            certificateName: ${env:SERVERLESS_DOMAIN_NAME, 'network.learncard.com'}

        # References to 'dev' stage
        dev:
            hostedZoneName: ${env:SERVERLESS_HOSTED_ZONE_NAMES, 'network.learncard.com.'}
            domainName: ${env:SERVERLESS_DOMAIN_NAME, 'staging.network.learncard.com'}
            certificateName: ${env:SERVERLESS_DOMAIN_NAME, 'staging.network.learncard.com'}

    # Amazon Certificate Manager
    customCertificate:
        # Route 53 Hosted Zone name
        # don't forget the dot on the end!
        hostedZoneNames: ${self:custom.domains.${self:provider.stage}.hostedZoneName}

        # Here we get our certificate name inside custom.domain.STAGE.certificateName
        # STAGE will be automatically filled with the value from "provider > stage"
        certificateName: ${self:custom.domains.${self:provider.stage}.certificateName}

        region: ${self:provider.region}

    # Route53
    customDomain:
        # Get value from "domains" section using stage that is being deployed
        domainName: ${self:custom.domains.${self:provider.stage}.domainName}

        # Same case of certificaName inside customCertificate
        certificateName: ${self:custom.domains.${self:provider.stage}.certificateName}

        # Enable plugin to create an A Alias and AAAA Alias records in Route53
        # mapping the domainName to the generated distribution domain name.
        createRoute53Record: true

        # Enable plugin to autorun create_domain/delete_domain as part of sls deploy/remove
        autoDomain: true

        basePath: ''
        endpointType: regional
        apiType: http

package:
    individually: true
    # DIDKit assets no longer ship via node_modules copy-patterns: those globs were
    # service-relative and match nothing under Bun workspaces (root cause of the
    # 2026-07-02 staging incident, PR #1341) — and if a service-level node_modules
    # ever reappeared, force-including didkit-plugin-node here would shadow the
    # didkitNative Lambda Layer (/var/task/node_modules wins over NODE_PATH). The
    # WASM ships inside the bundle (esbuildPlugins.cjs); native ships via the Layer.
    patterns:
        - '!node_modules/**'

# Ships @learncard/didkit-plugin-node (JS wrapper + linux-x64 napi binary) at
# /opt/nodejs/node_modules so the native-first DIDKit path in learnCard.helpers.ts
# resolves in Lambda instead of silently falling back to WASM. Assembled by
# scripts/prepare-didkit-native-layer.cjs (see the serverless-deploy npm script).
layers:
    didkitNative:
        path: didkit-native-layer
        name: ${self:service}-${opt:stage, 'dev'}-didkit-native
        description: Native DIDKit napi addon (@learncard/didkit-plugin-node)
        compatibleRuntimes:
            - nodejs20.x
        compatibleArchitectures:
            - x86_64

provider:
    name: aws
    runtime: nodejs20.x
    # Attach the native DIDKit layer to every function in this service.
    layers:
        - { Ref: DidkitNativeLambdaLayer }
    memorySize: 2048
    timeout: 29
    stage: ${opt:stage, "dev"}
    region: ${opt:region, "us-east-1"}
    environment:
        PORT: ${env:PORT, 3000}
        LAMBDA_STAGE: ${opt:stage, "dev"}
        SEED: ${env:SEED}
        DOMAIN_NAME: ${env:DOMAIN_NAME}
        CLIENT_APP_DOMAIN_NAME: ${env:CLIENT_APP_DOMAIN_NAME}
        NOTIFICATIONS_SERVICE_WEBHOOK_URL: ${env:NOTIFICATIONS_SERVICE_WEBHOOK_URL}
        NEO4J_URI: ${env:NEO4J_URI}
        NEO4J_USERNAME: ${env:NEO4J_USERNAME}
        NEO4J_PASSWORD: ${env:NEO4J_PASSWORD}
        POSTMARK_API_KEY: ${env:POSTMARK_API_KEY}
        POSTMARK_FROM_EMAIL: ${env:POSTMARK_FROM_EMAIL}
        MESSAGEBIRD_AUTH_TOKEN: ${env:MESSAGEBIRD_AUTH_TOKEN}
        MESSAGEBIRD_ORIGINATOR: ${env:MESSAGEBIRD_ORIGINATOR}
        TRUSTED_ISSUERS_WHITELIST: ${env:TRUSTED_ISSUERS_WHITELIST, ""}
        TRUSTED_BRAIN_SERVICES: ${env:TRUSTED_BRAIN_SERVICES, ""}
        BRAIN_SERVICE_REGISTRY_URL: ${env:BRAIN_SERVICE_REGISTRY_URL, ""}
        DCC_KNOWN_REGISTRIES_URL: ${env:DCC_KNOWN_REGISTRIES_URL, ""}
        SENTRY_DSN: ${env:SENTRY_DSN}
        SENTRY_ENV: ${env:SENTRY_ENV}
        SENTRY_AUTH_TOKEN: ${env:SENTRY_AUTH_TOKEN}
        SENTRY_ORG: ${env:SENTRY_ORG}
        SENTRY_PROJECT: ${env:SENTRY_PROJECT}
        REDIS_HOST:
            'Fn::GetAtt': [ElasticCacheCluster, RedisEndpoint.Address]
        REDIS_PORT:
            'Fn::GetAtt': [ElasticCacheCluster, RedisEndpoint.Port]
        NOTIFICATIONS_QUEUE_URL: ${construct:notifications-queue.queueUrl}
        SKILL_EMBEDDING_GOOGLE_API_KEY: ${env:SKILL_EMBEDDING_GOOGLE_API_KEY, ""}
        SKILL_EMBEDDING_GOOGLE_MODEL: ${env:SKILL_EMBEDDING_GOOGLE_MODEL, "gemini-embedding-001"}
        SKILL_EMBEDDING_BATCH_SIZE: ${env:SKILL_EMBEDDING_BATCH_SIZE, "25"}
        SKILL_EMBEDDING_BACKFILL_ON_STARTUP: ${env:SKILL_EMBEDDING_BACKFILL_ON_STARTUP, "false"}
        SKILL_EMBEDDING_BACKFILL_LOCK_TTL_SECONDS: ${env:SKILL_EMBEDDING_BACKFILL_LOCK_TTL_SECONDS, "900"}
        SKILL_EMBEDDING_BACKFILL_PAGE_SIZE: ${env:SKILL_EMBEDDING_BACKFILL_PAGE_SIZE, "100"}
        SKILL_EMBEDDING_BACKFILL_BATCH_SIZE: ${env:SKILL_EMBEDDING_BACKFILL_BATCH_SIZE, "50"}
        SMART_RESUME_CLIENT_ID: ${env:SMART_RESUME_CLIENT_ID, ""}
        SMART_RESUME_ACCESS_KEY: ${env:SMART_RESUME_ACCESS_KEY, ""}
        SMART_RESUME_CONTRACT_URI: ${env:SMART_RESUME_CONTRACT_URI, ""}
        LOGIN_PROVIDER_DID: ${env:LOGIN_PROVIDER_DID, ""}
        OIDC_TRUSTED_ISSUERS: ${env:OIDC_TRUSTED_ISSUERS, ""}
        OIDC_EXPECTED_AUDIENCE: ${env:OIDC_EXPECTED_AUDIENCE, ""}
        APP_STORE_ADMIN_PROFILE_IDS: ${env:APP_STORE_ADMIN_PROFILE_IDS, ""}
        APP_BRAND: ${env:APP_BRAND, 'scouts'}
        # LC-1644 perf bench (admin-only). Optional — if unset, the bench still runs
        # but emits no PostHog events. POSTHOG_HOST falls back to the helper's default
        # (https://us.i.posthog.com).
        POSTHOG_API_KEY: ${env:POSTHOG_API_KEY, ""}
        POSTHOG_HOST: ${env:POSTHOG_HOST, ""}
        GIT_SHA: ${env:GIT_SHA, ""}
    tracing:
        apiGateway: true
        lambda: true
    httpApi:
        cors:
            allowedOrigins: '*'
            allowedHeaders: '*'
            allowedMethods: '*'

functions:
    trpc:
        handler: lambda.trpcHandler
        vpc:
            securityGroupIds:
                - 'Fn::GetAtt': [ServerlessSecurityGroup, GroupId]
            subnetIds:
                - Ref: PrivateSubnetA
        events:
            - httpApi: ANY /trpc/{trpc+}

    api:
        handler: lambda.openApiHandler
        vpc:
            securityGroupIds:
                - 'Fn::GetAtt': [ServerlessSecurityGroup, GroupId]
            subnetIds:
                - Ref: PrivateSubnetA
        events:
            - httpApi: ANY /api/{trpc+}

    didWeb:
        handler: didWebLambda.didWebHandler
        vpc:
            securityGroupIds:
                - 'Fn::GetAtt': [ServerlessSecurityGroup, GroupId]
            subnetIds:
                - Ref: PrivateSubnetA
        events:
            - httpApi: GET /users/{params+}
            - httpApi: OPTIONS /users/{params+}
            - httpApi: GET /manager/{params+}
            - httpApi: OPTIONS /manager/{params+}
            - httpApi: GET /app/{params+}
            - httpApi: OPTIONS /app/{params+}
            - httpApi: GET /.well-known/did.json
            - httpApi: OPTIONS /.well-known/did.json
        url:
            cors: true

    swagger:
        handler: lambda.swaggerUiHandler
        events:
            - httpApi: GET /docs
            - httpApi: GET /docs/{trpc+}

    skillsViewer:
        handler: lambda.skillsViewerHandler
        vpc:
            securityGroupIds:
                - 'Fn::GetAtt': [ServerlessSecurityGroup, GroupId]
            subnetIds:
                - Ref: PrivateSubnetA
        events:
            - httpApi: GET /skills/{skillId}
            - httpApi: GET /frameworks/{frameworkId}
            - httpApi: GET /frameworks/{frameworkId}/skills/{skillId}

    statusLists:
        handler: lambda.statusListsHandler
        vpc:
            securityGroupIds:
                - 'Fn::GetAtt': [ServerlessSecurityGroup, GroupId]
            subnetIds:
                - Ref: PrivateSubnetA
        events:
            - httpApi: GET /status-lists/{id}
            - httpApi: OPTIONS /status-lists/{id}

resources:
    Resources:
        VPC:
            Type: AWS::EC2::VPC
            Properties:
                CidrBlock: '10.0.0.0/16'
        IP:
            Type: AWS::EC2::EIP
            Properties:
                Domain: vpc
        InternetGateway:
            Type: AWS::EC2::InternetGateway
        VPCGatewayAttachment:
            Type: AWS::EC2::VPCGatewayAttachment
            Properties:
                VpcId:
                    Ref: VPC
                InternetGatewayId:
                    Ref: InternetGateway
        NatGateway:
            Type: AWS::EC2::NatGateway
            Properties:
                AllocationId:
                    Fn::GetAtt:
                        - IP
                        - AllocationId
                SubnetId:
                    Ref: PublicSubnetA
        PrivateSubnetA:
            DependsOn: VPC
            Type: AWS::EC2::Subnet
            Properties:
                VpcId:
                    Ref: VPC
                AvailabilityZone: ${self:provider.region}a
                CidrBlock: '10.0.1.0/24'
        PublicSubnetA:
            DependsOn: VPC
            Type: AWS::EC2::Subnet
            Properties:
                VpcId:
                    Ref: VPC
                AvailabilityZone: ${self:provider.region}a
                CidrBlock: '10.0.2.0/24'
        PrivateRouteTable:
            Type: AWS::EC2::RouteTable
            Properties:
                VpcId:
                    Ref: VPC
        PrivateRoute:
            Type: AWS::EC2::Route
            Properties:
                RouteTableId:
                    Ref: PrivateRouteTable
                DestinationCidrBlock: 0.0.0.0/0
                NatGatewayId:
                    Ref: NatGateway
        PublicRouteTable:
            Type: AWS::EC2::RouteTable
            Properties:
                VpcId:
                    Ref: VPC
        PublicRoute:
            Type: AWS::EC2::Route
            Properties:
                RouteTableId:
                    Ref: PublicRouteTable
                DestinationCidrBlock: 0.0.0.0/0
                GatewayId:
                    Ref: InternetGateway
        SubnetRouteTableAssociationLambdaPrivateA:
            Type: AWS::EC2::SubnetRouteTableAssociation
            Properties:
                SubnetId:
                    Ref: PrivateSubnetA
                RouteTableId:
                    Ref: PrivateRouteTable
        SubnetRouteTableAssociationLambdaPublicA:
            Type: AWS::EC2::SubnetRouteTableAssociation
            Properties:
                SubnetId:
                    Ref: PublicSubnetA
                RouteTableId:
                    Ref: PublicRouteTable
        ServerlessSecurityGroup:
            DependsOn: VPC
            Type: AWS::EC2::SecurityGroup
            Properties:
                GroupDescription: SecurityGroup for Serverless Functions
                VpcId:
                    Ref: VPC
        ServerlessStorageSecurityGroup:
            DependsOn: VPC
            Type: AWS::EC2::SecurityGroup
            Properties:
                GroupDescription: Ingress for Redis Cluster
                VpcId:
                    Ref: VPC
                SecurityGroupIngress:
                    - IpProtocol: tcp
                      FromPort: '6379'
                      ToPort: '6379'
                      SourceSecurityGroupId:
                          Ref: ServerlessSecurityGroup
        ServerlessCacheSubnetGroup:
            Type: AWS::ElastiCache::SubnetGroup
            Properties:
                Description: 'Cache Subnet Group'
                SubnetIds:
                    - Ref: PrivateSubnetA
        ElasticCacheCluster:
            DependsOn: ServerlessStorageSecurityGroup
            Type: AWS::ElastiCache::CacheCluster
            Properties:
                AutoMinorVersionUpgrade: true
                Engine: redis
                CacheNodeType: ${self:custom.config.CACHE_INSTANCE_SIZE}
                NumCacheNodes: 1
                VpcSecurityGroupIds:
                    - 'Fn::GetAtt': [ServerlessStorageSecurityGroup, GroupId]
                CacheSubnetGroupName:
                    Ref: ServerlessCacheSubnetGroup
