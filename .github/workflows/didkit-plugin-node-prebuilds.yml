name: DIDKit Plugin Node Prebuilds

on:
    push:
        branches:
            - main
        paths:
            - 'packages/plugins/didkit-plugin-node/**'
            - '.github/workflows/didkit-plugin-node-prebuilds.yml'
    pull_request:
        paths:
            - 'packages/plugins/didkit-plugin-node/**'
            - '.github/workflows/didkit-plugin-node-prebuilds.yml'
    workflow_dispatch:

env:
    # Skip mongodb-memory-server's postinstall binary download — it races when
    # multiple workspace packages depend on it, and we don't run brain-service
    # tests in this workflow.
    MONGOMS_DISABLE_POSTINSTALL: '1'

jobs:
    build:
        strategy:
            fail-fast: false
            matrix:
                settings:
                    - host: ubuntu-latest
                      target: x86_64-unknown-linux-gnu
                      strip: strip -x
                      node_file: index.linux-x64-gnu.node
                    - host: ubuntu-latest
                      target: aarch64-unknown-linux-gnu
                      strip: aarch64-linux-gnu-strip
                      node_file: index.linux-arm64-gnu.node
                    # Skipping MUSL builds for now
                    # TODO: Don't do that
                    # - host: ubuntu-latest
                    #   target: x86_64-unknown-linux-musl
                    #   docker: ghcr.io/napi-rs/napi-rs/nodejs-rust:lts-alpine
                    #   strip: strip
                    #   node_file: index.linux-x64-musl.node
                    # - host: ubuntu-latest
                    #   target: aarch64-unknown-linux-musl
                    #   docker: ghcr.io/napi-rs/napi-rs/nodejs-rust:lts-alpine
                    #   strip: /aarch64-linux-musl-cross/bin/aarch64-linux-musl-strip
                    #   node_file: index.linux-arm64-musl.node
                    - host: macos-latest
                      target: x86_64-apple-darwin
                      strip: strip -x
                      node_file: index.darwin-x64.node
                    - host: macos-latest
                      target: aarch64-apple-darwin
                      strip: strip -x
                      node_file: index.darwin-arm64.node

        name: Build ${{ matrix.settings.target }}
        runs-on: ${{ matrix.settings.host }}
        env:
            BUILD_DIDKIT_NAPI: '1'

        steps:
            - uses: actions/checkout@v4
              with:
                  submodules: true

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: 1.3.14

            - name: Setup Bun cache
              uses: actions/cache@v4
              with:
                  path: ~/.bun/install/cache
                  key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
                  restore-keys: |
                      ${{ runner.os }}-bun-

            - name: Setup Rust
              uses: dtolnay/rust-toolchain@stable
              with:
                  toolchain: stable
                  targets: ${{ matrix.settings.target }}

            - name: Cache cargo
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.cargo/registry/index/
                      ~/.cargo/registry/cache/
                      ~/.cargo/git/db/
                      .cargo-cache
                      target/
                  key: ${{ matrix.settings.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

            - name: Install cross-compilation tools (aarch64-linux-gnu)
              if: matrix.settings.target == 'aarch64-unknown-linux-gnu'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

            - name: Install dependencies
              run: bun install

            - name: Build in Docker (x86_64-musl)
              if: matrix.settings.target == 'x86_64-unknown-linux-musl'
              uses: addnab/docker-run-action@v3
              env:
                  TARGET: ${{ matrix.settings.target }}
                  STRIP_CMD: ${{ matrix.settings.strip }}
                  NODE_FILE: ${{ matrix.settings.node_file }}
              with:
                  image: ${{ matrix.settings.docker }}
                  options: -v ${{ github.workspace }}:/build -w /build -e TARGET -e STRIP_CMD -e NODE_FILE
                  run: |
                      rustup update stable
                      rustup default stable
                      rustup target add $TARGET
                      curl -fsSL https://bun.sh/install | bash -s -- bun-v1.3.14
                      export BUN_INSTALL="$HOME/.bun"
                      export PATH="$BUN_INSTALL/bin:$PATH"
                      bun install
                      bunx nx run didkit-plugin-node:build -- --target $TARGET
                      $STRIP_CMD packages/plugins/didkit-plugin-node/$NODE_FILE

            - name: Build in Docker (aarch64-musl)
              if: matrix.settings.target == 'aarch64-unknown-linux-musl'
              uses: addnab/docker-run-action@v3
              env:
                  TARGET: ${{ matrix.settings.target }}
                  STRIP_CMD: ${{ matrix.settings.strip }}
                  NODE_FILE: ${{ matrix.settings.node_file }}
                  CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: /aarch64-linux-musl-cross/bin/aarch64-linux-musl-gcc
                  CC_aarch64_unknown_linux_musl: /aarch64-linux-musl-cross/bin/aarch64-linux-musl-gcc
                  CXX_aarch64_unknown_linux_musl: /aarch64-linux-musl-cross/bin/aarch64-linux-musl-g++
                  AR_aarch64_unknown_linux_musl: /aarch64-linux-musl-cross/bin/aarch64-linux-musl-ar
              with:
                  image: ${{ matrix.settings.docker }}
                  options: -v ${{ github.workspace }}:/build -w /build -e TARGET -e STRIP_CMD -e NODE_FILE -e CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER -e CC_aarch64_unknown_linux_musl -e CXX_aarch64_unknown_linux_musl -e AR_aarch64_unknown_linux_musl
                  run: |
                      rustup update stable
                      rustup default stable
                      rustup target add $TARGET
                      curl -fsSL https://bun.sh/install | bash -s -- bun-v1.3.14
                      export BUN_INSTALL="$HOME/.bun"
                      export PATH="$BUN_INSTALL/bin:$PATH"
                      bun install
                      bunx nx run didkit-plugin-node:build -- --target $TARGET
                      $STRIP_CMD packages/plugins/didkit-plugin-node/$NODE_FILE

            - name: Build (aarch64-unknown-linux-gnu)
              if: matrix.settings.target == 'aarch64-unknown-linux-gnu'
              env:
                  CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
                  CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
                  CXX_aarch64_unknown_linux_gnu: aarch64-linux-gnu-g++
                  AR_aarch64_unknown_linux_gnu: aarch64-linux-gnu-ar
              run: |
                  bunx nx run didkit-plugin-node:build -- --target aarch64-unknown-linux-gnu
                  ${{ matrix.settings.strip }} packages/plugins/didkit-plugin-node/${{ matrix.settings.node_file }}
              shell: bash

            - name: Build
              if: ${{ !matrix.settings.docker && matrix.settings.target != 'aarch64-unknown-linux-gnu' }}
              run: |
                  bunx nx run didkit-plugin-node:build ${{ matrix.settings.target != 'x86_64-unknown-linux-gnu' && format('-- --target {0}', matrix.settings.target) || '' }}
                  ${{ matrix.settings.strip }} packages/plugins/didkit-plugin-node/${{ matrix.settings.node_file }}
              shell: bash

            - name: Upload artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: bindings-${{ matrix.settings.target }}
                  path: packages/plugins/didkit-plugin-node/${{ matrix.settings.node_file }}
                  if-no-files-found: error

    publish:
        name: Publish to npm
        needs: build
        if: github.ref == 'refs/heads/main'
        runs-on: ubuntu-latest
        permissions:
            contents: read
            id-token: write
        steps:
            - uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 24.12.0
                  registry-url: 'https://registry.npmjs.org'
                  package-manager-cache: false

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: 1.3.14

            - name: Setup Bun cache
              uses: actions/cache@v4
              with:
                  path: ~/.bun/install/cache
                  key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
                  restore-keys: |
                      ${{ runner.os }}-bun-

            - name: Install dependencies
              run: bun install

            - name: Check if version is already published
              id: published
              working-directory: packages/plugins/didkit-plugin-node
              run: |
                  PACKAGE=$(node -p "require('./package.json').name")
                  VERSION=$(node -p "require('./package.json').version")

                  if npm view "$PACKAGE@$VERSION" version > /dev/null 2>&1; then
                    echo "exists=true" >> "$GITHUB_OUTPUT"
                    echo "$PACKAGE@$VERSION is already published; skipping npm publish"
                  else
                    echo "exists=false" >> "$GITHUB_OUTPUT"
                    echo "$PACKAGE@$VERSION is not published yet"
                  fi

            - name: Download all artifacts
              if: steps.published.outputs.exists != 'true'
              uses: actions/download-artifact@v4
              with:
                  path: packages/plugins/didkit-plugin-node/artifacts
                  pattern: bindings-*
                  merge-multiple: true

            - name: List downloaded binaries
              if: steps.published.outputs.exists != 'true'
              run: ls -la packages/plugins/didkit-plugin-node/artifacts/*.node

            - name: Create platform package directories
              if: steps.published.outputs.exists != 'true'
              working-directory: packages/plugins/didkit-plugin-node
              run: bun run create-npm-dir

            - name: Move artifacts to platform packages
              if: steps.published.outputs.exists != 'true'
              working-directory: packages/plugins/didkit-plugin-node
              run: bun run artifacts

            - name: Build TypeScript
              if: steps.published.outputs.exists != 'true'
              run: bunx nx run didkit-plugin-node:build

            - name: Publish platform packages
              if: steps.published.outputs.exists != 'true'
              working-directory: packages/plugins/didkit-plugin-node
              run: bunx napi prepublish -t npm --skip-gh-release

            # Use npm for npm-registry tarball creation/publication; Bun handles the workspace install/build.
            - name: Pack package
              if: steps.published.outputs.exists != 'true'
              working-directory: packages/plugins/didkit-plugin-node
              run: npm pack --pack-destination "${{ runner.temp }}/didkit-plugin-node-pack"

            - name: Validate packed package metadata
              if: steps.published.outputs.exists != 'true'
              run: |
                  TARBALL=$(find "${{ runner.temp }}/didkit-plugin-node-pack" -name '*.tgz' -print -quit)
                  tar -xOf "$TARBALL" package/package.json > "${{ runner.temp }}/didkit-plugin-node-package.json"

                  if grep -q "workspace:" "${{ runner.temp }}/didkit-plugin-node-package.json"; then
                    echo "Packed package still contains workspace protocol dependencies"
                    cat "${{ runner.temp }}/didkit-plugin-node-package.json"
                    exit 1
                  fi

            # Use npm for the final registry publish because this job publishes a prepared npm tarball.
            - name: Publish to npm
              if: steps.published.outputs.exists != 'true'
              working-directory: packages/plugins/didkit-plugin-node
              run: npm publish "${{ runner.temp }}"/didkit-plugin-node-pack/*.tgz --access public
