name: Smoketest

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      environment:
        required: true
        type: choice
        options:
          - staging
          - production
          - scouts

jobs:
  smoketest:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 24.12
        uses: actions/setup-node@v6
        with:
          node-version: 24.12.0

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9
          run_install: false

      - name: Install smoketest dependencies
        run: |
          cd tests/smoketests
          pnpm install --no-frozen-lockfile

      - name: Install Playwright
        run: |
          cd tests/smoketests
          pnpm exec playwright install --with-deps chromium

      - name: Run API smoketests
        run: pnpm exec playwright test --project=api
        working-directory: tests/smoketests
        env:
          SMOKETEST_ENV: ${{ inputs.environment }}

      - name: Run browser smoketests
        run: pnpm exec playwright test --project=browser
        working-directory: tests/smoketests
        env:
          SMOKETEST_ENV: ${{ inputs.environment }}

      - name: Upload report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoketest-report-${{ inputs.environment }}
          path: tests/smoketests/playwright-report/
          retention-days: 14
