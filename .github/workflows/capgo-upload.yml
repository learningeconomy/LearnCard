name: CapGo Upload (Reusable)

# Reusable workflow: build a Capacitor app and push a JS bundle to a Capgo
# channel. Callers control which project, which channel, and (for the LCA app)
# which tenant + stage to prepare.

on:
    workflow_call:
        inputs:
            project:
                description: NX project name to build (e.g. learn-card-app)
                required: true
                type: string
            app_id:
                description: CapGo app id (bundle id)
                required: true
                type: string
            version:
                description: Bundle version to upload (e.g. 1.2.3, 1.2.3-staging.abcdef0)
                required: true
                type: string
            build_path:
                description: Path to built web assets (e.g. apps/learn-card-app/build)
                required: true
                type: string
            package_json:
                description: Path to package.json for the app
                required: true
                type: string
            node_modules_path:
                description: Path to app-specific node_modules (for delta calc)
                required: true
                type: string
            environment:
                description: GitHub environment name to use for this job
                required: true
                type: string
            channel:
                description: CapGo channel name to upload to (e.g. production, staging, pr-123)
                required: true
                type: string
            ref:
                description: Git ref to check out. Defaults to the caller's ref.
                required: false
                type: string
                default: ''
            tenant:
                description: Tenant name for prepare-native-config (LCA only). Empty to skip.
                required: false
                type: string
                default: ''
            stage:
                description: Stage flag for prepare-native-config (LCA only). Empty for no stage.
                required: false
                type: string
                default: ''
            self_assign:
                description: |
                    If 'true', run `channel set ... --self-assign` after upload so this
                    bundle becomes the default for the channel. PR previews pass 'true'
                    so the in-app switcher (CapacitorUpdater.setChannel) can opt into the
                    latest PR bundle. Set to 'false' only for channels that should not be
                    self-settable.
                required: false
                type: string
                default: 'true'
        secrets:
            CAPGO_TOKEN:
                required: true

jobs:
    upload:
        name: Upload CapGo Bundle
        runs-on: ubuntu-latest
        environment: ${{ inputs.environment }}

        steps:
            - name: Checkout Repo
              uses: actions/checkout@v7
              with:
                  ref: ${{ inputs.ref }}

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2

            - name: Setup Bun cache
              uses: actions/cache@v6
              with:
                  path: ~/.bun/install/cache
                  key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
                  restore-keys: |
                      ${{ runner.os }}-bun-

            # Skip mongodb-memory-server's postinstall Mongo binary download — a
            # backend-only transitive dep, unused by the frontend build. Its cached
            # `.tgz.downloading` temp file has flaked install with ENOENT.
            - name: Install dependencies
              env:
                  MONGOMS_DISABLE_POSTINSTALL: '1'
              run: bun install --frozen-lockfile

            # Prepare tenant config for learn-card-app builds. For other projects
            # (e.g. scouts) the tenant input is left empty and this step is skipped.
            - name: Prepare tenant config
              if: inputs.tenant != ''
              working-directory: apps/learn-card-app
              run: |
                  STAGE_FLAG=""
                  if [[ -n "${{ inputs.stage }}" ]]; then
                    STAGE_FLAG="--stage ${{ inputs.stage }}"
                  fi
                  echo "Preparing tenant config: ${{ inputs.tenant }} $STAGE_FLAG"
                  bunx tsx scripts/prepare-native-config.ts "${{ inputs.tenant }}" $STAGE_FLAG

            - name: Build ${{ inputs.project }}
              run: bunx nx build ${{ inputs.project }}
              env:
                  NODE_ENV: ${{ vars.NODE_ENV }}
                  VITE_NODE_ENV: ${{ vars.VITE_NODE_ENV }}
                  SENTRY_ENV: ${{ vars.SENTRY_ENV }}
                  SENTRY_DSN: ${{ vars.SENTRY_DSN }}
                  GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
                  VITE_WEB3AUTH_CLIENT_ID: ${{ secrets.VITE_WEB3AUTH_CLIENT_ID }}
                  VITE_WEB3AUTH_NETWORK: ${{ vars.VITE_WEB3AUTH_NETWORK }}
                  VITE_WEB3AUTH_VERIFIER_ID: ${{ vars.VITE_WEB3AUTH_VERIFIER_ID }}
                  VITE_WEB3AUTH_RPC_TARGET: ${{ secrets.VITE_WEB3AUTH_RPC_TARGET }}
                  VITE_AUTH_PROVIDER: ${{ vars.VITE_AUTH_PROVIDER }}
                  VITE_KEY_DERIVATION: ${{ vars.VITE_KEY_DERIVATION }}
                  VITE_SSS_SERVER_URL: ${{ vars.VITE_SSS_SERVER_URL }}
                  VITE_ENABLE_EMAIL_BACKUP_SHARE: ${{ vars.VITE_ENABLE_EMAIL_BACKUP_SHARE }}
                  VITE_ENABLE_AUTH_DEBUG_WIDGET: ${{ vars.VITE_ENABLE_AUTH_DEBUG_WIDGET }}
                  VITE_REQUIRE_EMAIL_FOR_PHONE_USERS: ${{ vars.VITE_REQUIRE_EMAIL_FOR_PHONE_USERS }}
                  VITE_ANALYTICS_PROVIDER: ${{ vars.VITE_ANALYTICS_PROVIDER }}
                  VITE_POSTHOG_KEY: ${{ secrets.VITE_POSTHOG_KEY }}

            # Ensure the channel exists before uploading. `channel add` errors if
            # the channel already exists, so swallow only that case — auth, network,
            # and invalid-id errors must still fail the job. Secret is passed via env
            # (CAPGO_TOKEN) rather than --apikey to keep it out of process listings.
            - name: Ensure CapGo channel exists
              env:
                  CAPGO_TOKEN: ${{ secrets.CAPGO_TOKEN }}
              run: |
                  set -o pipefail
                  if ! OUTPUT=$(bunx @capgo/cli@latest channel add \
                      "${{ inputs.channel }}" \
                      "${{ inputs.app_id }}" 2>&1); then
                      echo "$OUTPUT"
                       if echo "$OUTPUT" | grep -qiE 'already exist|duplicate key value violates unique constraint'; then
                           echo "Channel already exists — continuing."
                       else
                           exit 1
                       fi
                  else
                      echo "$OUTPUT"
                  fi

            # Inputs are passed through env and referenced as quoted shell vars so
            # a crafted value (e.g. a version string read from a fork PR's
            # package.json) can't break out into shell injection.
            - name: Upload bundle (CapGo)
              env:
                  CAPGO_TOKEN: ${{ secrets.CAPGO_TOKEN }}
                  APP_ID: ${{ inputs.app_id }}
                  BUILD_PATH: ${{ inputs.build_path }}
                  CHANNEL: ${{ inputs.channel }}
                  VERSION: ${{ inputs.version }}
                  PACKAGE_JSON: ${{ inputs.package_json }}
                  NODE_MODULES_PATH: ${{ inputs.node_modules_path }}
              run: >-
                  bunx @capgo/cli@latest bundle upload
                  "$APP_ID"
                  --delta
                  --path "$BUILD_PATH"
                  --channel "$CHANNEL"
                  --bundle "$VERSION"
                  --package-json "$PACKAGE_JSON"
                  --node-modules "$NODE_MODULES_PATH"

            - name: Set channel default (CapGo)
              if: inputs.self_assign == 'true'
              env:
                  CAPGO_TOKEN: ${{ secrets.CAPGO_TOKEN }}
                  APP_ID: ${{ inputs.app_id }}
                  CHANNEL: ${{ inputs.channel }}
                  VERSION: ${{ inputs.version }}
              run: >-
                  bunx @capgo/cli@latest channel set "$CHANNEL"
                  --bundle "$VERSION"
                  --self-assign
                  "$APP_ID"
