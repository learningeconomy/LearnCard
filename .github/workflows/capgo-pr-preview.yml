name: CapGo PR Preview

# Comment `/capgo-preview` on a PR to upload an installable OTA bundle to a
# per-PR Capgo channel (`pr-<number>`). Testers can then switch their installed
# LearnCard app to that channel via the Version Info modal to try the change
# without waiting for a TestFlight / Play Internal Test build.
#
# See https://capgo.app/blog/turn-every-pr-into-installable-preview/

on:
    issue_comment:
        types: [created]

permissions:
    contents: read
    pull-requests: write
    issues: write

jobs:
    gate:
        name: Check trigger
        runs-on: ubuntu-latest
        if: |
            github.event.issue.pull_request != null &&
            startsWith(github.event.comment.body, '/capgo-preview')
        outputs:
            pr_number: ${{ steps.lookup.outputs.pr_number }}
            head_sha: ${{ steps.lookup.outputs.head_sha }}
            head_ref: ${{ steps.lookup.outputs.head_ref }}
            short_sha: ${{ steps.lookup.outputs.short_sha }}
            channel: ${{ steps.lookup.outputs.channel }}
            bundle_version: ${{ steps.lookup.outputs.bundle_version }}
        steps:
            - name: React to the trigger comment
              uses: actions/github-script@v7
              with:
                  script: |
                      await github.rest.reactions.createForIssueComment({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          comment_id: context.payload.comment.id,
                          content: 'rocket',
                      });

            - name: Look up PR details
              id: lookup
              uses: actions/github-script@v7
              with:
                  script: |
                      const prNumber = context.payload.issue.number;
                      const { data: pr } = await github.rest.pulls.get({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          pull_number: prNumber,
                      });
                      const headSha = pr.head.sha;
                      const headRef = pr.head.ref;
                      const shortSha = headSha.slice(0, 7);
                      const channel = `pr-${prNumber}`;

                      const fs = require('fs');
                      const pkg = JSON.parse(
                          fs.readFileSync('apps/learn-card-app/package.json', 'utf-8'),
                      );
                      const bundleVersion = `${pkg.version}-pr${prNumber}.${shortSha}`;

                      core.setOutput('pr_number', String(prNumber));
                      core.setOutput('head_sha', headSha);
                      core.setOutput('head_ref', headRef);
                      core.setOutput('short_sha', shortSha);
                      core.setOutput('channel', channel);
                      core.setOutput('bundle_version', bundleVersion);

            - name: Checkout PR for package.json read
              uses: actions/checkout@v4
              with:
                  ref: ${{ steps.lookup.outputs.head_sha }}

            - name: Post "building" sticky comment
              uses: actions/github-script@v7
              with:
                  script: |
                      const prNumber = ${{ steps.lookup.outputs.pr_number }};
                      const channel = '${{ steps.lookup.outputs.channel }}';
                      const bundle = '${{ steps.lookup.outputs.bundle_version }}';
                      const marker = '<!-- capgo-pr-preview -->';

                      const body = [
                          marker,
                          '## 📲 Capgo PR Preview',
                          '',
                          '| Status | Details |',
                          '|--------|---------|',
                          '| **State** | ⏳ Building & uploading… |',
                          `| **Channel** | \`${channel}\` |`,
                          `| **Bundle** | \`${bundle}\` |`,
                          '',
                          `_Started at ${new Date().toISOString()}_`,
                      ].join('\n');

                      const { data: comments } = await github.rest.issues.listComments({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          issue_number: prNumber,
                      });
                      const existing = comments.find(c => (c.body ?? '').includes(marker));
                      if (existing) {
                          await github.rest.issues.updateComment({
                              owner: context.repo.owner,
                              repo: context.repo.repo,
                              comment_id: existing.id,
                              body,
                          });
                      } else {
                          await github.rest.issues.createComment({
                              owner: context.repo.owner,
                              repo: context.repo.repo,
                              issue_number: prNumber,
                              body,
                          });
                      }

            - name: Add capgo-preview label
              uses: actions/github-script@v7
              with:
                  script: |
                      const prNumber = ${{ steps.lookup.outputs.pr_number }};
                      try {
                          await github.rest.issues.addLabels({
                              owner: context.repo.owner,
                              repo: context.repo.repo,
                              issue_number: prNumber,
                              labels: ['capgo-preview'],
                          });
                      } catch (e) {
                          console.log(`Could not add label: ${e.message}`);
                      }

    upload:
        name: Build & upload PR bundle
        needs: gate
        uses: ./.github/workflows/capgo-upload.yml
        with:
            project: learn-card-app
            app_id: com.learncard.app
            version: ${{ needs.gate.outputs.bundle_version }}
            build_path: apps/learn-card-app/build
            package_json: apps/learn-card-app/package.json
            node_modules_path: apps/learn-card-app/node_modules
            environment: learn-card-app-staging
            channel: ${{ needs.gate.outputs.channel }}
            ref: ${{ needs.gate.outputs.head_sha }}
            tenant: learncard
            stage: staging
            self_assign: 'true'
        secrets:
            CAPGO_TOKEN: ${{ secrets.CAPGO_TOKEN }}

    finalize:
        name: Update PR comment
        needs: [gate, upload]
        if: always() && needs.gate.result == 'success'
        runs-on: ubuntu-latest
        steps:
            - name: Post final sticky comment
              uses: actions/github-script@v7
              with:
                  script: |
                      const prNumber = ${{ needs.gate.outputs.pr_number }};
                      const channel = '${{ needs.gate.outputs.channel }}';
                      const bundle = '${{ needs.gate.outputs.bundle_version }}';
                      const shortSha = '${{ needs.gate.outputs.short_sha }}';
                      const success = '${{ needs.upload.result }}' === 'success';
                      const marker = '<!-- capgo-pr-preview -->';

                      const body = success ? [
                          marker,
                          '## 📲 Capgo PR Preview',
                          '',
                          '| Status | Details |',
                          '|--------|---------|',
                          '| **State** | ✅ Ready |',
                          `| **Channel** | \`${channel}\` |`,
                          `| **Bundle** | \`${bundle}\` |`,
                          `| **Commit** | \`${shortSha}\` |`,
                          '',
                          '### How to try it on a device',
                          '1. Open the installed **LearnCard** app (must be on a native build with the right `defaultChannel`).',
                          '2. Open the side menu → tap the version line in the footer.',
                          '3. Expand **Advanced** → **Switch update channel…**',
                          `4. Pick this PR (\`${channel}\`) from the list, or paste it into the custom field.`,
                          '5. The new bundle will install on next app reload.',
                          '',
                          '> Comment `/capgo-preview` again to re-publish the latest commit on this PR.',
                          '> The channel is torn down automatically when this PR closes or the `capgo-preview` label is removed.',
                          '',
                          `_Uploaded at ${new Date().toISOString()}_`,
                      ].join('\n') : [
                          marker,
                          '## 📲 Capgo PR Preview',
                          '',
                          '| Status | Details |',
                          '|--------|---------|',
                          '| **State** | ❌ Failed |',
                          `| **Channel** | \`${channel}\` |`,
                          '',
                          `Check the [workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) for details.`,
                          '',
                          `_Failed at ${new Date().toISOString()}_`,
                      ].join('\n');

                      const { data: comments } = await github.rest.issues.listComments({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          issue_number: prNumber,
                      });
                      const existing = comments.find(c => (c.body ?? '').includes(marker));
                      if (existing) {
                          await github.rest.issues.updateComment({
                              owner: context.repo.owner,
                              repo: context.repo.repo,
                              comment_id: existing.id,
                              body,
                          });
                      } else {
                          await github.rest.issues.createComment({
                              owner: context.repo.owner,
                              repo: context.repo.repo,
                              issue_number: prNumber,
                              body,
                          });
                      }
