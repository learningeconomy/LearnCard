name: Build E2E Docker Images

# Builds and pushes the monorepo + lca-api Docker images to GHCR on every
# push to main.  PR workflows pull these pre-built images instead of
# rebuilding from scratch, cutting E2E setup from ~15-20 min to ~1 min.

on:
    push:
        branches: [main]
        paths:
            # Only rebuild when something that affects the images changes
            - 'Dockerfile.monorepo'
            - 'services/learn-card-network/lca-api/Dockerfile'
            - 'pnpm-lock.yaml'
            - 'package.json'
            - 'pnpm-workspace.yaml'
            - 'packages/*/package.json'
            - 'services/*/package.json'
            - 'services/**/package.json'
            - 'packages/**/package.json'
            - 'packages/**/src/**'
            - 'services/**/src/**'
    workflow_dispatch:

env:
    REGISTRY: ghcr.io
    IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/learncard

concurrency:
    group: build-e2e-images-${{ github.ref }}
    cancel-in-progress: true

jobs:
    build-monorepo-image:
        name: Build Monorepo Image
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write
        steps:
            - name: Checkout Repo
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Login to GHCR
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Build and push monorepo image
              uses: docker/build-push-action@v6
              with:
                  context: .
                  file: Dockerfile.monorepo
                  push: true
                  tags: |
                      ${{ env.IMAGE_PREFIX }}/monorepo:main
                      ${{ env.IMAGE_PREFIX }}/monorepo:${{ github.sha }}
                  cache-from: type=registry,ref=${{ env.IMAGE_PREFIX }}/monorepo:buildcache
                  cache-to: type=registry,ref=${{ env.IMAGE_PREFIX }}/monorepo:buildcache,mode=max

    build-lca-api-image:
        name: Build LCA API Image
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write
        steps:
            - name: Checkout Repo
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Login to GHCR
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Build and push LCA API image
              uses: docker/build-push-action@v6
              with:
                  context: .
                  file: services/learn-card-network/lca-api/Dockerfile
                  push: true
                  tags: |
                      ${{ env.IMAGE_PREFIX }}/lca-api:main
                      ${{ env.IMAGE_PREFIX }}/lca-api:${{ github.sha }}
                  cache-from: type=registry,ref=${{ env.IMAGE_PREFIX }}/lca-api:buildcache
                  cache-to: type=registry,ref=${{ env.IMAGE_PREFIX }}/lca-api:buildcache,mode=max
