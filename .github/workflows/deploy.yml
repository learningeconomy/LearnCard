name: Deploy

on:
    push:
        branches:
            - main
    workflow_dispatch:
        inputs:
            # Environment selection
            target-environment:
                description: 'Target Environment'
                required: true
                default: 'staging'
                type: choice
                options:
                    - staging
                    - production
                    - scouts
                    - scouts-staging
            # Component selection - which things to deploy
            deploy-brain-service:
                description: 'Deploy Brain Service (Network API)'
                required: false
                default: false
                type: boolean
            deploy-learn-cloud:
                description: 'Deploy LearnCloud (Storage API)'
                required: false
                default: false
                type: boolean
            deploy-lca-api:
                description: 'Deploy LCA API Service'
                required: false
                default: false
                type: boolean
            deploy-frontend:
                description: 'Deploy Frontend (Netlify + CapGo)'
                required: false
                default: false
                type: boolean
            publish-npm:
                description: 'Publish Registry Packages'
                required: false
                default: false
                type: boolean
            publish-app-stores:
                description: 'Publish Native Apps to App Stores (iOS + Android)'
                required: false
                default: false
                type: boolean
            push-docker:
                description: 'Push Docker Images'
                required: false
                default: false
                type: boolean

concurrency: ${{ github.workflow }}-${{ github.ref }}

env:
    CI: true
    AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
    AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
    AWS_DEFAULT_REGION: us-east-1
    SKILL_EMBEDDING_GOOGLE_API_KEY: ${{ secrets.SKILL_EMBEDDING_GOOGLE_API_KEY }}
    MONGOMS_DISABLE_POSTINSTALL: '1'

jobs:
    # ============================================================================
    # DETERMINE WHAT'S AFFECTED
    # ============================================================================
    determine-affected:
        name: Determine Affected Projects
        runs-on: ubuntu-latest
        outputs:
            affected: ${{ steps.affected.outputs.affected }}
            is_release: ${{ steps.check_release.outputs.is_release }}
            is_manual: ${{ steps.check_manual.outputs.is_manual }}
            # For production releases, check which services have version changes
            brain_service_changed: ${{ steps.check_versions.outputs.brain_service_changed }}
            learn_cloud_changed: ${{ steps.check_versions.outputs.learn_cloud_changed }}
            lca_api_changed: ${{ steps.check_versions.outputs.lca_api_changed }}
            lca_app_changed: ${{ steps.check_versions.outputs.lca_app_changed }}
            native_plugin_changed: ${{ steps.check_versions.outputs.native_plugin_changed }}
            # Dynamic environment names
            # target_frontend_env is only consumed by publish-native-apps (fastlane);
            # Netlify/CapGo deploys fan out over frontend_deployment_matrix instead.
            target_frontend_env: ${{ steps.set-env.outputs.frontend_env }}
            service_deployment_matrix: ${{ steps.set-env.outputs.service_deployment_matrix }}
            frontend_deployment_matrix: ${{ steps.set-env.outputs.frontend_deployment_matrix }}
            frontend_matrix_has_legs: ${{ steps.set-env.outputs.frontend_matrix_has_legs }}
        steps:
            # Check these first - no dependencies needed
            - name: Check if this is a manual dispatch
              id: check_manual
              run: |
                  if [[ "${{ github.event_name }}" == 'workflow_dispatch' ]]; then
                    echo "is_manual=true" >> $GITHUB_OUTPUT
                    echo "This is a manual dispatch - skipping affected detection"
                  else
                    echo "is_manual=false" >> $GITHUB_OUTPUT
                  fi

            - name: Check if this is a release commit
              id: check_release
              if: github.event_name != 'workflow_dispatch'
              env:
                  COMMIT_MSG: ${{ github.event.head_commit.message }}
              run: |
                  if [[ "$COMMIT_MSG" == *"chore(release):"* ]]; then
                    echo "is_release=true" >> $GITHUB_OUTPUT
                    echo "This is a release commit"
                  else
                    echo "is_release=false" >> $GITHUB_OUTPUT
                  fi

            # Skip heavy steps for manual dispatch - we already know what to deploy
            - name: Checkout Repo
              if: github.event_name != 'workflow_dispatch'
              uses: actions/checkout@v7
              with:
                  fetch-depth: 0

            - name: Fetch main for NX comparison
              if: github.event_name != 'workflow_dispatch'
              run: git fetch --no-tags --prune origin main

            - name: Use Composite Setup Action
              if: github.event_name != 'workflow_dispatch'
              uses: ./.github/actions/setup

            - name: Get Affected List
              if: github.event_name != 'workflow_dispatch'
              id: affected
              run: |
                  set -o pipefail
                  affected="$(bunx nx show projects --affected --base=HEAD~1 --head=HEAD | paste -sd, -)"
                  echo "affected=$affected" >> "$GITHUB_OUTPUT"
                  echo "Affected projects: $affected"

            - name: Check version changes for release
              if: github.event_name != 'workflow_dispatch'
              id: check_versions
              run: |
                  # Check which packages had version changes in this commit
                  CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD)

                  if echo "$CHANGED_FILES" | grep -q "services/learn-card-network/brain-service/package.json"; then
                    echo "brain_service_changed=true" >> $GITHUB_OUTPUT
                    echo "Brain service version changed"
                  else
                    echo "brain_service_changed=false" >> $GITHUB_OUTPUT
                  fi

                  if echo "$CHANGED_FILES" | grep -q "services/learn-card-network/learn-cloud-service/package.json"; then
                    echo "learn_cloud_changed=true" >> $GITHUB_OUTPUT
                    echo "LearnCloud version changed"
                  else
                    echo "learn_cloud_changed=false" >> $GITHUB_OUTPUT
                  fi

                  if echo "$CHANGED_FILES" | grep -q "services/learn-card-network/lca-api/package.json"; then
                    echo "lca_api_changed=true" >> $GITHUB_OUTPUT
                    echo "LCA API version changed"
                  else
                    echo "lca_api_changed=false" >> $GITHUB_OUTPUT
                  fi

                  if echo "$CHANGED_FILES" | grep -q "apps/learn-card-app/package.json"; then
                    echo "lca_app_changed=true" >> $GITHUB_OUTPUT
                    echo "LearnCard App version changed"
                  else
                    echo "lca_app_changed=false" >> $GITHUB_OUTPUT
                  fi

                  if echo "$CHANGED_FILES" | grep -qE "packages/plugins/didkit-plugin-node/(native|src)/"; then
                    echo "native_plugin_changed=true" >> $GITHUB_OUTPUT
                    echo "Native DIDKit plugin changed - will wait for prebuilds"
                  else
                    echo "native_plugin_changed=false" >> $GITHUB_OUTPUT
                  fi

            - name: Determine Deployment Environments
              id: set-env
              run: |
                  LC_STAGING='{"name":"LearnCard Staging","brain_env":"learn-cloud-network-api-staging","cloud_env":"learn-cloud-storage-api-staging","lca_api_env":"learn-card-app-api-staging"}'
                  LC_PRODUCTION='{"name":"LearnCard Production","brain_env":"learn-cloud-network-api-production","cloud_env":"learn-cloud-storage-api-production","lca_api_env":"learn-card-app-api-production"}'
                  SCOUTS_STAGING='{"name":"ScoutPass Staging","brain_env":"scout-network-api-staging","cloud_env":"scout-storage-api-staging","lca_api_env":"scout-app-api-staging"}'
                  SCOUTS_PRODUCTION='{"name":"ScoutPass Production","brain_env":"scout-network-api-production","cloud_env":"scout-storage-api-production","lca_api_env":"scout-app-api-production"}'

                  # Frontend legs mirror the service matrix, one Netlify site per GitHub
                  # Environment. capgo=false on automatic staging legs: the LearnCard staging
                  # OTA is owned by capgo-staging.yml (prod-config rationale documented there),
                  # and ScoutPass staging has no OTA channel.
                  LC_FE_STAGING='{"name":"LearnCard Staging","environment":"learn-card-app-staging","capgo":false}'
                  LC_FE_STAGING_MANUAL='{"name":"LearnCard Staging","environment":"learn-card-app-staging","capgo":true}'
                  LC_FE_PRODUCTION='{"name":"LearnCard Production","environment":"learn-card-app-production","capgo":true}'
                  SCOUTS_FE_STAGING='{"name":"ScoutPass Staging","environment":"scout-app-staging","capgo":false}'
                  SCOUTS_FE_STAGING_MANUAL='{"name":"ScoutPass Staging","environment":"scout-app-staging","capgo":true}'
                  SCOUTS_FE_PRODUCTION='{"name":"ScoutPass Production","environment":"scout-app-production","capgo":true}'

                  set_service_matrix() {
                    local legs
                    legs=$(IFS=,; echo "$*")
                    echo "service_deployment_matrix={\"include\":[${legs}]}" >> "$GITHUB_OUTPUT"
                  }

                  set_frontend_matrix() {
                    local legs
                    legs=$(IFS=,; echo "$*")
                    echo "frontend_deployment_matrix={\"include\":[${legs}]}" >> "$GITHUB_OUTPUT"
                    if [[ -n "$legs" ]]; then
                      echo "frontend_matrix_has_legs=true" >> "$GITHUB_OUTPUT"
                    else
                      echo "frontend_matrix_has_legs=false" >> "$GITHUB_OUTPUT"
                    fi
                  }

                  AFFECTED="${{ steps.affected.outputs.affected }}"

                  is_affected() {
                    tr ',' '\n' <<< "$AFFECTED" | grep -qx "$1"
                  }

                  if [[ "${{ github.event_name }}" == 'workflow_dispatch' && "${{ github.event.inputs.target-environment }}" == 'scouts' ]]; then
                    echo "frontend_env=scout-app-production" >> "$GITHUB_OUTPUT"
                    set_service_matrix "$SCOUTS_PRODUCTION"
                    set_frontend_matrix "$SCOUTS_FE_PRODUCTION"
                  elif [[ "${{ github.event_name }}" == 'workflow_dispatch' && "${{ github.event.inputs.target-environment }}" == 'scouts-staging' ]]; then
                    echo "frontend_env=scout-app-staging" >> "$GITHUB_OUTPUT"
                    set_service_matrix "$SCOUTS_STAGING"
                    set_frontend_matrix "$SCOUTS_FE_STAGING_MANUAL"
                  elif [[ "${{ github.event_name }}" == 'workflow_dispatch' && "${{ github.event.inputs.target-environment }}" == 'production' ]]; then
                    echo "frontend_env=learn-card-app-production" >> "$GITHUB_OUTPUT"
                    set_service_matrix "$LC_PRODUCTION"
                    set_frontend_matrix "$LC_FE_PRODUCTION"
                  elif [[ "${{ github.event_name }}" == 'workflow_dispatch' ]]; then
                    echo "frontend_env=learn-card-app-staging" >> "$GITHUB_OUTPUT"
                    set_service_matrix "$LC_STAGING"
                    set_frontend_matrix "$LC_FE_STAGING_MANUAL"
                  elif [[ "${{ steps.check_release.outputs.is_release }}" == 'true' ]]; then
                    # ScoutPass production is deliberately excluded from release
                    # pushes — it deploys only via the manual 'scouts' dispatch.
                    echo "frontend_env=learn-card-app-production" >> "$GITHUB_OUTPUT"
                    set_service_matrix "$LC_PRODUCTION"
                    if [[ "${{ steps.check_versions.outputs.lca_app_changed }}" == 'true' ]]; then
                      set_frontend_matrix "$LC_FE_PRODUCTION"
                    else
                      set_frontend_matrix
                    fi
                  else
                    echo "frontend_env=learn-card-app-staging" >> "$GITHUB_OUTPUT"
                    set_service_matrix "$LC_STAGING" "$SCOUTS_STAGING"
                    # Normal main push: staging front-ends deploy from CI (replacing
                    # Netlify branch builds), only when their Nx project is affected.
                    FE_LEGS=()
                    if is_affected learn-card-app; then
                      FE_LEGS+=("$LC_FE_STAGING")
                    fi
                    if is_affected scouts; then
                      FE_LEGS+=("$SCOUTS_FE_STAGING")
                    fi
                    set_frontend_matrix "${FE_LEGS[@]}"
                  fi

    # ============================================================================
    # BUILD NATIVE PLUGIN (for Lambda deploys - Linux x64)
    # ============================================================================
    build-native-plugin:
        name: Build Native DIDKit Plugin
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Repo
              uses: actions/checkout@v7
              with:
                  submodules: true

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2

            - name: Setup Bun cache
              uses: actions/cache@v6
              with:
                  path: ~/.bun/install/cache
                  key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
                  restore-keys: |
                      ${{ runner.os }}-bun-

            - name: Setup Rust
              uses: dtolnay/rust-toolchain@stable
              with:
                  toolchain: stable
                  targets: x86_64-unknown-linux-gnu

            - name: Cache cargo
              uses: actions/cache@v6
              with:
                  path: |
                      ~/.cargo/registry/index/
                      ~/.cargo/registry/cache/
                      ~/.cargo/git/db/
                      packages/plugins/didkit-plugin-node/native/target/
                  key: linux-x64-cargo-${{ hashFiles('**/Cargo.lock') }}

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Build native plugin
              working-directory: packages/plugins/didkit-plugin-node
              env:
                  BUILD_DIDKIT_NAPI: true
              run: |
                  bunx nx build didkit-plugin-node
                  strip -x *.node

            - name: Upload native binary
              uses: actions/upload-artifact@v4
              with:
                  name: didkit-native-linux-x64
                  path: |
                      packages/plugins/didkit-plugin-node/*.node
                      packages/plugins/didkit-plugin-node/dist/**
                  if-no-files-found: error
                  retention-days: 1

    # ============================================================================
    # TESTING (skip on production releases and manual deploys)
    # ============================================================================
    test-affected:
        name: Test Affected Projects
        needs: [determine-affected, build-native-plugin]
        if: |
            needs.determine-affected.outputs.affected != '' &&
            needs.determine-affected.outputs.is_release != 'true' &&
            needs.determine-affected.outputs.is_manual != 'true'
        runs-on: ubuntu-latest
        environment: ci-tests
        steps:
            - name: Checkout Repo
              uses: actions/checkout@v7
              with:
                  fetch-depth: 0

            - name: Download native plugin binary
              uses: actions/download-artifact@v4
              with:
                  name: didkit-native-linux-x64
                  path: packages/plugins/didkit-plugin-node

            - name: Use Composite Setup Action
              uses: ./.github/actions/setup

            - name: Run tests
              uses: nick-fields/retry@v2
              with:
                  timeout_minutes: 10
                  max_attempts: 3
                  command: bunx nx affected --target=test --base=HEAD~1 --head=HEAD
              env:
                  SEED: ${{ secrets.SEED }}
                  LEARN_CLOUD_SEED: ${{ secrets.LEARN_CLOUD_SEED }}

    # ============================================================================
    # SERVICE DEPLOYMENTS
    # Triggers:
    #   - Push: Deploy to staging if affected
    #   - Release: Deploy to production if version changed
    #   - Manual: Deploy to selected environment if selected
    # ============================================================================
    deploy-brain-service:
        name: Deploy Brain Service (${{ matrix.name }})
        needs: [determine-affected, test-affected, build-native-plugin]
        if: |
            always() &&
            !cancelled() &&
            (
              (needs.determine-affected.outputs.is_manual == 'true' && github.event.inputs.deploy-brain-service == 'true') ||
              (needs.determine-affected.outputs.is_release == 'true' && needs.determine-affected.outputs.brain_service_changed == 'true') ||
              (needs.determine-affected.outputs.is_manual != 'true' && needs.determine-affected.outputs.is_release != 'true' && needs.test-affected.result == 'success' && contains(needs.determine-affected.outputs.affected, 'network-brain-service'))
            )
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix: ${{ fromJSON(needs.determine-affected.outputs.service_deployment_matrix) }}
        environment: ${{ matrix.brain_env }}
        steps:
            - name: Checkout Repo
              uses: actions/checkout@v7

            - name: Download native plugin binary
              uses: actions/download-artifact@v4
              with:
                  name: didkit-native-linux-x64
                  path: packages/plugins/didkit-plugin-node

            - name: Use Composite Setup Action
              uses: ./.github/actions/setup

            - name: Install Serverless packager
              run: npm install -g pnpm@9.12.3

            - name: Validate deployment target
              run: |
                  echo "========================================"
                  echo "DEPLOYMENT TARGET VALIDATION"
                  echo "========================================"
                  echo "GitHub Environment: ${{ matrix.brain_env }}"
                  echo "Service Name:       ${{ vars.SERVERLESS_SERVICE_NAME }}"
                  echo "Domain:             ${{ vars.SERVERLESS_DOMAIN_NAME }}"
                  echo "Hosted Zone:        ${{ vars.SERVERLESS_HOSTED_ZONE_NAMES }}"
                  echo "Stage:              ${{ vars.SERVERLESS_STAGE }}"
                  echo "Region:             ${{ vars.SERVERLESS_REGION }}"
                  echo "========================================"

                  FAILED=false

                  if [[ -z "${{ vars.SERVERLESS_SERVICE_NAME }}" ]]; then
                    echo "::error::SERVERLESS_SERVICE_NAME is not set in environment '${{ matrix.brain_env }}'!"
                    FAILED=true
                  fi
                  if [[ -z "${{ vars.SERVERLESS_DOMAIN_NAME }}" ]]; then
                    echo "::error::SERVERLESS_DOMAIN_NAME is not set in environment '${{ matrix.brain_env }}'!"
                    FAILED=true
                  fi
                  if [[ -z "${{ vars.SERVERLESS_HOSTED_ZONE_NAMES }}" ]]; then
                    echo "::error::SERVERLESS_HOSTED_ZONE_NAMES is not set in environment '${{ matrix.brain_env }}'!"
                    FAILED=true
                  fi
                  if [[ -z "${{ vars.SERVERLESS_STAGE }}" ]]; then
                    echo "::error::SERVERLESS_STAGE is not set in environment '${{ matrix.brain_env }}'!"
                    FAILED=true
                  fi
                  if [[ -z "${{ vars.SERVERLESS_REGION }}" ]]; then
                    echo "::error::SERVERLESS_REGION is not set in environment '${{ matrix.brain_env }}'!"
                    FAILED=true
                  fi

                  if [[ "$FAILED" == "true" ]]; then
                    echo "::error::Aborting deploy — required variables are missing. Configure them in the GitHub environment settings."
                    exit 1
                  fi

            - name: Deploy Brain Service Lambda
              run: bunx nx serverless-deploy network-brain-service --stage ${{ vars.SERVERLESS_STAGE }} --region ${{ vars.SERVERLESS_REGION }}
              env:
                  PNPM_CONFIG_PACKAGE_MANAGER_STRICT: 'false'
                  CLIENT_APP_DOMAIN_NAME: ${{ vars.CLIENT_APP_DOMAIN_NAME }}
                  POSTMARK_FROM_EMAIL: ${{ vars.POSTMARK_FROM_EMAIL }}
                  SERVERLESS_CACHE_INSTANCE_SIZE: ${{ vars.SERVERLESS_CACHE_INSTANCE_SIZE }}
                  SERVERLESS_HOSTED_ZONE_NAMES: ${{ vars.SERVERLESS_HOSTED_ZONE_NAMES }}
                  SERVERLESS_DOMAIN_NAME: ${{ vars.SERVERLESS_DOMAIN_NAME }}
                  SERVERLESS_REGION: ${{ vars.SERVERLESS_REGION }}
                  SERVERLESS_SERVICE_NAME: ${{ vars.SERVERLESS_SERVICE_NAME }}
                  APP_STORE_ADMIN_PROFILE_IDS: ${{ vars.APP_STORE_ADMIN_PROFILE_IDS }}
                  SEED: ${{ secrets.SEED }}
                  DOMAIN_NAME: ${{ secrets.DOMAIN_NAME }}
                  NOTIFICATIONS_SERVICE_WEBHOOK_URL: ${{ secrets.NOTIFICATIONS_SERVICE_WEBHOOK_URL }}
                  NEO4J_URI: ${{ secrets.NEO4J_URI }}
                  NEO4J_USERNAME: ${{ secrets.NEO4J_USERNAME }}
                  NEO4J_PASSWORD: ${{ secrets.NEO4J_PASSWORD }}
                  POSTMARK_API_KEY: ${{ secrets.POSTMARK_API_KEY }}
                  MESSAGEBIRD_AUTH_TOKEN: ${{ secrets.MESSAGEBIRD_AUTH_TOKEN }}
                  MESSAGEBIRD_ORIGINATOR: ${{ secrets.MESSAGEBIRD_ORIGINATOR }}
                  SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
                  SENTRY_ENV: ${{ secrets.SENTRY_ENV }}
                  SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
                  SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
                  SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
                  SMART_RESUME_CLIENT_ID: ${{ secrets.SMART_RESUME_CLIENT_ID }}
                  SMART_RESUME_ACCESS_KEY: ${{ secrets.SMART_RESUME_ACCESS_KEY }}
                  SMART_RESUME_CONTRACT_URI: ${{ secrets.SMART_RESUME_CONTRACT_URI }}
                  LOGIN_PROVIDER_DID: ${{ secrets.LOGIN_PROVIDER_DID }}
                  SKILL_EMBEDDING_GOOGLE_API_KEY: ${{ secrets.SKILL_EMBEDDING_GOOGLE_API_KEY }}
                  SKILL_EMBEDDING_GOOGLE_MODEL: ${{ secrets.SKILL_EMBEDDING_GOOGLE_MODEL }}
                  SKILL_EMBEDDING_BATCH_SIZE: ${{ secrets.SKILL_EMBEDDING_BATCH_SIZE }}
                  SKILL_EMBEDDING_BACKFILL_ON_STARTUP: ${{ secrets.SKILL_EMBEDDING_BACKFILL_ON_STARTUP }}
                  SKILL_EMBEDDING_BACKFILL_LOCK_TTL_SECONDS: ${{ secrets.SKILL_EMBEDDING_BACKFILL_LOCK_TTL_SECONDS }}
                  SKILL_EMBEDDING_BACKFILL_PAGE_SIZE: ${{ secrets.SKILL_EMBEDDING_BACKFILL_PAGE_SIZE }}
                  SKILL_EMBEDDING_BACKFILL_BATCH_SIZE: ${{ secrets.SKILL_EMBEDDING_BACKFILL_BATCH_SIZE }}
                  OIDC_TRUSTED_ISSUERS: ${{ vars.OIDC_TRUSTED_ISSUERS }}
                  OIDC_EXPECTED_AUDIENCE: ${{ vars.OIDC_EXPECTED_AUDIENCE }}
                  # LC-1644 perf bench backend telemetry (admin-only). POSTHOG_HOST is a var (non-secret),
                  # POSTHOG_API_KEY is a secret. GIT_SHA is the deploy commit for tagging events.
                  POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
                  POSTHOG_HOST: ${{ vars.POSTHOG_HOST }}
                  GIT_SHA: ${{ github.sha }}

    deploy-learn-cloud:
        name: Deploy LearnCloud (${{ matrix.name }})
        needs: [determine-affected, test-affected, build-native-plugin]
        if: |
            always() &&
            !cancelled() &&
            (
                (needs.determine-affected.outputs.is_manual == 'true' && github.event.inputs.deploy-learn-cloud == 'true') ||
                (needs.determine-affected.outputs.is_release == 'true' && needs.determine-affected.outputs.learn_cloud_changed == 'true') ||
                (needs.determine-affected.outputs.is_manual != 'true' && needs.determine-affected.outputs.is_release != 'true' && needs.test-affected.result == 'success' && contains(needs.determine-affected.outputs.affected, 'learn-cloud-service'))
            )
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix: ${{ fromJSON(needs.determine-affected.outputs.service_deployment_matrix) }}
        environment: ${{ matrix.cloud_env }}
        steps:
            - name: Checkout Repo
              uses: actions/checkout@v7

            - name: Download native plugin binary
              uses: actions/download-artifact@v4
              with:
                  name: didkit-native-linux-x64
                  path: packages/plugins/didkit-plugin-node

            - name: Use Composite Setup Action
              uses: ./.github/actions/setup

            - name: Install Serverless packager
              run: npm install -g pnpm@9.12.3

            - name: Validate deployment target
              run: |
                  echo "========================================"
                  echo "DEPLOYMENT TARGET VALIDATION"
                  echo "========================================"
                  echo "GitHub Environment: ${{ matrix.cloud_env }}"
                  echo "Service Name:       ${{ vars.SERVERLESS_SERVICE_NAME }}"
                  echo "Domain:             ${{ vars.SERVERLESS_DOMAIN_NAME }}"
                  echo "Hosted Zone:        ${{ vars.SERVERLESS_HOSTED_ZONE_NAMES }}"
                  echo "Stage:              ${{ vars.SERVERLESS_STAGE }}"
                  echo "Region:             ${{ vars.SERVERLESS_REGION }}"
                  echo "========================================"

                  FAILED=false

                  if [[ -z "${{ vars.SERVERLESS_SERVICE_NAME }}" ]]; then
                    echo "::error::SERVERLESS_SERVICE_NAME is not set in environment '${{ matrix.cloud_env }}'!"
                    FAILED=true
                  fi
                  if [[ -z "${{ vars.SERVERLESS_DOMAIN_NAME }}" ]]; then
                    echo "::error::SERVERLESS_DOMAIN_NAME is not set in environment '${{ matrix.cloud_env }}'!"
                    FAILED=true
                  fi
                  if [[ -z "${{ vars.SERVERLESS_HOSTED_ZONE_NAMES }}" ]]; then
                    echo "::error::SERVERLESS_HOSTED_ZONE_NAMES is not set in environment '${{ matrix.cloud_env }}'!"
                    FAILED=true
                  fi
                  if [[ -z "${{ vars.SERVERLESS_STAGE }}" ]]; then
                    echo "::error::SERVERLESS_STAGE is not set in environment '${{ matrix.cloud_env }}'!"
                    FAILED=true
                  fi
                  if [[ -z "${{ vars.SERVERLESS_REGION }}" ]]; then
                    echo "::error::SERVERLESS_REGION is not set in environment '${{ matrix.cloud_env }}'!"
                    FAILED=true
                  fi

                  if [[ "$FAILED" == "true" ]]; then
                    echo "::error::Aborting deploy — required variables are missing. Configure them in the GitHub environment settings."
                    exit 1
                  fi

            - name: Deploy LearnCloud Lambda
              run: bunx nx serverless-deploy learn-cloud-service --stage ${{ vars.SERVERLESS_STAGE }} --region ${{ vars.SERVERLESS_REGION }}
              env:
                  PNPM_CONFIG_PACKAGE_MANAGER_STRICT: 'false'
                  SERVER_URL: ${{ vars.SERVER_URL }}
                  SERVERLESS_CACHE_INSTANCE_SIZE: ${{ vars.SERVERLESS_CACHE_INSTANCE_SIZE }}
                  SERVERLESS_HOSTED_ZONE_NAMES: ${{ vars.SERVERLESS_HOSTED_ZONE_NAMES }}
                  SERVERLESS_DOMAIN_NAME: ${{ vars.SERVERLESS_DOMAIN_NAME }}
                  SERVERLESS_REGION: ${{ vars.SERVERLESS_REGION }}
                  SERVERLESS_SERVICE_NAME: ${{ vars.SERVERLESS_SERVICE_NAME }}
                  LEARN_CLOUD_SEED: ${{ secrets.LEARN_CLOUD_SEED }}
                  LEARN_CLOUD_MONGO_URI: ${{ secrets.LEARN_CLOUD_MONGO_URI }}
                  LEARN_CLOUD_MONGO_DB_NAME: ${{ secrets.LEARN_CLOUD_MONGO_DB_NAME }}
                  XAPI_ENDPOINT: ${{ secrets.XAPI_ENDPOINT }}
                  XAPI_USERNAME: ${{ secrets.XAPI_USERNAME }}
                  XAPI_PASSWORD: ${{ secrets.XAPI_PASSWORD }}
                  RSA_PRIVATE_KEY: ${{ secrets.RSA_PRIVATE_KEY }}
                  RSA_PUBLIC_KEY: ${{ secrets.RSA_PUBLIC_KEY }}
                  JWT_SIGNING_KEY: ${{ secrets.JWT_SIGNING_KEY }}
                  SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
                  SENTRY_ENV: ${{ secrets.SENTRY_ENV }}
                  SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
                  SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
                  SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}

    deploy-lca-api:
        name: Deploy LCA API (${{ matrix.name }})
        needs: [determine-affected, test-affected, build-native-plugin]
        if: |
            always() &&
            !cancelled() &&
            (
                (needs.determine-affected.outputs.is_manual == 'true' && github.event.inputs.deploy-lca-api == 'true') ||
                (needs.determine-affected.outputs.is_release == 'true' && needs.determine-affected.outputs.lca_api_changed == 'true') ||
                (needs.determine-affected.outputs.is_manual != 'true' && needs.determine-affected.outputs.is_release != 'true' && needs.test-affected.result == 'success' && contains(needs.determine-affected.outputs.affected, 'lca-api-service'))
            )
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix: ${{ fromJSON(needs.determine-affected.outputs.service_deployment_matrix) }}
        environment: ${{ matrix.lca_api_env }}
        steps:
            - name: Checkout Repo
              uses: actions/checkout@v7

            - name: Download native plugin binary
              uses: actions/download-artifact@v4
              with:
                  name: didkit-native-linux-x64
                  path: packages/plugins/didkit-plugin-node

            - name: Use Composite Setup Action
              uses: ./.github/actions/setup

            - name: Install Serverless packager
              run: npm install -g pnpm@9.12.3

            - name: Validate deployment target
              run: |
                  echo "========================================"
                  echo "DEPLOYMENT TARGET VALIDATION"
                  echo "========================================"
                  echo "GitHub Environment: ${{ matrix.lca_api_env }}"
                  echo "Service Name:       ${{ vars.SERVERLESS_SERVICE_NAME }}"
                  echo "Domain:             ${{ vars.SERVERLESS_DOMAIN_NAME }}"
                  echo "Hosted Zone:        ${{ vars.SERVERLESS_HOSTED_ZONE_NAMES }}"
                  echo "Stage:              ${{ vars.SERVERLESS_STAGE }}"
                  echo "Region:             ${{ vars.SERVERLESS_REGION }}"
                  echo "========================================"

                  FAILED=false

                  if [[ -z "${{ vars.SERVERLESS_SERVICE_NAME }}" ]]; then
                    echo "::error::SERVERLESS_SERVICE_NAME is not set in environment '${{ matrix.lca_api_env }}'!"
                    FAILED=true
                  fi
                  if [[ -z "${{ vars.SERVERLESS_DOMAIN_NAME }}" ]]; then
                    echo "::error::SERVERLESS_DOMAIN_NAME is not set in environment '${{ matrix.lca_api_env }}'!"
                    FAILED=true
                  fi
                  if [[ -z "${{ vars.SERVERLESS_HOSTED_ZONE_NAMES }}" ]]; then
                    echo "::error::SERVERLESS_HOSTED_ZONE_NAMES is not set in environment '${{ matrix.lca_api_env }}'!"
                    FAILED=true
                  fi
                  if [[ -z "${{ vars.SERVERLESS_STAGE }}" ]]; then
                    echo "::error::SERVERLESS_STAGE is not set in environment '${{ matrix.lca_api_env }}'!"
                    FAILED=true
                  fi
                  if [[ -z "${{ vars.SERVERLESS_REGION }}" ]]; then
                    echo "::error::SERVERLESS_REGION is not set in environment '${{ matrix.lca_api_env }}'!"
                    FAILED=true
                  fi

                  if [[ "$FAILED" == "true" ]]; then
                    echo "::error::Aborting deploy — required variables are missing. Configure them in the GitHub environment settings."
                    exit 1
                  fi

            - name: Deploy LCA API Service Lambda
              run: bunx nx serverless-deploy lca-api-service --stage ${{ vars.SERVERLESS_STAGE }} --region ${{ vars.SERVERLESS_REGION }}
              env:
                  PNPM_CONFIG_PACKAGE_MANAGER_STRICT: 'false'
                  SERVERLESS_SERVICE_NAME: ${{ vars.SERVERLESS_SERVICE_NAME }}
                  SERVERLESS_HOSTED_ZONE_NAMES: ${{ vars.SERVERLESS_HOSTED_ZONE_NAMES }}
                  SERVERLESS_DOMAIN_NAME: ${{ vars.SERVERLESS_DOMAIN_NAME }}
                  SERVERLESS_REGION: ${{ vars.SERVERLESS_REGION }}
                  DOMAIN_NAME: ${{ vars.DOMAIN_NAME }}
                  SEED: ${{ secrets.SEED }}
                  METABASE_SECRET_KEY: ${{ secrets.METABASE_SECRET_KEY }}
                  POSTMARK_SERVER_TOKEN: ${{ secrets.POSTMARK_SERVER_TOKEN }}
                  POSTMARK_LOGIN_CODE_TEMPLATE_ALIAS: ${{ vars.POSTMARK_LOGIN_CODE_TEMPLATE_ALIAS }}
                  POSTMARK_ENDORSEMENT_REQUEST_TEMPLATE_ALIAS: ${{ vars.POSTMARK_ENDORSEMENT_REQUEST_TEMPLATE_ALIAS }}
                  POSTMARK_RECOVERY_EMAIL_CODE_TEMPLATE_ALIAS: ${{ vars.POSTMARK_RECOVERY_EMAIL_CODE_TEMPLATE_ALIAS }}
                  POSTMARK_RECOVERY_KEY_TEMPLATE_ALIAS: ${{ vars.POSTMARK_RECOVERY_KEY_TEMPLATE_ALIAS }}
                  POSTMARK_FROM_EMAIL: ${{ secrets.POSTMARK_FROM_EMAIL }}
                  POSTMARK_BRAND_NAME: ${{ secrets.POSTMARK_BRAND_NAME }}
                  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
                  AUTHORIZED_DIDS: ${{ secrets.AUTHORIZED_DIDS }}
                  GOOGLE_APPLICATION_CREDENTIAL: ${{ secrets.GOOGLE_APPLICATION_CREDENTIAL }}
                  MONGO_URI: ${{ secrets.MONGO_URI }}
                  MONGO_DB_NAME: ${{ secrets.MONGO_DB_NAME }}
                  SCOUTS_SSO_CLIENT_SECRET: ${{ secrets.SCOUTS_SSO_CLIENT_SECRET }}
                  LEARN_CLOUD_URL: ${{ secrets.LEARN_CLOUD_URL }}
                  SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
                  SENTRY_ENV: ${{ secrets.SENTRY_ENV }}
                  SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
                  SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
                  SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
                  GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}

    # ============================================================================
    # SDK GENERATION (after brain-service deploy, only on staging)
    # ============================================================================
    generate-sdk:
        name: Generate SDK Clients
        needs: [determine-affected, deploy-brain-service]
        if: |
            always() &&
            needs.deploy-brain-service.result == 'success' &&
            needs.determine-affected.outputs.is_release != 'true' &&
            contains(needs.determine-affected.outputs.affected, 'network-brain-service')
        uses: ./.github/workflows/open-api-generator.yml
        with:
            affected: ${{ needs.determine-affected.outputs.affected }}

    # ============================================================================
    # FRONTEND DEPLOYMENTS
    # Triggers:
    #   - Push: Deploy affected front-ends to their staging Netlify sites
    #   - Release: Deploy LearnCard production if version changed
    #   - Manual: Deploy to selected environment if selected
    # Waits for any services that are deploying to complete first.
    # ============================================================================
    deploy-frontend:
        name: Deploy Frontend (${{ matrix.name }})
        needs:
            [
                determine-affected,
                test-affected,
                deploy-brain-service,
                deploy-learn-cloud,
                deploy-lca-api,
            ]
        if: |
            always() &&
            !cancelled() &&
            needs.determine-affected.outputs.frontend_matrix_has_legs == 'true' &&
            (
                (needs.determine-affected.outputs.is_manual == 'true' && github.event.inputs.deploy-frontend == 'true') ||
                (needs.determine-affected.outputs.is_manual == 'true' && github.event.inputs.target-environment == 'scouts') ||
                (needs.determine-affected.outputs.is_release == 'true' && needs.determine-affected.outputs.lca_app_changed == 'true') ||
                (needs.determine-affected.outputs.is_manual != 'true' && needs.determine-affected.outputs.is_release != 'true' && needs.test-affected.result == 'success')
            ) &&
            !contains(needs.deploy-brain-service.result, 'failure') &&
            !contains(needs.deploy-learn-cloud.result, 'failure') &&
            !contains(needs.deploy-lca-api.result, 'failure')
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix: ${{ fromJSON(needs.determine-affected.outputs.frontend_deployment_matrix) }}
        environment: ${{ matrix.environment }}
        steps:
            - name: Set Deployment Variables
              id: vars
              run: |
                  echo "app_id=${{ vars.DEPLOY_APP_ID }}" >> "$GITHUB_OUTPUT"
                  echo "project_name=${{ vars.DEPLOY_PROJECT_NAME }}" >> "$GITHUB_OUTPUT"
                  echo "netlify_site_id=${{ vars.NETLIFY_SITE_ID }}" >> "$GITHUB_OUTPUT"
                  echo "capgo_id=${{ vars.APP_ID }}" >> "$GITHUB_OUTPUT"
                  echo "build_path=${{ vars.DEPLOY_BUILD_PATH }}" >> "$GITHUB_OUTPUT"

            - name: Checkout Repo
              uses: actions/checkout@v7

            - name: Use Composite Setup Action
              uses: ./.github/actions/setup

            - name: Get App Version
              id: app-version
              if: matrix.capgo
              run: |
                  VERSION=$(bun -e "console.log(require('./apps/${{ steps.vars.outputs.project_name }}/package.json').version)")
                  echo "version=$VERSION" >> "$GITHUB_OUTPUT"

            - name: Get CapGo Channel
              id: capgo-channel
              if: matrix.capgo
              run: |
                  CHANNEL=$(bun tools/capgo/getCapgoChannel.js --app ${{ steps.vars.outputs.app_id }})
                  echo "channel=$CHANNEL" >> "$GITHUB_OUTPUT"

            # Prepare tenant config for learn-card-app builds.
            # Uses TENANT and STAGE vars from the GitHub Environment (defaults: learncard, no stage).
            # Scouts app does not use the tenant config system yet — skip for non-LCA projects.
            - name: Prepare tenant config
              if: steps.vars.outputs.project_name == 'learn-card-app'
              working-directory: apps/learn-card-app
              run: |
                  TENANT="${{ vars.TENANT || 'learncard' }}"
                  STAGE="${{ vars.STAGE || '' }}"
                  STAGE_FLAG=""
                  if [[ -n "$STAGE" ]]; then
                    STAGE_FLAG="--stage $STAGE"
                  fi
                  echo "Preparing tenant config: $TENANT $STAGE_FLAG"
                  bunx tsx scripts/prepare-native-config.ts "$TENANT" $STAGE_FLAG

            # Generate the resolved per-tenant configs consumed by the Netlify edge
            # function (netlify/edge-functions/shared/resolved-tenant-configs.generated.json).
            # This previously ran inside Netlify's own build command; now that CI builds the
            # artifact and deploys it with `--no-build`, we must generate it here so the
            # edge function bundles the up-to-date data. LCA only — Scouts has no edge config.
            - name: Generate edge tenant configs
              if: steps.vars.outputs.project_name == 'learn-card-app'
              working-directory: apps/learn-card-app
              run: bun scripts/generate-edge-tenant-configs.ts

            - name: Build App
              run: bunx nx build ${{ steps.vars.outputs.project_name }}
              env:
                  NODE_ENV: ${{ vars.NODE_ENV }}
                  VITE_NODE_ENV: ${{ vars.VITE_NODE_ENV }}
                  SENTRY_ENV: ${{ vars.SENTRY_ENV }}
                  SENTRY_DSN: ${{ vars.SENTRY_DSN }}
                  GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
                  VITE_WEB3AUTH_CLIENT_ID: ${{ secrets.VITE_WEB3AUTH_CLIENT_ID }}
                  VITE_WEB3AUTH_NETWORK: ${{ vars.VITE_WEB3AUTH_NETWORK }}
                  VITE_WEB3AUTH_VERIFIER_ID: ${{ vars.VITE_WEB3AUTH_VERIFIER_ID }}
                  VITE_WEB3AUTH_RPC_TARGET: ${{ secrets.VITE_WEB3AUTH_RPC_TARGET }}
                  VITE_AUTH_PROVIDER: ${{ vars.VITE_AUTH_PROVIDER }}
                  VITE_KEY_DERIVATION: ${{ vars.VITE_KEY_DERIVATION }}
                  VITE_SSS_SERVER_URL: ${{ vars.VITE_SSS_SERVER_URL }}
                  VITE_ENABLE_EMAIL_BACKUP_SHARE: ${{ vars.VITE_ENABLE_EMAIL_BACKUP_SHARE }}
                  VITE_ENABLE_AUTH_DEBUG_WIDGET: ${{ vars.VITE_ENABLE_AUTH_DEBUG_WIDGET }}
                  VITE_REQUIRE_EMAIL_FOR_PHONE_USERS: ${{ vars.VITE_REQUIRE_EMAIL_FOR_PHONE_USERS }}
                  VITE_ANALYTICS_PROVIDER: ${{ vars.VITE_ANALYTICS_PROVIDER }}
                  VITE_POSTHOG_KEY: ${{ secrets.VITE_POSTHOG_KEY }}
                  # Backend URL build defines (Scouts app, apps/scouts/vite.config.ts). These
                  # used to come from netlify.toml build contexts; now they must be set as
                  # GitHub Environment vars (e.g. scout-app-staging → staging.scoutnetwork.org).
                  # When unset, Networks.ts falls back to production ScoutPass endpoints.
                  LCN_URL: ${{ vars.LCN_URL }}
                  LCN_API_URL: ${{ vars.LCN_API_URL }}
                  CLOUD_URL: ${{ vars.CLOUD_URL }}
                  LEARN_CLOUD_XAPI_URL: ${{ vars.LEARN_CLOUD_XAPI_URL }}
                  API_URL: ${{ vars.API_URL }}

            - name: Validate Netlify target
              run: |
                  if [[ -z "${{ steps.vars.outputs.netlify_site_id }}" ]]; then
                    echo "::error::NETLIFY_SITE_ID is not set in environment '${{ matrix.environment }}'! Configure it in the GitHub environment settings."
                    exit 1
                  fi

            # Deploy the pre-built web artifact straight to Netlify, keyed off the GitHub
            # Environment's NETLIFY_SITE_ID. This replaces the old force-push-to-deploy-branch
            # mechanism, so the deploy branch can be removed and `main` fully branch-protected.
            # --no-build: CI already built above; Netlify must not rebuild. Runs from the app
            # directory so netlify.toml (headers/redirects/edge functions) resolves correctly.
            - name: Deploy to Netlify
              working-directory: apps/${{ steps.vars.outputs.project_name }}
              run: |
                  bunx netlify-cli@26 deploy \
                    --prod \
                    --no-build \
                    --dir build \
                    --site "${{ steps.vars.outputs.netlify_site_id }}" \
                    --message "CI deploy ${{ github.sha }}"
              env:
                  NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}

            # Deploy OTA update to CapGo
            - name: Upload to CapGo
              if: matrix.capgo
              run: |
                  bunx @capgo/cli@latest bundle upload \
                    ${{ steps.vars.outputs.capgo_id }} \
                    --delta \
                    --apikey ${{ secrets.CAPGO_TOKEN }} \
                    --path ${{ steps.vars.outputs.build_path }} \
                    --channel ${{ steps.capgo-channel.outputs.channel }} \
                    --bundle ${{ steps.app-version.outputs.version }} \
                    --package-json apps/${{ steps.vars.outputs.project_name }}/package.json \
                    --node-modules node_modules

            - name: Set CapGo Channel
              if: matrix.capgo
              run: |
                  bunx @capgo/cli@latest channel set ${{ steps.capgo-channel.outputs.channel }} \
                    -s default \
                    -a ${{ secrets.CAPGO_TOKEN }} \
                    -b ${{ steps.app-version.outputs.version }} \
                    --self-assign \
                    ${{ steps.vars.outputs.capgo_id }}

    # ============================================================================
    # JIRA RELEASE TAGGING (production only, non-blocking)
    # ============================================================================
    tag-jira-release:
        name: Tag Jira Release
        needs:
            [
                determine-affected,
                deploy-brain-service,
                deploy-learn-cloud,
                deploy-lca-api,
                deploy-frontend,
            ]
        continue-on-error: true
        if: |
            always() &&
            !cancelled() &&
            (
                needs.determine-affected.outputs.is_release == 'true' ||
                (needs.determine-affected.outputs.is_manual == 'true' && (github.event.inputs.target-environment == 'production' || github.event.inputs.target-environment == 'scouts'))
            ) &&
            (
                needs.deploy-brain-service.result == 'success' ||
                needs.deploy-learn-cloud.result == 'success' ||
                needs.deploy-lca-api.result == 'success' ||
                needs.deploy-frontend.result == 'success'
            )
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Repo
              uses: actions/checkout@v7
              with:
                  fetch-depth: 0

            - name: Generate release name
              id: release-info
              run: |
                  SHORT_SHA="${GITHUB_SHA::7}"
                  RELEASE_DATE=$(date -u +%Y-%m-%d)
                  RELEASE_NAME="${RELEASE_DATE}-${SHORT_SHA}"
                  echo "release_name=$RELEASE_NAME" >> "$GITHUB_OUTPUT"
                  echo "Release name: $RELEASE_NAME"

            - name: Create Jira release
              env:
                  JIRA_BASE_URL: ${{ vars.JIRA_BASE_URL }}
                  JIRA_USER_EMAIL: ${{ vars.JIRA_USER_EMAIL }}
                  JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
                  JIRA_PROJECT_KEY: ${{ vars.JIRA_PROJECT_KEY }}
              run: |
                  set -o pipefail

                  RELEASE_NAME="${{ steps.release-info.outputs.release_name }}"

                  echo "Creating Jira release: $RELEASE_NAME"
                  echo "Project: $JIRA_PROJECT_KEY"
                  echo "Jira URL: $JIRA_BASE_URL"

                  # Build the Basic auth header per Atlassian docs:
                  # Base64-encode "email:api_token" and pass as Authorization header.
                  # NOTE: GNU base64 wraps at 76 columns by default, which injects a
                  # newline into the header and makes curl fail with exit 43. Strip
                  # newlines explicitly so this works on both GNU and BSD base64.
                  AUTH_HEADER="Authorization: Basic $(printf '%s' "${JIRA_USER_EMAIL}:${JIRA_API_TOKEN}" | base64 | tr -d '\n')"

                  # Look up the Jira project ID from the project key
                  PROJECT_RESPONSE=$(curl -s -w "\n%{http_code}" \
                    -H "${AUTH_HEADER}" \
                    -H "Content-Type: application/json" \
                    "${JIRA_BASE_URL}/rest/api/3/project/${JIRA_PROJECT_KEY}")

                  HTTP_CODE=$(echo "$PROJECT_RESPONSE" | tail -n1)
                  PROJECT_BODY=$(echo "$PROJECT_RESPONSE" | sed '$d')

                  if [[ "$HTTP_CODE" -ne 200 ]]; then
                    echo "::error::Failed to fetch Jira project (HTTP $HTTP_CODE): $PROJECT_BODY"
                    exit 1
                  fi

                  PROJECT_ID=$(echo "$PROJECT_BODY" | jq -r '.id')

                  # ============================================================
                  # Find the previous released version's commit SHA
                  # ============================================================
                  # Every version we create embeds the source commit SHA in its
                  # description ("Deployed from commit <SHA> via GitHub Actions").
                  # We query the most recent released versions, walk them in
                  # release-date-desc order, and use the first SHA that still
                  # exists in our local git history as the lower bound for issue
                  # linking. This is done BEFORE creating the new version so our
                  # own entry does not shadow the previous one.
                  PREV_VERSIONS_RESPONSE=$(curl -s -G -w "\n%{http_code}" \
                    -H "${AUTH_HEADER}" \
                    -H "Content-Type: application/json" \
                    --data-urlencode "orderBy=-releaseDate" \
                    --data-urlencode "status=released" \
                    --data-urlencode "maxResults=10" \
                    "${JIRA_BASE_URL}/rest/api/3/project/${PROJECT_ID}/version")

                  PREV_VERSIONS_CODE=$(echo "$PREV_VERSIONS_RESPONSE" | tail -n1)
                  PREV_VERSIONS_BODY=$(echo "$PREV_VERSIONS_RESPONSE" | sed '$d')

                  PREV_SHA=""
                  if [[ "$PREV_VERSIONS_CODE" -ge 200 && "$PREV_VERSIONS_CODE" -lt 300 ]]; then
                    CANDIDATE_SHAS=$(echo "$PREV_VERSIONS_BODY" \
                      | jq -r '.values[]? | .description // empty' 2>/dev/null \
                      | grep -oE 'commit [0-9a-f]{7,40}' \
                      | awk '{print $2}')

                    for sha in $CANDIDATE_SHAS; do
                      if git cat-file -e "${sha}^{commit}" 2>/dev/null; then
                        PREV_SHA="$sha"
                        break
                      fi
                    done
                  else
                    echo "::warning::Failed to fetch previous Jira versions (HTTP $PREV_VERSIONS_CODE): $PREV_VERSIONS_BODY"
                    echo "::warning::Will use fallback commit range for issue linking."
                  fi

                  # Create the release version
                  RESPONSE=$(curl -s -w "\n%{http_code}" \
                    -H "${AUTH_HEADER}" \
                    -H "Content-Type: application/json" \
                    -X POST "${JIRA_BASE_URL}/rest/api/3/version" \
                    -d "{
                      \"name\": \"${RELEASE_NAME}\",
                      \"projectId\": ${PROJECT_ID},
                      \"released\": true,
                      \"releaseDate\": \"$(date -u +%Y-%m-%d)\",
                      \"description\": \"Deployed from commit ${GITHUB_SHA} via GitHub Actions\"
                    }")

                  HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
                  BODY=$(echo "$RESPONSE" | sed '$d')

                  if [[ "$HTTP_CODE" -ge 200 && "$HTTP_CODE" -lt 300 ]]; then
                    echo "Jira release created successfully"
                    echo "$BODY" | jq .
                  else
                    echo "::warning::Failed to create Jira release (HTTP $HTTP_CODE): $BODY"
                    # If the version was not created, there is nothing to link issues to.
                    exit 0
                  fi

                  # ============================================================
                  # Associate issues with the release via fixVersions
                  # ============================================================
                  # Use the previous released version's commit SHA (found above)
                  # as the lower bound. Fall back to the last N commits on the
                  # first-ever release or if no previous SHA could be resolved.
                  # N is configurable via the JIRA_FALLBACK_DEPTH env var on the
                  # job (defaults to 100).
                  FALLBACK_DEPTH="${JIRA_FALLBACK_DEPTH:-100}"
                  if [[ -n "$PREV_SHA" ]]; then
                    RANGE="${PREV_SHA}..HEAD"
                    echo "Previous Jira release commit: $PREV_SHA"
                  else
                    RANGE="HEAD~${FALLBACK_DEPTH}..HEAD"
                    echo "No previous Jira release SHA found; scanning last ${FALLBACK_DEPTH} commits."
                  fi
                  echo "Scanning commits in range: $RANGE"

                  # Validate the range resolves to at least one commit before
                  # scanning. Protects against shallow-clone edge cases and an
                  # unreachable PREV_SHA that slipped past the cat-file check.
                  if ! git rev-list --count "$RANGE" >/dev/null 2>&1; then
                    echo "::warning::Invalid commit range ${RANGE}; skipping issue linking."
                    exit 0
                  fi

                  # Case-insensitive extraction of "<KEY>-<NUMBER>" tokens from
                  # commit subjects and bodies. The surrounding [^A-Za-z0-9_]
                  # (or start/end) boundaries are stricter than \b and prevent
                  # false matches like "XLC-123" when JIRA_PROJECT_KEY is "LC".
                  # Jira issue keys are always uppercase in the API, so
                  # normalize after matching.
                  ISSUE_KEYS=$(git log "$RANGE" --pretty=format:'%s%n%b' 2>/dev/null \
                    | grep -oEi "(^|[^A-Za-z0-9_])${JIRA_PROJECT_KEY}-[0-9]+([^A-Za-z0-9_]|$)" \
                    | grep -oEi "${JIRA_PROJECT_KEY}-[0-9]+" \
                    | tr '[:lower:]' '[:upper:]' \
                    | sort -u || true)

                  if [[ -z "$ISSUE_KEYS" ]]; then
                    echo "No ${JIRA_PROJECT_KEY} issue keys referenced in commits; skipping issue linking."
                    exit 0
                  fi

                  echo "Linking issues to release ${RELEASE_NAME}:"
                  echo "$ISSUE_KEYS"

                  SUCCESS_COUNT=0
                  FAIL_COUNT=0
                  while IFS= read -r KEY; do
                    [[ -z "$KEY" ]] && continue
                    LINK_RESPONSE=$(curl -s -w "\n%{http_code}" \
                      -H "${AUTH_HEADER}" \
                      -H "Content-Type: application/json" \
                      -X PUT "${JIRA_BASE_URL}/rest/api/3/issue/${KEY}" \
                      -d "{\"update\":{\"fixVersions\":[{\"add\":{\"name\":\"${RELEASE_NAME}\"}}]}}")
                    LINK_CODE=$(echo "$LINK_RESPONSE" | tail -n1)
                    LINK_BODY=$(echo "$LINK_RESPONSE" | sed '$d')
                    if [[ "$LINK_CODE" -ge 200 && "$LINK_CODE" -lt 300 ]]; then
                      echo "  ok   $KEY (HTTP $LINK_CODE)"
                      SUCCESS_COUNT=$((SUCCESS_COUNT + 1))
                    else
                      echo "::warning::  fail $KEY (HTTP $LINK_CODE): $LINK_BODY"
                      FAIL_COUNT=$((FAIL_COUNT + 1))
                    fi
                  done <<< "$ISSUE_KEYS"

                  echo "Linked ${SUCCESS_COUNT} issue(s) to ${RELEASE_NAME}; ${FAIL_COUNT} failure(s)."

    # ============================================================================
    # NATIVE APP STORE PUBLISHING
    # Triggers:
    #   - Release: Publish if lca_app_changed
    #   - Manual: Publish if publish-app-stores selected
    # ============================================================================
    publish-native-apps:
        name: Publish Native Apps to App Stores
        needs: [determine-affected, deploy-frontend]
        if: |
            always() &&
            !cancelled() &&
            (
                (needs.determine-affected.outputs.is_manual == 'true' && github.event.inputs.publish-app-stores == 'true') ||
                (needs.determine-affected.outputs.is_release == 'true' && needs.determine-affected.outputs.lca_app_changed == 'true')
            ) &&
            !contains(needs.deploy-frontend.result, 'failure')
        uses: ./.github/workflows/fastlane-deploy-native-apps.yml
        with:
            environment: ${{ needs.determine-affected.outputs.target_frontend_env }}
            googlePlayReleaseTrack: 'production'
            submitToAppStore: true
            releaseNotes: '- Critical Bug Fixes and Security Patches'
        secrets: inherit

    # ============================================================================
    # DOCKER IMAGES
    # ============================================================================
    push-docker-images:
        name: Push Docker Images
        needs: [determine-affected, deploy-brain-service, deploy-learn-cloud]
        if: |
            always() &&
            !cancelled() &&
            (
                (needs.determine-affected.outputs.is_manual == 'true' && github.event.inputs.push-docker == 'true') ||
                (needs.determine-affected.outputs.is_release == 'true' && (needs.determine-affected.outputs.brain_service_changed == 'true' || needs.determine-affected.outputs.learn_cloud_changed == 'true'))
            ) &&
            !contains(needs.deploy-brain-service.result, 'failure') &&
            !contains(needs.deploy-learn-cloud.result, 'failure')
        runs-on: ubuntu-latest
        permissions:
            packages: write
            contents: read
            attestations: write
            id-token: write
        steps:
            - name: Checkout Repo
              uses: actions/checkout@v7
              with:
                  fetch-depth: 0

            - name: Use Composite Setup Action
              uses: ./.github/actions/setup

            - name: Login to Docker Hub
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Build local monorepo base image
              uses: docker/build-push-action@v6
              with:
                  context: .
                  file: ./Dockerfile.monorepo
                  load: true
                  push: false
                  tags: learncard-monorepo-local:latest

            - name: Get Brain Service package version
              id: brain-service-version
              working-directory: './services/learn-card-network/brain-service'
              run: |
                  VERSION=$(bun -e "console.log(require('./package.json').version)")
                  echo "version=$VERSION" >> "$GITHUB_OUTPUT"

            - name: Extract metadata for Brain Service
              id: brain-service-meta
              uses: docker/metadata-action@v5
              with:
                  images: welibrary/lcn-brain-service
                  tags: |
                      type=semver,pattern={{version}},value=v${{ steps.brain-service-version.outputs.version }}

            - name: Build and push Brain Service image
              uses: docker/build-push-action@v6
              with:
                  context: .
                  file: ./services/learn-card-network/brain-service/Dockerfile
                  push: true
                  tags: ${{ steps.brain-service-meta.outputs.tags }}
                  labels: ${{ steps.brain-service-meta.outputs.labels }}

            - name: Get LearnCloud Service package version
              id: cloud-service-version
              working-directory: './services/learn-card-network/learn-cloud-service'
              run: |
                  VERSION=$(bun -e "console.log(require('./package.json').version)")
                  echo "version=$VERSION" >> "$GITHUB_OUTPUT"

            - name: Extract metadata for Cloud Service
              id: cloud-service-meta
              uses: docker/metadata-action@v5
              with:
                  images: welibrary/lcn-cloud-service
                  tags: |
                      type=semver,pattern={{version}},value=v${{ steps.cloud-service-version.outputs.version }}

            - name: Build and push Cloud Service image
              uses: docker/build-push-action@v6
              with:
                  context: .
                  file: ./services/learn-card-network/learn-cloud-service/Dockerfile
                  push: true
                  tags: ${{ steps.cloud-service-meta.outputs.tags }}
                  labels: ${{ steps.cloud-service-meta.outputs.labels }}

    # ============================================================================
    # PACKAGE PUBLISHING
    # ============================================================================
    publish-npm:
        name: Publish Registry Packages
        needs: [determine-affected, deploy-brain-service, deploy-learn-cloud, deploy-lca-api]
        if: |
            always() &&
            !cancelled() &&
            (
                (needs.determine-affected.outputs.is_manual == 'true' && github.event.inputs.publish-npm == 'true') ||
                needs.determine-affected.outputs.is_release == 'true'
            ) &&
            !contains(needs.deploy-brain-service.result, 'failure') &&
            !contains(needs.deploy-learn-cloud.result, 'failure') &&
            !contains(needs.deploy-lca-api.result, 'failure')
        runs-on: ubuntu-latest
        permissions:
            id-token: write
            contents: read
        steps:
            - name: Checkout Repo
              uses: actions/checkout@v7
              with:
                  fetch-depth: 0

            - name: Use Composite Setup Action
              uses: ./.github/actions/setup

            - name: Use Node.js 24 for npm trusted publishing
              uses: actions/setup-node@v6
              with:
                  node-version: 24
                  package-manager-cache: false

            - name: Build packages
              run: bunx nx run-many --target=build --exclude docs --exclude didkit-plugin-node

            # The native DIDKit package is published by didkit-plugin-node-prebuilds.yml
            # with platform artifacts. Keep it out of the generic changeset publish pass.
            - name: Keep DIDKit native addon out of changeset publish
              run: |
                  bun -e '
                  const fs = require("fs");
                  const path = "packages/plugins/didkit-plugin-node/package.json";
                  const pkg = JSON.parse(fs.readFileSync(path, "utf8"));

                  pkg.private = true;

                  fs.writeFileSync(path, `${JSON.stringify(pkg, null, 4)}\n`);
                  '

            - name: Prepare publish dependency versions
              run: node scripts/prepare-publish-workspace-deps.mjs

            - name: Publish Registry Packages
              run: bunx changeset publish
    # ============================================================================
    # SMOKETEST PUBLISHED PACKAGES (verify external installability)
    # Calls the reusable smoketest-npm-packages workflow against the freshly
    # published `latest` dist-tags from a clean directory with no monorepo
    # context. Catches regressions like the didkit-plugin-node@0.2.14
    # workspace:* leak that broke external `@learncard/cli` execution.
    # NOTE: `continue-on-error` is not valid on reusable-workflow caller jobs,
    # so a failure here WILL mark the deploy workflow run as failed. Treat
    # smoketest failures as a real signal — the package was published but is
    # broken for external consumers. Nightly cron in smoketest-npm-packages.yml
    # provides a second line of defense.
    # ============================================================================
    smoketest-published-packages:
        name: Smoketest Published Packages
        needs: publish-npm
        if: |
            always() &&
            needs.publish-npm.result == 'success'
        uses: ./.github/workflows/smoketest-npm-packages.yml

    # ============================================================================
    # SMOKETEST (after deploys — one job per target environment)
    # Fires when any deploy in this run succeeded, gated on the run's target.
    # ============================================================================
    smoketest-staging:
        name: Smoketest Staging
        needs:
            [
                determine-affected,
                deploy-brain-service,
                deploy-learn-cloud,
                deploy-lca-api,
                deploy-frontend,
            ]
        if: |
            always() &&
            !cancelled() &&
            (
                (needs.determine-affected.outputs.is_release != 'true' && needs.determine-affected.outputs.is_manual != 'true') ||
                (needs.determine-affected.outputs.is_manual == 'true' && github.event.inputs.target-environment == 'staging')
            ) &&
            (
              needs.deploy-brain-service.result == 'success' ||
              needs.deploy-learn-cloud.result == 'success' ||
              needs.deploy-lca-api.result == 'success' ||
              needs.deploy-frontend.result == 'success'
            )
        uses: ./.github/workflows/smoketest.yml
        with:
            environment: staging
        secrets: inherit

    smoketest-production:
        name: Smoketest Production
        needs:
            [
                determine-affected,
                deploy-brain-service,
                deploy-learn-cloud,
                deploy-lca-api,
                deploy-frontend,
            ]
        if: |
            always() &&
            !cancelled() &&
            (
                needs.determine-affected.outputs.is_release == 'true' ||
                (needs.determine-affected.outputs.is_manual == 'true' && github.event.inputs.target-environment == 'production')
            ) &&
            (
              needs.deploy-brain-service.result == 'success' ||
              needs.deploy-learn-cloud.result == 'success' ||
              needs.deploy-lca-api.result == 'success' ||
              needs.deploy-frontend.result == 'success'
            )
        uses: ./.github/workflows/smoketest.yml
        with:
            environment: production
        secrets: inherit

    smoketest-scouts:
        name: Smoketest Scouts
        needs:
            [
                determine-affected,
                deploy-brain-service,
                deploy-learn-cloud,
                deploy-lca-api,
                deploy-frontend,
            ]
        if: |
            always() &&
            !cancelled() &&
            needs.determine-affected.outputs.is_manual == 'true' &&
            github.event.inputs.target-environment == 'scouts' &&
            (
              needs.deploy-brain-service.result == 'success' ||
              needs.deploy-learn-cloud.result == 'success' ||
              needs.deploy-lca-api.result == 'success' ||
              needs.deploy-frontend.result == 'success'
            )
        uses: ./.github/workflows/smoketest.yml
        with:
            environment: scouts
        secrets: inherit

    # ============================================================================
    # CHANGESET PR MANAGEMENT (only on non-release, non-manual pushes)
    # ============================================================================
    manage-releases:
        name: Manage Release PR
        needs: determine-affected
        continue-on-error: true
        if: |
            needs.determine-affected.outputs.is_release != 'true' &&
            needs.determine-affected.outputs.is_manual != 'true'
        runs-on: ubuntu-latest
        steps:
            - name: Generate GitHub App Token
              id: app-token
              uses: actions/create-github-app-token@v3
              with:
                  app-id: ${{ secrets.E2E_RUNNER_APP_ID }}
                  private-key: ${{ secrets.E2E_RUNNER_PRIVATE_KEY }}

            - name: Checkout Repo
              uses: actions/checkout@v7
              with:
                  fetch-depth: 0
                  token: ${{ steps.app-token.outputs.token }}

            - name: Use Composite Setup Action
              uses: ./.github/actions/setup

            # 2026-07-02: Pin only the Changesets subprocess to Node 24.16.0.
            # Newer runner Node 24 builds can make node-fetch@2 report false
            # ERR_STREAM_PREMATURE_CLOSE failures while @changesets/changelog-github
            # fetches GitHub GraphQL changelog data.
            # Node regression: https://github.com/nodejs/node/issues/63989
            # Our failed deploy: https://github.com/learningeconomy/LearnCard/actions/runs/28558778835/job/84673047463
            # Owner: release CI. Revisit after Node's fix is on the runner or Changesets stops using node-fetch@2:
            # https://github.com/nodejs/node/pull/64004
            - name: Use Node.js 24.16 for Changesets
              uses: actions/setup-node@v6
              with:
                  node-version: 24.16.0

            - name: Create Release Pull Request
              uses: changesets/action@v1
              with:
                  version: bunx changeset version
                  commit: 'chore(release): version packages'
                  title: 'chore(release): version packages'
              env:
                  GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
