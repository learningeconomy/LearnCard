name: Validate Theme Schemas

on:
  pull_request:
    paths:
      - 'apps/learn-card-app/src/theme/schemas/**'
      - 'apps/learn-card-app/src/theme/validators/**'

jobs:
  validate:
    name: Validate theme schemas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup

      - name: Validate all theme schemas
        working-directory: apps/learn-card-app
        run: npx tsx scripts/validate-theme-schemas.ts
