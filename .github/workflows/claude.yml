name: Claude PR Assistant

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude-code-action:
    if: |
      (
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude') &&
          contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)) ||
        (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude') &&
          contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)) ||
        (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude') &&
          contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.review.author_association)) ||
        (github.event_name == 'issues' && contains(github.event.issue.body, '@claude') &&
          contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.issue.author_association))
      )
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      # Mint a GitHub App installation token scoped to pull-requests:write.
      # This is what actually lets Claude APPROVE PRs: claude-code-action@v1's
      # built-in GitHub tooling deliberately cannot submit/approve reviews, so
      # approval must go through `gh pr review --approve` (Bash) — and the
      # default GITHUB_TOKEN / github-actions[bot] is NOT permitted to approve
      # PRs. The app identity is allowed to approve.
      #
      # Requires repo configuration:
      #   - Variable  CLAUDE_APP_CLIENT_ID   (GitHub App Client ID)
      #   - Secret    CLAUDE_APP_PRIVATE_KEY (GitHub App private key, PEM)
      # The app must be installed on this repo with Pull requests: Read & write.
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.CLAUDE_APP_CLIENT_ID }}
          private-key: ${{ secrets.CLAUDE_APP_PRIVATE_KEY }}
          permission-pull-requests: write
          permission-contents: read
          permission-issues: write

      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      # Body is read via env vars (NOT interpolated into the shell script) so
      # untrusted comment content cannot inject shell commands. Do not change.
      - name: Determine Claude model
        id: model
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
          REVIEW_BODY: ${{ github.event.review.body }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          BODY="${COMMENT_BODY}${REVIEW_BODY}${ISSUE_BODY}"
          if [[ "$BODY" == *"@claude deep-review"* ]]; then
              echo "model_flag=--model claude-opus-4-1" >> "$GITHUB_OUTPUT"
              echo "mode=deep-review" >> "$GITHUB_OUTPUT"
              echo "Mode: deep-review (Claude Opus 4.1)"
          else
              echo "model_flag=" >> "$GITHUB_OUTPUT"
              echo "mode=standard" >> "$GITHUB_OUTPUT"
              echo "Mode: standard (action default)"
          fi

      # custom_instructions was removed in claude-code-action@v1; review
      # instructions now live in .github/claude-review-instructions.md and are
      # passed via the `appendSystemPrompt` Claude setting. `jq -Rs` safely
      # JSON-encodes the markdown (which contains quotes/backticks), so no
      # manual escaping is needed.
      - name: Build Claude settings
        run: |
          jq -Rs '{ appendSystemPrompt: . }' \
            .github/claude-review-instructions.md \
            > "${RUNNER_TEMP}/claude-settings.json"

      - name: Run Claude PR Action
        uses: anthropics/claude-code-action@v1
        env:
          # Exposed to the Bash tool so `gh` authenticates as the GitHub App
          # (which CAN approve PRs) instead of github-actions[bot] (which cannot).
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ steps.app-token.outputs.token }}
          additional_permissions: |
            actions: read
            checks: read
            workflows: read
          # Injects .github/claude-review-instructions.md as appendSystemPrompt.
          settings: ${{ runner.temp }}/claude-settings.json
          claude_args: |
            ${{ steps.model.outputs.model_flag }}
            --allowedTools "Bash"
