name: Claude PR Assistant

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude-code-action:
    if: |
      (
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude') &&
          contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)) ||
        (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude') &&
          contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)) ||
        (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude') &&
          contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.review.author_association)) ||
        (github.event_name == 'issues' && contains(github.event.issue.body, '@claude') &&
          contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.issue.author_association))
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude PR Action
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          timeout_minutes: "60"
          allowed_tools: "Bash,GitHub,View,GlobTool,GrepTool,BatchTool"
          custom_instructions: |
            ## PR Review & Auto-Approval

            When asked to review a PR (e.g. "@claude review", "@claude review this"),
            perform a thorough code review AND evaluate whether the PR qualifies for Auto-Approval.

            ### Monorepo Context

            This is a pnpm + Nx monorepo. Key areas:
            - `services/` — Production backend services (brain-service, lca-api, learn-cloud-service, simple-signing-service). These handle auth, credentials, signing, Neo4j/MongoDB data, and serverless deployment. **High risk.**
            - `packages/learn-card-types/` — Shared Zod validators and types used across the entire stack. Changes here ripple everywhere. **High risk.**
            - `packages/learn-card-core/` — Core wallet and plugin system. **High risk.**
            - `packages/learn-card-init/` — Assembles the plugin stack. **High risk.**
            - `packages/plugins/crypto/`, `packages/plugins/encryption/`, `packages/plugins/didkey/`, `packages/plugins/didkit/` — Cryptographic and DID operations. **High risk.**
            - `packages/plugins/learn-card-network/` — Network plugin bridging to brain-service (plugin.ts is ~78KB). **High risk.**
            - `apps/` — Frontend apps (learn-card-app, scouts). Medium risk — user-facing but no server-side auth.
            - `packages/learn-card-base/` — React hooks, queries, UI components. **Medium risk.**
            - `packages/react-learn-card/` — React component library. **Medium risk.**
            - `docs/` — GitBook documentation. **Low risk.**
            - `examples/` — Example/demo apps. **Low risk.**
            - `reference/` — Docusaurus reference docs. **Low risk.**
            - `.changeset/` — Version changeset files. **Low risk.**
            - `tools/`, `scripts/` — Build tooling and dev scripts. **Low risk.**

            ### Review Process

            1. **Fetch the diff** using `gh pr diff $PR_NUMBER` and the file list with `gh pr view $PR_NUMBER --json files`.
            2. **Review the code** for correctness, style, and potential issues. Leave inline comments for anything notable. Follow the project style: strict TypeScript, arrow functions, named imports, 4-space JSX indentation.
            3. **Evaluate Auto-Approval eligibility** using the criteria below.
            4. **Post a summary** with your review findings and your auto-approval decision.

            ### Auto-Approval Criteria

            A PR is eligible for auto-approval if **ALL** of the following are true:

            **Size:**
            - Total lines changed (additions + deletions) ≤ 200

            **No high-risk files are modified:**
            - `services/` — Any file in brain-service, lca-api, learn-cloud-service, or simple-signing-service (routes, access layers, models, helpers, lambda entry points)
            - `packages/learn-card-types/src/lcn.ts` — Central type definitions
            - `packages/learn-card-core/` — Core wallet/plugin system
            - `packages/learn-card-init/` — Plugin stack initialization
            - `packages/plugins/crypto/`, `packages/plugins/encryption/`, `packages/plugins/didkey/`, `packages/plugins/didkit/` — Crypto/DID plugins
            - `packages/plugins/learn-card-network/src/plugin.ts` or `types.ts` — Network plugin
            - `Dockerfile*`, `serverless*.yml`, `compose*.yaml`, `lambda.ts` — Infrastructure/deployment
            - `.github/workflows/` — CI/CD pipelines
            - Root monorepo config: `nx.json`, `pnpm-workspace.yaml`, `pnpm-lock.yaml`, root `package.json`
            - `heroku.yml`, `Procfile` — Deployment

            **No dangerous content patterns in the diff:**
            - New tRPC procedures or HTTP endpoints being added
            - Changes to access control, permissions, roles, or Neo4j relationship queries
            - Removal or weakening of existing tests (deleting assertions, skipping tests)
            - `eval()`, `dangerouslySetInnerHTML`, or `innerHTML` usage
            - Hardcoded secrets, API keys, seeds, or private keys
            - Changes to `CREDENTIAL_RECEIVED`, `CONNECTED_WITH`, or other Neo4j relationship logic
            - New or modified Zod validators in shared type packages

            **Typical auto-approvable PRs:**
            - Documentation changes (`docs/`, `*.md`, `AGENTS.md`, `CLAUDE.md`)
            - New or expanded tests in `test/` or `tests/` directories (not removing/weakening)
            - Changeset files (`.changeset/*.md`)
            - Example app changes (`examples/`)
            - Reference doc changes (`reference/`)
            - Minor UI tweaks in `apps/` (styling, copy, component layout) under 200 lines
            - React component or hook changes in `packages/react-learn-card/` or `packages/learn-card-base/` that are clearly cosmetic or additive
            - Typo, formatting, or comment-only changes anywhere
            - Build script or tooling changes in `tools/`, `scripts/`
            - Non-security package.json dependency bumps within individual packages (patch/minor only)

            ### Decision

            - **If eligible:** Approve the PR with `gh pr review $PR_NUMBER --approve --body "Auto-approved: <one-line reason>"`.
            - **If NOT eligible:** Do NOT approve. Post a review comment explaining why it doesn't qualify and list any issues found. Use `gh pr review $PR_NUMBER --comment --body "<review>"`.
            - **If borderline:** Do NOT approve, but note in your review that the PR is close to auto-approvable and explain what would need to change.

            ### Important Rules

            - NEVER auto-approve your own changes (commits authored by `claude` or `github-actions`).
            - NEVER auto-approve PRs labeled `do-not-merge` or `needs-manual-review`.
            - When in doubt, do NOT approve. It is always safe to leave a thorough review without approving.
            - Always be transparent about why you are or are not auto-approving.
