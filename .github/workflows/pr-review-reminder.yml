name: PR Review Reminder

on:
    schedule:
        # Mon-Fri at noon EDT (16:00 UTC). During EST this fires at 11am.
        - cron: '0 16 * * 1-5'
    workflow_dispatch: # Allow manual triggers

jobs:
    pr-review-digest:
        runs-on: ubuntu-latest
        permissions:
            pull-requests: read
        steps:
            - name: Gather open PRs needing review
              id: gather
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  GH_REPO: ${{ github.repository }}
                  SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
              run: |
                  set -euo pipefail

                  # Fetch all open PRs with review and label info
                  prs_json=$(gh pr list \
                    --repo "$GH_REPO" \
                    --state open \
                    --json number,title,author,url,createdAt,isDraft,labels,assignees,reviews,headRefName \
                    --limit 100)

                  now=$(date +%s)

                  # --- GitHub username -> Slack member ID mapping ---
                  # To get a Slack member ID: click their profile -> ⋮ -> "Copy member ID"
                  # Format: "github_login": "<@UXXXXXXXX>" for real @mentions
                  # Unmapped users fall back to their GitHub username.
                  SLACK_USER_MAP='{
                    "goblincore": "<@U08CURKM4SC>",
                    "TaylorBeeston": "<@U08C8GXQ6VA>",
                    "smurflo2": "<@U08C60NCE9G>",
                    "rhen92": "<@U08CJM5PQMP>",
                    "Custard7": "<@U088A359E76>",
                    "gerardopar": "<@U08CUR5K8MN>"
                  }'

                  # --- Categorize each PR ---

                  needs_review_items='[]'
                  changes_requested_items='[]'
                  stale_items='[]'
                  draft_count=0

                  # Per-assignee accumulator for personal DM checklists: { "<github_login>": [ item, ... ] }
                  assignee_items='{}'

                  pr_count=$(echo "$prs_json" | jq 'length')

                  for i in $(seq 0 $(( pr_count - 1 ))); do
                    pr=$(echo "$prs_json" | jq ".[$i]")

                    number=$(echo "$pr" | jq -r '.number')
                    title=$(echo "$pr" | jq -r '.title')
                    author=$(echo "$pr" | jq -r '.author.login')
                    url=$(echo "$pr" | jq -r '.url')
                    created=$(echo "$pr" | jq -r '.createdAt')
                    is_draft=$(echo "$pr" | jq -r '.isDraft')

                    created_ts=$(date -d "$created" +%s 2>/dev/null || echo "$now")
                    age_days=$(( (now - created_ts) / 86400 ))

                    if [ "$age_days" -eq 0 ]; then
                      age_label="today"
                    elif [ "$age_days" -eq 1 ]; then
                      age_label="1 day ago"
                    else
                      age_label="${age_days} days ago"
                    fi

                    # Skip do-not-merge, missing-jira, and bot authors
                    should_skip=$(echo "$pr" | jq '
                      ([.labels[]?.name] | any(. == "do-not-merge" or . == "missing-jira")) or
                      (.author.login | test("\\[bot\\]$|^dependabot$|^renovate$|^github-actions$|^claude$"; "i"))
                    ')
                    if [ "$should_skip" = "true" ]; then
                      continue
                    fi

                    if [ "$is_draft" = "true" ]; then
                      draft_count=$((draft_count + 1))
                      continue
                    fi

                    is_sprint=$(echo "$pr" | jq '[.labels[]?.name] | any(ascii_downcase == "sprint")')
                    assignees=$(echo "$pr" | jq -r --argjson map "$SLACK_USER_MAP" '
                      [.assignees[]? | (.login // .name) as $gh |
                        if $map[$gh] then $map[$gh] else "`" + $gh + "`" end
                      ] | join(", ")
                    ')

                    has_approval=$(echo "$pr" | jq '[.reviews[]? | select(.state == "APPROVED")] | length > 0')
                    has_changes_requested=$(echo "$pr" | jq '
                      [.reviews[]? | select(.state == "CHANGES_REQUESTED")] as $cr |
                      if ($cr | length) == 0 then false
                      else
                        ($cr | map(.author.login) | unique) as $cr_authors |
                        [.reviews[]? | select(.state == "APPROVED" and (.author.login as $a | $cr_authors | index($a) != null))] |
                        length < ($cr_authors | length)
                      end
                    ')

                    if [ "$has_changes_requested" = "true" ]; then
                      category="changes"; priority=1
                    elif [ "$has_approval" != "true" ]; then
                      if [ "$age_days" -ge 7 ]; then
                        category="stale"; priority=0
                      else
                        category="review"; priority=2
                      fi
                    else
                      continue
                    fi

                    # Build a JSON item for this PR
                    item=$(jq -n \
                      --arg number "$number" \
                      --arg title "$title" \
                      --arg author "$author" \
                      --arg url "$url" \
                      --arg age "$age_label" \
                      --argjson age_days "$age_days" \
                      --argjson sprint "$is_sprint" \
                      --arg assignees "$assignees" \
                      --arg category "$category" \
                      --argjson priority "$priority" \
                      '{number: $number, title: $title, author: $author, url: $url, age: $age, age_days: $age_days, sprint: $sprint, assignees: $assignees, category: $category, priority: $priority}')

                    case "$category" in
                      changes) changes_requested_items=$(echo "$changes_requested_items" | jq --argjson item "$item" '. + [$item]') ;;
                      stale)   stale_items=$(echo "$stale_items" | jq --argjson item "$item" '. + [$item]') ;;
                      review)  needs_review_items=$(echo "$needs_review_items" | jq --argjson item "$item" '. + [$item]') ;;
                    esac

                    while IFS= read -r login; do
                      [ -n "$login" ] || continue
                      assignee_items=$(echo "$assignee_items" | jq \
                        --arg login "$login" --argjson item "$item" \
                        '.[$login] = ((.[$login] // []) + [$item])')
                    done < <(echo "$pr" | jq -r '.assignees[]?.login')
                  done

                  # --- Build Slack Block Kit payload ---

                  stale_count=$(echo "$stale_items" | jq 'length')
                  changes_count=$(echo "$changes_requested_items" | jq 'length')
                  review_count=$(echo "$needs_review_items" | jq 'length')
                  total=$((stale_count + changes_count + review_count))

                  # Helper: render a list of PR items into mrkdwn lines
                  render_items() {
                    local items_json="$1"
                    echo "$items_json" | jq -r '.[] |
                      (if .sprint then "⚡ " else "" end) +
                      "<" + .url + "|#" + .number + "> " +
                      "*" + .title + "*\n" +
                      "      `" + .author + "`  ·  " + .age +
                      (if (.assignees | length) > 0 then "  ·  👤 " + .assignees else "" end)
                    '
                  }

                  blocks='[]'

                  # Header
                  blocks=$(echo "$blocks" | jq '. + [{"type": "header", "text": {"type": "plain_text", "text": "PR Review Digest", "emoji": true}}]')

                  if [ "$total" -eq 0 ]; then
                    blocks=$(echo "$blocks" | jq '. + [
                      {"type": "section", "text": {"type": "mrkdwn", "text": "✅ *All caught up!* No PRs need review right now."}}
                    ]')
                  else
                    # Summary line
                    summary="*${total} PR(s) need attention*"
                    if [ "$draft_count" -gt 0 ]; then
                      summary="${summary}  ·  _${draft_count} draft(s) hidden_"
                    fi
                    blocks=$(echo "$blocks" | jq --arg text "$summary" '. + [
                      {"type": "context", "elements": [{"type": "mrkdwn", "text": $text}]}
                    ]')

                    # Stale section
                    if [ "$stale_count" -gt 0 ]; then
                      section_text="🔴  *Stale — 7+ days without approval*"
                      pr_lines=$(render_items "$stale_items")
                      blocks=$(echo "$blocks" | jq \
                        --arg header "$section_text" \
                        --arg items "$pr_lines" \
                        '. + [
                          {"type": "divider"},
                          {"type": "section", "text": {"type": "mrkdwn", "text": $header}},
                          {"type": "section", "text": {"type": "mrkdwn", "text": $items}}
                        ]')
                    fi

                    # Changes requested section
                    if [ "$changes_count" -gt 0 ]; then
                      section_text="🟡  *Changes Requested — waiting on author*"
                      pr_lines=$(render_items "$changes_requested_items")
                      blocks=$(echo "$blocks" | jq \
                        --arg header "$section_text" \
                        --arg items "$pr_lines" \
                        '. + [
                          {"type": "divider"},
                          {"type": "section", "text": {"type": "mrkdwn", "text": $header}},
                          {"type": "section", "text": {"type": "mrkdwn", "text": $items}}
                        ]')
                    fi

                    # Needs review section
                    if [ "$review_count" -gt 0 ]; then
                      section_text="🔵  *Needs Review*"
                      pr_lines=$(render_items "$needs_review_items")
                      blocks=$(echo "$blocks" | jq \
                        --arg header "$section_text" \
                        --arg items "$pr_lines" \
                        '. + [
                          {"type": "divider"},
                          {"type": "section", "text": {"type": "mrkdwn", "text": $header}},
                          {"type": "section", "text": {"type": "mrkdwn", "text": $items}}
                        ]')
                    fi
                  fi

                  # Footer
                  repo_url="https://github.com/${GH_REPO}/pulls"
                  blocks=$(echo "$blocks" | jq --arg url "$repo_url" '. + [
                    {"type": "divider"},
                    {"type": "context", "elements": [{"type": "mrkdwn", "text": ("📎 <" + $url + "|View all open PRs>")}]}
                  ]')

                  # Write payload to file for curl
                  payload=$(jq -n --argjson blocks "$blocks" '{blocks: $blocks}')
                  echo "$payload" > /tmp/slack-payload.json

                  echo "total=$total" >> "$GITHUB_OUTPUT"

                  # --- Personal DM checklists ---
                  # Requires a Slack bot token (SLACK_BOT_TOKEN) with chat:write + im:write scopes.
                  # Incoming webhooks cannot DM users, so this is skipped if the token is absent.
                  if [ -z "${SLACK_BOT_TOKEN:-}" ]; then
                    echo "SLACK_BOT_TOKEN not set — skipping personal DM checklists."
                  else
                    while IFS= read -r gh_login; do
                      [ -n "$gh_login" ] || continue
                      user_items=$(echo "$assignee_items" | jq --arg l "$gh_login" '.[$l] // []')
                      count=$(echo "$user_items" | jq 'length')
                      if [ "$count" -eq 0 ]; then
                        continue
                      fi

                      slack_id=$(echo "$SLACK_USER_MAP" | jq -r --arg l "$gh_login" '.[$l] | gsub("[<@>]"; "")')

                      # Link to this user's open assigned PRs in the repo (GitHub search query)
                      assigned_url="https://github.com/${GH_REPO}/pulls?q=is%3Aopen+is%3Apr+assignee%3A${gh_login}"

                      # One section per PR (sorted: priority asc, then oldest first) to stay under Slack's 3000-char section limit.
                      dm_blocks=$(echo "$user_items" | jq \
                        --arg count "$count" --arg assigned_url "$assigned_url" '
                        ({"0": "🔴", "1": "🟡", "2": "🔵"}) as $dots |
                        [
                          {"type": "header", "text": {"type": "plain_text", "text": "Your PR Review Checklist", "emoji": true}},
                          {"type": "context", "elements": [{"type": "mrkdwn", "text": ($count + " PR(s) assigned to you · 🔴 stale · 🟡 changes requested · 🔵 needs review")}]}
                        ]
                        + ( sort_by(.priority, -.age_days) | map(
                            {"type": "section", "text": {"type": "mrkdwn", "text": (
                              "☐ " + $dots[.priority | tostring] + "  <" + .url + "|#" + .number + "> *" + .title + "*  ·  " + .age +
                              (if .sprint then "  ·  ⚡" else "" end)
                            )}}
                          ) )
                        + [
                        {"type": "divider"},
                        {"type": "context", "elements": [{"type": "mrkdwn", "text": ("📎 <" + $assigned_url + "|View all your assigned PRs on GitHub>")}]}
                      ]')

                      dm_payload=$(jq -n --arg channel "$slack_id" --argjson blocks "$dm_blocks" '{channel: $channel, blocks: $blocks}')

                      response=$(curl -s -X POST https://slack.com/api/chat.postMessage \
                        -H "Authorization: Bearer ${SLACK_BOT_TOKEN}" \
                        -H 'Content-Type: application/json; charset=utf-8' \
                        -d "$dm_payload" || echo '{"ok":false,"error":"curl_failed"}')

                      if [ "$(echo "$response" | jq -r '.ok')" != "true" ]; then
                        echo "Failed to DM $gh_login: $(echo "$response" | jq -r '.error // "unknown"')"
                      fi
                    done < <(echo "$SLACK_USER_MAP" | jq -r 'keys[]')
                  fi

            - name: Send Slack notification
              if: always()
              env:
                  SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_PR_REVIEW_URL }}
              run: |
                  curl -sf -X POST -H 'Content-Type: application/json' \
                    -d @/tmp/slack-payload.json \
                    "$SLACK_WEBHOOK"
