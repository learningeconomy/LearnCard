# .github/workflows/chromatic.yml
# Publishes Storybook to Chromatic for visual regression testing.
# Docs: https://www.chromatic.com/docs/github-actions/

name: 'Chromatic'

on:
    pull_request:
        types: [opened, synchronize, reopened]

concurrency:
    group: chromatic-${{ github.head_ref || github.ref }}
    cancel-in-progress: true

env:
    CI: true
    NODE_OPTIONS: '--max_old_space_size=4096'

jobs:
    chromatic-deployment:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Repo
              uses: actions/checkout@v4
              with:
                  ref: ${{ github.event.pull_request.head.sha }}
                  # Chromatic needs full git history to compare against the baseline.
                  fetch-depth: 0

            - name: Fetch main for NX comparison
              run: git fetch --no-tags --prune origin main

            - name: Use Composite Setup Action
              uses: ./.github/actions/setup

            - name: Get affected projects
              id: affected
              run: echo "AFFECTED=$(pnpm exec nx show projects --affected --base=origin/main --head=HEAD)" >> "$GITHUB_ENV"

            - name: Build @learncard/react
              if: contains(env.AFFECTED, 'react')
              run: pnpm exec nx build react

            - name: Publish to Chromatic
              if: contains(env.AFFECTED, 'react')
              uses: chromaui/action@latest
              with:
                  projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
                  workingDir: packages/react-learn-card
                  # Don't fail the build on visual changes — they're reviewed in Chromatic's UI.
                  exitZeroOnChanges: true

    chromatic-learn-card-app:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Repo
              uses: actions/checkout@v4
              with:
                  ref: ${{ github.event.pull_request.head.sha }}
                  # Chromatic needs full git history to compare against the baseline.
                  fetch-depth: 0

            - name: Fetch main for NX comparison
              run: git fetch --no-tags --prune origin main

            - name: Use Composite Setup Action
              uses: ./.github/actions/setup

            - name: Get affected projects
              id: affected
              run: echo "AFFECTED=$(pnpm exec nx show projects --affected --base=origin/main --head=HEAD)" >> "$GITHUB_ENV"

            - name: Publish to Chromatic
              if: contains(env.AFFECTED, 'learn-card-app')
              uses: chromaui/action@latest
              with:
                  projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN_LCA }}
                  workingDir: apps/learn-card-app
                  # The app has no prebuilt Storybook output, so let Chromatic run the build script.
                  buildScriptName: build-storybook
                  # Don't fail the build on visual changes — they're reviewed in Chromatic's UI.
                  exitZeroOnChanges: true
