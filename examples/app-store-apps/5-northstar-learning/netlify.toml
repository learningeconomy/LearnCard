[build.environment]
BUN_VERSION = "1.3.14"
BUN_FLAGS = "--ignore-scripts"
NODE_VERSION = "20"
NODE_OPTIONS = "--max-old-space-size=4096"
SKIP_DIDKIT_NAPI = "1"

[build]
command = "bunx nx run @learncard/app-store-demo-northstar-learning:build"
  publish = "dist"

[context.production.environment]
  NODE_VERSION = "20"

[context.deploy-preview.environment]
  NODE_VERSION = "20"

[context.branch-deploy.environment]
  NODE_VERSION = "20"
