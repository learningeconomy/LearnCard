<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Theme Editor</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
                    colors: {
                        surface: { DEFAULT: '#ffffff', secondary: '#f8fafc', tertiary: '#f1f5f9' },
                        sidebar: { DEFAULT: '#0f172a', hover: '#1e293b', active: '#334155' },
                    },
                },
            },
        };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; font-family: 'Inter', system-ui, sans-serif; background: #f8fafc; }
        .fade-in { animation: fadeIn .15s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
        .swatch { width: 28px; height: 28px; border-radius: 6px; border: 2px solid #e2e8f0; flex-shrink: 0; cursor: pointer; transition: box-shadow .15s; }
        .swatch:hover { box-shadow: 0 0 0 3px rgba(99,102,241,.3); }
        .color-grid-cell { width: 32px; height: 32px; border-radius: 6px; cursor: pointer; transition: transform .1s, box-shadow .1s; position: relative; }
        .color-grid-cell:hover { transform: scale(1.2); z-index: 10; box-shadow: 0 2px 8px rgba(0,0,0,.25); }
        .tab-btn { padding: 8px 16px; font-size: 13px; font-weight: 500; border-radius: 8px; cursor: pointer; border: none; background: transparent; color: #64748b; transition: all .15s; }
        .tab-btn:hover { background: #f1f5f9; color: #334155; }
        .tab-btn.active { background: #4f46e5; color: white; }
        .field-group { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
        .field-label { font-size: 12px; font-weight: 500; color: #475569; width: 200px; flex-shrink: 0; }
        .field-input { flex: 1; padding: 7px 10px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 13px; color: #1e293b; background: white; outline: none; transition: border-color .15s; }
        .field-input:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,.1); }
        .field-input.inherited { color: #94a3b8; font-style: italic; background: #f8fafc; }
        .section-card { background: white; border: 1px solid #e2e8f0; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
        .section-title { font-size: 14px; font-weight: 600; color: #1e293b; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
        .badge { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 20px; }
        .badge-inherited { background: #f1f5f9; color: #64748b; }
        .badge-override { background: #eef2ff; color: #4f46e5; }
        .accordion-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; background: #f8fafc; border-radius: 8px; cursor: pointer; margin-bottom: 4px; transition: background .15s; }
        .accordion-header:hover { background: #f1f5f9; }
        .btn { padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; border: none; transition: all .15s; }
        .btn-primary { background: #4f46e5; color: white; }
        .btn-primary:hover { background: #4338ca; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-danger:hover { background: #dc2626; }
        .btn-secondary { background: #f1f5f9; color: #475569; border: 1px solid #e2e8f0; }
        .btn-secondary:hover { background: #e2e8f0; }
        .btn-success { background: #10b981; color: white; }
        .btn-success:hover { background: #059669; }
        .btn:disabled { opacity: .5; cursor: not-allowed; }
        .toast { position: fixed; bottom: 24px; right: 24px; padding: 12px 20px; border-radius: 10px; font-size: 13px; font-weight: 500; color: white; z-index: 9999; animation: fadeIn .2s ease-out; }
        .picker-overlay { position: fixed; inset: 0; z-index: 100; }
        .picker-popup { position: fixed; z-index: 101; background: white; border-radius: 12px; box-shadow: 0 20px 60px rgba(0,0,0,.2); padding: 16px; width: 420px; max-height: 480px; overflow-y: auto; }
        .json-editor { width: 100%; min-height: 500px; font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: 13px; padding: 16px; border: 1px solid #e2e8f0; border-radius: 10px; outline: none; resize: vertical; line-height: 1.6; }
        .json-editor:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,.1); }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 200; display: flex; align-items: center; justify-content: center; }
        .modal { background: white; border-radius: 16px; padding: 28px; width: 480px; max-width: 95vw; box-shadow: 0 20px 60px rgba(0,0,0,.3); animation: fadeIn .2s ease-out; }
        .reset-btn { background: none; border: none; cursor: pointer; padding: 4px; color: #94a3b8; font-size: 14px; border-radius: 4px; transition: all .15s; }
        .reset-btn:hover { color: #ef4444; background: #fef2f2; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo, createContext, useContext } = React;

// ═══════════════════════════════════════════════════════════════════════════
// TAILWIND COLOR PALETTE DATA
// ═══════════════════════════════════════════════════════════════════════════

const SHADES = [50,100,200,300,400,500,600,700,800,900,950];

const TW = {
    slate:   ['#f8fafc','#f1f5f9','#e2e8f0','#cbd5e1','#94a3b8','#64748b','#475569','#334155','#1e293b','#0f172a','#020617'],
    gray:    ['#f9fafb','#f3f4f6','#e5e7eb','#d1d5db','#9ca3af','#6b7280','#4b5563','#374151','#1f2937','#111827','#030712'],
    zinc:    ['#fafafa','#f4f4f5','#e4e4e7','#d4d4d8','#a1a1aa','#71717a','#52525b','#3f3f46','#27272a','#18181b','#09090b'],
    neutral: ['#fafafa','#f5f5f5','#e5e5e5','#d4d4d4','#a3a3a3','#737373','#525252','#404040','#262626','#171717','#0a0a0a'],
    stone:   ['#fafaf9','#f5f5f4','#e7e5e4','#d6d3d1','#a8a29e','#78716c','#57534e','#44403c','#292524','#1c1917','#0c0a09'],
    red:     ['#fef2f2','#fee2e2','#fecaca','#fca5a5','#f87171','#ef4444','#dc2626','#b91c1c','#991b1b','#7f1d1d','#450a0a'],
    orange:  ['#fff7ed','#ffedd5','#fed7aa','#fdba74','#fb923c','#f97316','#ea580c','#c2410c','#9a3412','#7c2d12','#431407'],
    amber:   ['#fffbeb','#fef3c7','#fde68a','#fcd34d','#fbbf24','#f59e0b','#d97706','#b45309','#92400e','#78350f','#451a03'],
    yellow:  ['#fefce8','#fef9c3','#fef08a','#fde047','#facc15','#eab308','#ca8a04','#a16207','#854d0e','#713f12','#422006'],
    lime:    ['#f7fee7','#ecfccb','#d9f99d','#bef264','#a3e635','#84cc16','#65a30d','#4d7c0f','#3f6212','#365314','#1a2e05'],
    green:   ['#f0fdf4','#dcfce7','#bbf7d0','#86efac','#4ade80','#22c55e','#16a34a','#15803d','#166534','#14532d','#052e16'],
    emerald: ['#ecfdf5','#d1fae5','#a7f3d0','#6ee7b7','#34d399','#10b981','#059669','#047857','#065f46','#064e3b','#022c22'],
    teal:    ['#f0fdfa','#ccfbf1','#99f6e4','#5eead4','#2dd4bf','#14b8a6','#0d9488','#0f766e','#115e59','#134e4a','#042f2e'],
    cyan:    ['#ecfeff','#cffafe','#a5f3fc','#67e8f9','#22d3ee','#06b6d4','#0891b2','#0e7490','#155e75','#164e63','#083344'],
    sky:     ['#f0f9ff','#e0f2fe','#bae6fd','#7dd3fc','#38bdf8','#0ea5e9','#0284c7','#0369a1','#075985','#0c4a6e','#082f49'],
    blue:    ['#eff6ff','#dbeafe','#bfdbfe','#93c5fd','#60a5fa','#3b82f6','#2563eb','#1d4ed8','#1e40af','#1e3a8a','#172554'],
    indigo:  ['#eef2ff','#e0e7ff','#c7d2fe','#a5b4fc','#818cf8','#6366f1','#4f46e5','#4338ca','#3730a3','#312e81','#1e1b4e'],
    violet:  ['#f5f3ff','#ede9fe','#ddd6fe','#c4b5fd','#a78bfa','#8b5cf6','#7c3aed','#6d28d9','#5b21b6','#4c1d95','#2e1065'],
    purple:  ['#faf5ff','#f3e8ff','#e9d5ff','#d8b4fe','#c084fc','#a855f7','#9333ea','#7e22ce','#6b21a8','#581c87','#3b0764'],
    fuchsia: ['#fdf4ff','#fae8ff','#f5d0fe','#f0abfc','#e879f9','#d946ef','#c026d3','#a21caf','#86198f','#701a75','#4a044e'],
    pink:    ['#fdf2f8','#fce7f3','#fbcfe8','#f9a8d4','#f472b6','#ec4899','#db2777','#be185d','#9d174d','#831843','#500724'],
    rose:    ['#fff1f2','#ffe4e6','#fecdd3','#fda4af','#fb7185','#f43f5e','#e11d48','#be123c','#9f1239','#881337','#4c0519'],
};

const SPECIAL_COLORS = { white: '#ffffff', black: '#000000' };

// Build lookup: "blue-500" -> "#3b82f6"
const COLOR_LOOKUP = {};
for (const [family, hexes] of Object.entries(TW)) {
    SHADES.forEach((shade, i) => { COLOR_LOOKUP[`${family}-${shade}`] = hexes[i]; });
}
Object.assign(COLOR_LOOKUP, SPECIAL_COLORS);

const FAMILIES = Object.keys(TW);

/** Resolve a theme color string to a displayable hex. Handles prefixes like text-, bg-, !bg- */
const resolveColorHex = (val) => {
    if (!val) return null;
    if (val.startsWith('#')) return val;
    // Strip common prefixes
    const stripped = val.replace(/^(!?)(text|bg|border|ring|fill|stroke)-/, '');
    return COLOR_LOOKUP[stripped] || null;
};

// ═══════════════════════════════════════════════════════════════════════════
// THEME SCHEMA DEFINITIONS — documents what fields exist and their purpose
// ═══════════════════════════════════════════════════════════════════════════

const CATEGORY_COLOR_FIELDS = [
    { key: 'primaryColor', label: 'Primary', hint: 'Main category color' },
    { key: 'secondaryColor', label: 'Secondary', hint: 'Darker shade for contrast' },
    { key: 'indicatorColor', label: 'Indicator', hint: 'Notification dot color' },
    { key: 'borderColor', label: 'Border', hint: 'Card border color' },
    { key: 'statusBarColor', label: 'Status Bar', hint: 'Mobile status bar color' },
    { key: 'headerBrandingTextColor', label: 'Header Brand Text', hint: 'e.g. text-white' },
    { key: 'headerTextColor', label: 'Header Text', hint: 'e.g. text-white' },
    { key: 'backgroundPrimaryColor', label: 'Background Primary', hint: 'e.g. !bg-cyan-400' },
    { key: 'backgroundSecondaryColor', label: 'Background Secondary', hint: 'Lighter background' },
    { key: 'tabActiveColor', label: 'Tab Active', hint: 'e.g. bg-blue-300' },
];

const CATEGORY_KEYS = [
    'socialBadge','achievement','accomplishment','accommodation','workHistory',
    'learningHistory','skill','family','id','aiTopic','aiPathway','aiInsight',
];

const CATEGORY_LABELS = {
    socialBadge: 'Social Badge', achievement: 'Achievement', accomplishment: 'Accomplishment',
    accommodation: 'Accommodation', workHistory: 'Work History', learningHistory: 'Learning History',
    skill: 'Skill', family: 'Family', id: 'ID', aiTopic: 'AI Topic', aiPathway: 'AI Pathway', aiInsight: 'AI Insight',
};

// ═══════════════════════════════════════════════════════════════════════════
// API HELPERS
// ═══════════════════════════════════════════════════════════════════════════

const api = {
    async listThemes() { return (await fetch('/api/themes')).json(); },
    async getTheme(id) { return (await fetch(`/api/themes/${id}`)).json(); },
    async saveTheme(id, config) {
        return (await fetch(`/api/themes/${id}`, {
            method: 'PUT', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(config),
        })).json();
    },
    async deleteTheme(id) {
        return (await fetch(`/api/themes/${id}`, { method: 'DELETE' })).json();
    },
    async createTheme(id, config) {
        return (await fetch(`/api/themes/${id}`, {
            method: 'PUT', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id, ...config }),
        })).json();
    },
};

// ═══════════════════════════════════════════════════════════════════════════
// UTILITY — deep get/set/delete on nested objects by dot path
// ═══════════════════════════════════════════════════════════════════════════

const deepGet = (obj, path) => {
    const keys = path.split('.');
    let cur = obj;
    for (const k of keys) {
        if (cur == null || typeof cur !== 'object') return undefined;
        cur = cur[k];
    }
    return cur;
};

const deepSet = (obj, path, value) => {
    const clone = JSON.parse(JSON.stringify(obj));
    const keys = path.split('.');
    let cur = clone;
    for (let i = 0; i < keys.length - 1; i++) {
        if (cur[keys[i]] == null || typeof cur[keys[i]] !== 'object') cur[keys[i]] = {};
        cur = cur[keys[i]];
    }
    cur[keys[keys.length - 1]] = value;
    return clone;
};

const deepDelete = (obj, path) => {
    const clone = JSON.parse(JSON.stringify(obj));
    const keys = path.split('.');
    let cur = clone;
    for (let i = 0; i < keys.length - 1; i++) {
        if (cur[keys[i]] == null) return clone;
        cur = cur[keys[i]];
    }
    delete cur[keys[keys.length - 1]];
    // Clean up empty parent objects
    return cleanEmpty(clone);
};

const cleanEmpty = (obj) => {
    if (typeof obj !== 'object' || obj === null || Array.isArray(obj)) return obj;
    const result = {};
    for (const [k, v] of Object.entries(obj)) {
        const cleaned = cleanEmpty(v);
        if (typeof cleaned === 'object' && cleaned !== null && !Array.isArray(cleaned) && Object.keys(cleaned).length === 0) continue;
        result[k] = cleaned;
    }
    return result;
};

// ═══════════════════════════════════════════════════════════════════════════
// TOAST CONTEXT
// ═══════════════════════════════════════════════════════════════════════════

const ToastContext = createContext(null);

const ToastProvider = ({ children }) => {
    const [toast, setToast] = useState(null);
    const timerRef = useRef(null);

    const show = useCallback((message, type = 'success') => {
        if (timerRef.current) clearTimeout(timerRef.current);
        setToast({ message, type });
        timerRef.current = setTimeout(() => setToast(null), 3000);
    }, []);

    return (
        <ToastContext.Provider value={show}>
            {children}
            {toast && (
                <div className="toast" style={{ background: toast.type === 'success' ? '#10b981' : toast.type === 'error' ? '#ef4444' : '#3b82f6' }}>
                    {toast.message}
                </div>
            )}
        </ToastContext.Provider>
    );
};

const useToast = () => useContext(ToastContext);

// ═══════════════════════════════════════════════════════════════════════════
// COLOR PICKER POPUP
// ═══════════════════════════════════════════════════════════════════════════

const ColorPicker = ({ value, onSelect, onClose, position }) => {
    const [search, setSearch] = useState('');
    const [hexInput, setHexInput] = useState(value?.startsWith('#') ? value : '');
    const ref = useRef(null);

    const filteredFamilies = search
        ? FAMILIES.filter(f => f.includes(search.toLowerCase()))
        : FAMILIES;

    // Position the popup near the trigger
    const style = useMemo(() => {
        if (!position) return { top: 100, left: 100 };
        const top = Math.min(position.y, window.innerHeight - 500);
        const left = Math.min(position.x, window.innerWidth - 440);
        return { top: Math.max(8, top), left: Math.max(8, left) };
    }, [position]);

    return (
        <>
            <div className="picker-overlay" onClick={onClose} />
            <div className="picker-popup fade-in" style={style} ref={ref}>
                <div style={{ display: 'flex', gap: 8, marginBottom: 12 }}>
                    <input
                        type="text"
                        placeholder="Search colors..."
                        value={search}
                        onChange={e => setSearch(e.target.value)}
                        className="field-input"
                        style={{ flex: 1, fontSize: 12 }}
                        autoFocus
                    />
                    <div style={{ display: 'flex', gap: 4, alignItems: 'center' }}>
                        <input
                            type="color"
                            value={hexInput || '#000000'}
                            onChange={e => { setHexInput(e.target.value); }}
                            style={{ width: 32, height: 32, border: 'none', padding: 0, cursor: 'pointer', borderRadius: 6 }}
                        />
                        <button className="btn btn-primary" style={{ padding: '6px 10px', fontSize: 11 }}
                            onClick={() => { if (hexInput) onSelect(hexInput); }}>
                            Hex
                        </button>
                    </div>
                </div>

                {/* Special colors */}
                <div style={{ display: 'flex', gap: 4, marginBottom: 8 }}>
                    {[['white','#ffffff'],['black','#000000']].map(([name, hex]) => (
                        <div key={name} className="color-grid-cell"
                            style={{ background: hex, border: name === 'white' ? '1px solid #e2e8f0' : 'none' }}
                            title={name}
                            onClick={() => onSelect(name)}
                        />
                    ))}
                </div>

                {/* Grid header — shade numbers */}
                <div style={{ display: 'flex', gap: 2, marginBottom: 4, paddingLeft: 60 }}>
                    {SHADES.map(s => (
                        <div key={s} style={{ width: 32, textAlign: 'center', fontSize: 9, color: '#94a3b8', fontWeight: 500 }}>{s}</div>
                    ))}
                </div>

                {/* Color grid */}
                {filteredFamilies.map(family => (
                    <div key={family} style={{ display: 'flex', gap: 2, marginBottom: 2, alignItems: 'center' }}>
                        <div style={{ width: 56, fontSize: 11, color: '#64748b', fontWeight: 500, textAlign: 'right', paddingRight: 4 }}>
                            {family}
                        </div>
                        {TW[family].map((hex, i) => (
                            <div key={i} className="color-grid-cell"
                                style={{ background: hex }}
                                title={`${family}-${SHADES[i]}`}
                                onClick={() => onSelect(`${family}-${SHADES[i]}`)}
                            >
                                {value === `${family}-${SHADES[i]}` && (
                                    <svg style={{ position: 'absolute', inset: 0, margin: 'auto', width: 14, height: 14 }} viewBox="0 0 20 20" fill="none">
                                        <path d="M5 10l3.5 3.5L15 7" stroke={SHADES[i] < 400 ? '#1e293b' : '#fff'} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" />
                                    </svg>
                                )}
                            </div>
                        ))}
                    </div>
                ))}

                {/* Current value display */}
                {value && (
                    <div style={{ marginTop: 12, padding: '8px 12px', background: '#f8fafc', borderRadius: 8, fontSize: 12, display: 'flex', alignItems: 'center', gap: 8 }}>
                        <div className="swatch" style={{ background: resolveColorHex(value) || '#ddd', width: 20, height: 20, borderRadius: 4 }} />
                        <code style={{ color: '#475569' }}>{value}</code>
                        <button className="reset-btn" style={{ marginLeft: 'auto' }} onClick={() => onSelect('')} title="Clear value">
                            <svg width="14" height="14" viewBox="0 0 20 20" fill="currentColor"><path d="M6.28 5.22a.75.75 0 00-1.06 1.06L8.94 10l-3.72 3.72a.75.75 0 101.06 1.06L10 11.06l3.72 3.72a.75.75 0 101.06-1.06L11.06 10l3.72-3.72a.75.75 0 00-1.06-1.06L10 8.94 6.28 5.22z"/></svg>
                        </button>
                    </div>
                )}
            </div>
        </>
    );
};

// ═══════════════════════════════════════════════════════════════════════════
// FIELD COMPONENTS
// ═══════════════════════════════════════════════════════════════════════════

const ColorField = ({ label, value, inheritedValue, onChange, onClear, hint }) => {
    const [pickerOpen, setPickerOpen] = useState(false);
    const swatchRef = useRef(null);
    const displayValue = value ?? inheritedValue ?? '';
    const isInherited = value === undefined && inheritedValue !== undefined;
    const hex = resolveColorHex(displayValue);

    const openPicker = () => {
        const rect = swatchRef.current?.getBoundingClientRect();
        setPickerOpen(rect ? { x: rect.right + 8, y: rect.top } : { x: 300, y: 200 });
    };

    return (
        <div className="field-group">
            <div className="field-label" title={hint}>
                {label}
                {isInherited && <span className="badge badge-inherited" style={{ marginLeft: 6 }}>inherited</span>}
                {value !== undefined && inheritedValue !== undefined && <span className="badge badge-override" style={{ marginLeft: 6 }}>override</span>}
            </div>
            <div ref={swatchRef}
                className="swatch"
                style={{ background: hex || 'repeating-conic-gradient(#e2e8f0 0% 25%, white 0% 50%) 50%/12px 12px' }}
                onClick={openPicker}
                title={displayValue || 'Click to pick color'}
            />
            <input
                type="text"
                className={`field-input ${isInherited ? 'inherited' : ''}`}
                value={displayValue}
                placeholder={inheritedValue || hint || 'e.g. blue-500'}
                onChange={e => onChange(e.target.value)}
            />
            {value !== undefined && onClear && (
                <button className="reset-btn" onClick={onClear} title="Reset to inherited">

                                    {hasData && <span className="badge badge-override">set</span>}
                                </div>
                                <svg width="16" height="16" viewBox="0 0 20 20" fill="#94a3b8" style={{ transform: isExpanded ? 'rotate(180deg)' : 'none', transition: 'transform .15s' }}>
                                    <path fillRule="evenodd" d="M5.23 7.21a.75.75 0 011.06.02L10 11.168l3.71-3.938a.75.75 0 111.08 1.04l-4.25 4.5a.75.75 0 01-1.08 0l-4.25-4.5a.75.75 0 01.02-1.06z" clipRule="evenodd"/>
                                </svg>
                            </div>
                            {isExpanded && (
                                <div className="fade-in" style={{ padding: '12px 14px' }}>
                                    {SPILLED_CUP_FIELDS.map(f => {
                                        const fullPath = `colors.placeholders.${cat}.${f.key}`;
                                        const localValue = deepGet(config, fullPath);
                                        const inheritedValue = parentConfig ? deepGet(parentConfig, fullPath) : undefined;

                                        return (
                                            <HexColorField
                                                key={f.key}
                                                label={f.label}
                                                value={localValue}
                                                inheritedValue={inheritedValue}
                                                onChange={(v) => setConfig(deepSet(config, fullPath, v))}
                                                onClear={localValue !== undefined ? () => setConfig(deepDelete(config, fullPath)) : undefined}
                                            />
                                        );
                                    })}
                                </div>
                            )}
                        </div>
                    );
                })}
            </div>
        </>
    );
};

// ═══════════════════════════════════════════════════════════════════════════

// ═══════════════════════════════════════════════════════════════════════════
// SECTION: JSON View
// ═══════════════════════════════════════════════════════════════════════════

const JSONSection = ({ config, setConfig }) => {
    const [text, setText] = useState('');
    const [error, setError] = useState(null);

    useEffect(() => {
        setText(JSON.stringify(config, null, 4));
        setError(null);
    }, [config]);

    const apply = () => {
        try {
            const parsed = JSON.parse(text);
            setConfig(parsed);
            setError(null);
        } catch (e) {
            setError(e.message);
        }
    };

    return (
        <div className="section-card">
            <div className="section-title" style={{ justifyContent: 'space-between' }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                    <svg width="18" height="18" viewBox="0 0 20 20" fill="currentColor" style={{ color: '#475569' }}>
                        <path fillRule="evenodd" d="M6.28 5.22a.75.75 0 010 1.06L2.56 10l3.72 3.72a.75.75 0 01-1.06 1.06L.97 10.53a.75.75 0 010-1.06l4.25-4.25a.75.75 0 011.06 0zm7.44 0a.75.75 0 011.06 0l4.25 4.25a.75.75 0 010 1.06l-4.25 4.25a.75.75 0 01-1.06-1.06L17.44 10l-3.72-3.72a.75.75 0 010-1.06zM11.377 2.011a.75.75 0 01.612.867l-2.5 14.5a.75.75 0 01-1.478-.255l2.5-14.5a.75.75 0 01.866-.612z" clipRule="evenodd"/>
                    </svg>
                    Raw JSON
                </div>
                <div style={{ display: 'flex', gap: 8 }}>
                    <button className="btn btn-secondary" onClick={() => setText(JSON.stringify(JSON.parse(text), null, 4))} style={{ fontSize: 11, padding: '4px 10px' }}>
                        Format
                    </button>
                    <button className="btn btn-primary" onClick={apply} style={{ fontSize: 11, padding: '4px 10px' }}>
                        Apply Changes
                    </button>
                </div>
            </div>
            {error && (
                <div style={{ padding: '8px 12px', background: '#fef2f2', border: '1px solid #fecaca', borderRadius: 8, marginBottom: 12, fontSize: 12, color: '#dc2626' }}>
                    {error}
                </div>
            )}
            <textarea className="json-editor" value={text} onChange={e => setText(e.target.value)} spellCheck={false} />
        </div>
    );
};

// ═══════════════════════════════════════════════════════════════════════════
// CREATE THEME MODAL
// ═══════════════════════════════════════════════════════════════════════════

const CreateThemeModal = ({ themes, onClose, onCreate }) => {
    const [id, setId] = useState('');
    const [displayName, setDisplayName] = useState('');
    const [baseTheme, setBaseTheme] = useState(themes[0]?.id || '');
    const [creating, setCreating] = useState(false);
    const toast = useToast();

    const sanitizedId = id.trim().toLowerCase().replace(/[^a-z0-9-]/g, '');

    const handleCreate = async () => {
        if (!sanitizedId || !displayName.trim()) return;
        setCreating(true);

        try {
            const config = {
                displayName: displayName.trim(),
                ...(baseTheme ? { extends: baseTheme } : {}),
            };

            await api.createTheme(sanitizedId, config);
            toast(`Theme "${displayName}" created!`);
            onCreate(sanitizedId);
            onClose();
        } catch (e) {
            toast('Failed to create theme: ' + e.message, 'error');
        } finally {
            setCreating(false);
        }
    };

    return (
        <div className="modal-overlay" onClick={onClose}>
            <div className="modal" onClick={e => e.stopPropagation()}>
                <h2 style={{ margin: '0 0 4px 0', fontSize: 18, fontWeight: 600, color: '#1e293b' }}>Create New Theme</h2>
                <p style={{ margin: '0 0 20px 0', fontSize: 13, color: '#64748b' }}>Set up a new theme folder with a theme.json file.</p>

                <div style={{ marginBottom: 16 }}>
                    <label style={{ display: 'block', fontSize: 12, fontWeight: 500, color: '#475569', marginBottom: 4 }}>Theme ID</label>
                    <input className="field-input" value={id} onChange={e => setId(e.target.value)}
                        placeholder="e.g. dark-mode" style={{ width: '100%' }} />
                    {sanitizedId && sanitizedId !== id && (
                        <div style={{ fontSize: 11, color: '#94a3b8', marginTop: 2 }}>Will be saved as: <code>{sanitizedId}</code></div>
                    )}
                </div>

                <div style={{ marginBottom: 16 }}>
                    <label style={{ display: 'block', fontSize: 12, fontWeight: 500, color: '#475569', marginBottom: 4 }}>Display Name</label>
                    <input className="field-input" value={displayName} onChange={e => setDisplayName(e.target.value)}
                        placeholder="e.g. Dark Mode" style={{ width: '100%' }} />
                </div>

                <div style={{ marginBottom: 24 }}>
                    <label style={{ display: 'block', fontSize: 12, fontWeight: 500, color: '#475569', marginBottom: 4 }}>Extend From</label>
                    <select className="field-input" value={baseTheme} onChange={e => setBaseTheme(e.target.value)} style={{ width: '100%' }}>
                        <option value="">No parent (standalone)</option>
                        {themes.map(t => <option key={t.id} value={t.id}>{t.displayName}</option>)}
                    </select>
                    <div style={{ fontSize: 11, color: '#94a3b8', marginTop: 2 }}>
                        Inherited values show as placeholders. Override only what you need.
                    </div>
                </div>

                <div style={{ display: 'flex', justifyContent: 'flex-end', gap: 8 }}>
                    <button className="btn btn-secondary" onClick={onClose}>Cancel</button>
                    <button className="btn btn-primary" onClick={handleCreate}
                        disabled={!sanitizedId || !displayName.trim() || creating}>
                        {creating ? 'Creating...' : 'Create Theme'}
                    </button>
                </div>
            </div>
        </div>
    );
};

// ═══════════════════════════════════════════════════════════════════════════
// SIDEBAR

            <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                <svg width="24" height="24" viewBox="0 0 20 20" fill="#818cf8">
                    <path fillRule="evenodd" d="M7.21 14.77a.75.75 0 01.02-1.06L11.168 10 7.23 6.29a.75.75 0 111.04-1.08l4.5 4.25a.75.75 0 010 1.08l-4.5 4.25a.75.75 0 01-1.06-.02z" clipRule="evenodd"/>
                </svg>

            </a>

        <div style={{ padding: '12px 8px', flex: 1, overflowY: 'auto' }}>

                    onMouseLeave={e => { if (selectedId !== t.id) e.currentTarget.style.background = 'transparent'; }}

                style={{ width: '100%', background: '#4f46e5', color: 'white', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6 }}>
                <svg width="16" height="16" viewBox="0 0 20 20" fill="currentColor"><path d="M10.75 4.75a.75.75 0 00-1.5 0v4.5h-4.5a.75.75 0 000 1.5h4.5v4.5a.75.75 0 001.5 0v-4.5h4.5a.75.75 0 000-1.5h-4.5v-4.5z"/></svg>
                New Theme
            </button>
        </div>

// ═══════════════════════════════════════════════════════════════════════════
// THEME EDITOR (main content area)
// ═══════════════════════════════════════════════════════════════════════════

const TABS = [
    { id: 'general', label: 'General' },
    { id: 'categories', label: 'Categories' },
    { id: 'ui', label: 'UI Colors' },
    { id: 'placeholders', label: 'Placeholders' },
    { id: 'styles', label: 'Styles' },
    { id: 'json', label: 'JSON' },
];

const ThemeEditor = ({ themeId, themes, onDeleted, onSaved }) => {
    const [config, setConfig] = useState(null);
    const [originalJson, setOriginalJson] = useState('');
    const [parentConfig, setParentConfig] = useState(null);
    const [activeTab, setActiveTab] = useState('general');
    const [saving, setSaving] = useState(false);
    const [loading, setLoading] = useState(true);
    const [confirmDelete, setConfirmDelete] = useState(false);
    const toast = useToast();

    // Load theme config
    useEffect(() => {
        setLoading(true);
        setConfig(null);
        setParentConfig(null);
        setConfirmDelete(false);

        api.getTheme(themeId).then(data => {
            setConfig(data);
            setOriginalJson(JSON.stringify(data));

            // Load parent if extends
            if (data.extends) {
                api.getTheme(data.extends).then(p => setParentConfig(p)).catch(() => {});
            }

            setLoading(false);
        }).catch(err => {
            toast('Failed to load theme: ' + err.message, 'error');
            setLoading(false);
        });
    }, [themeId]);

    // Also reload parent when extends changes
    useEffect(() => {
        if (config?.extends) {
            api.getTheme(config.extends).then(p => setParentConfig(p)).catch(() => setParentConfig(null));
        } else {
            setParentConfig(null);
        }
    }, [config?.extends]);

    const isDirty = config && JSON.stringify(config) !== originalJson;

    const handleSave = async () => {
        setSaving(true);
        try {
            const result = await api.saveTheme(themeId, config);
            setOriginalJson(JSON.stringify(result.config || config));
            toast('Theme saved!');
            onSaved?.();
        } catch (e) {
            toast('Failed to save: ' + e.message, 'error');
        } finally {
            setSaving(false);
        }
    };

    const handleDelete = async () => {
        try {
            await api.deleteTheme(themeId);
            toast('Theme deleted');
            onDeleted?.();
        } catch (e) {
            toast('Failed to delete: ' + e.message, 'error');
        }
    };

    const handleFieldChange = (key, value) => {
        if (value === undefined || value === '') {
            const next = { ...config };
            delete next[key];
            setConfig(next);
        } else {
            setConfig({ ...config, [key]: value });
        }
    };

    if (loading) {
        return (
            <div style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#94a3b8' }}>
                Loading theme...
            </div>
        );
    }

    if (!config) {
        return (
            <div style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#94a3b8' }}>
                Failed to load theme
            </div>
        );
    }

    return (
        <div style={{ flex: 1, display: 'flex', flexDirection: 'column', height: '100vh', overflow: 'hidden' }}>
            {/* Header */}
            <div style={{ padding: '16px 24px', borderBottom: '1px solid #e2e8f0', background: 'white', display: 'flex', alignItems: 'center', justifyContent: 'space-between', flexShrink: 0 }}>
                <div>
                    <h1 style={{ margin: 0, fontSize: 20, fontWeight: 600, color: '#1e293b' }}>{config.displayName || config.id}</h1>
                    <div style={{ fontSize: 12, color: '#94a3b8', marginTop: 2 }}>
                        schemas/{config.id}/theme.json
                        {config.extends && <span> &middot; extends <code style={{ color: '#6366f1' }}>{config.extends}</code></span>}
                    </div>
                </div>
                <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
                    {isDirty && <span style={{ fontSize: 12, color: '#f59e0b', fontWeight: 500 }}>Unsaved changes</span>}
                    {confirmDelete ? (
                        <>
                            <span style={{ fontSize: 12, color: '#ef4444' }}>Delete this theme?</span>
                            <button className="btn btn-danger" onClick={handleDelete} style={{ fontSize: 12 }}>Yes, Delete</button>
                            <button className="btn btn-secondary" onClick={() => setConfirmDelete(false)} style={{ fontSize: 12 }}>Cancel</button>
                        </>
                    ) : (
                        <>
                            <button className="btn btn-secondary" onClick={() => setConfirmDelete(true)} style={{ fontSize: 12, color: '#ef4444' }}>Delete</button>
                            <button className="btn btn-primary" onClick={handleSave} disabled={!isDirty || saving} style={{ fontSize: 12 }}>
                                {saving ? 'Saving...' : 'Save'}
                            </button>
                        </>
                    )}
                </div>
            </div>

            {/* Tab bar */}
            <div style={{ padding: '8px 24px', background: 'white', borderBottom: '1px solid #e2e8f0', display: 'flex', gap: 4, flexShrink: 0 }}>
                {TABS.map(tab => (
                    <button key={tab.id} className={`tab-btn ${activeTab === tab.id ? 'active' : ''}`}
                        onClick={() => setActiveTab(tab.id)}>
                        {tab.label}
                    </button>
                ))}
            </div>

            {/* Content */}
            <div style={{ flex: 1, overflowY: 'auto', padding: 24, background: '#f8fafc' }}>
                <div style={{ maxWidth: 800 }}>
                    {activeTab === 'general' && (
                        <GeneralSection config={config} parentConfig={parentConfig} themes={themes} onChange={handleFieldChange} />
                    )}
                    {activeTab === 'categories' && (
                        <CategoriesSection config={config} parentConfig={parentConfig} setConfig={setConfig} />
                    )}
                    {activeTab === 'ui' && (
                        <UIColorsSection config={config} parentConfig={parentConfig} setConfig={setConfig} />
                    )}
                    {activeTab === 'placeholders' && (
                        <PlaceholdersSection config={config} parentConfig={parentConfig} setConfig={setConfig} />
                    )}
                    {activeTab === 'styles' && (
                        <StylesSection config={config} parentConfig={parentConfig} setConfig={setConfig} />
                    )}
                    {activeTab === 'json' && (
                        <JSONSection config={config} setConfig={setConfig} />
                    )}
                </div>
            </div>
        </div>
    );
};

// ═══════════════════════════════════════════════════════════════════════════
// APP ROOT
// ═══════════════════════════════════════════════════════════════════════════

const App = () => {
    const [themes, setThemes] = useState([]);
    const [selectedId, setSelectedId] = useState(null);
    const [createModalOpen, setCreateModalOpen] = useState(false);
    const [loading, setLoading] = useState(true);

    const loadThemes = async () => {
        try {
            const data = await api.listThemes();
            setThemes(data);

            if (!selectedId && data.length > 0) {
                setSelectedId(data[0].id);
            }
        } catch (e) {
            console.error('Failed to load themes:', e);
        } finally {
            setLoading(false);
        }
    };

    useEffect(() => { loadThemes(); }, []);

    const handleCreated = (newId) => {
        loadThemes();
        setSelectedId(newId);
    };

    const handleDeleted = () => {
        setSelectedId(null);
        loadThemes();
    };

    if (loading) {
        return (
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', height: '100vh', color: '#94a3b8', fontSize: 15 }}>
                Loading themes...
            </div>
        );
    }

    return (
        <div style={{ display: 'flex', height: '100vh' }}>
            <Sidebar
                themes={themes}
                selectedId={selectedId}
                onSelect={setSelectedId}
                onCreateClick={() => setCreateModalOpen(true)}
            />

            {selectedId ? (
                <ThemeEditor
                    key={selectedId}
                    themeId={selectedId}
                    themes={themes}
                    onDeleted={handleDeleted}
                    onSaved={loadThemes}
                />
            ) : (
                <div style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', flexDirection: 'column', gap: 12, color: '#94a3b8' }}>
                    <svg width="48" height="48" viewBox="0 0 20 20" fill="currentColor" style={{ opacity: 0.3 }}>
                        <path fillRule="evenodd" d="M7.21 14.77a.75.75 0 01.02-1.06L11.168 10 7.23 6.29a.75.75 0 111.04-1.08l4.5 4.25a.75.75 0 010 1.08l-4.5 4.25a.75.75 0 01-1.06-.02z" clipRule="evenodd"/>
                    </svg>
                    <div style={{ fontSize: 15 }}>Select a theme to edit</div>
                    <button className="btn btn-primary" onClick={() => setCreateModalOpen(true)}>
                        Create New Theme
                    </button>
                </div>
            )}

            {createModalOpen && (
                <CreateThemeModal
                    themes={themes}
                    onClose={() => setCreateModalOpen(false)}
                    onCreate={handleCreated}
                />
            )}
        </div>
    );
};

// ═══════════════════════════════════════════════════════════════════════════
// MOUNT
// ═══════════════════════════════════════════════════════════════════════════

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(
    <ToastProvider>
        <App />
    </ToastProvider>
);
    </script>
