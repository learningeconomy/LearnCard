// ─── Utility functions ───────────────────────────────────────────────────────

const getNestedValue = (obj, path) => {
    return path.split('.').reduce((o, k) => o?.[k], obj);
};

const setNestedValue = (obj, path, value) => {
    const clone = JSON.parse(JSON.stringify(obj));
    const keys = path.split('.');
    let current = clone;

    for (let i = 0; i < keys.length - 1; i++) {
        if (current[keys[i]] === undefined || current[keys[i]] === null) {
            current[keys[i]] = {};
        }

        current = current[keys[i]];
    }

    if (value === '' || value === undefined) {
        delete current[keys[keys.length - 1]];
    } else {
        current[keys[keys.length - 1]] = value;
    }

    return clone;
};

const syntaxHighlight = (json) => {
    if (typeof json !== 'string') json = JSON.stringify(json, null, 2);

    return json.replace(
        /("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g,
        (match) => {
            let cls = 'json-num';

            if (/^"/.test(match)) {
                cls = /:$/.test(match) ? 'json-key' : 'json-str';
            } else if (/true|false/.test(match)) {
                cls = 'json-bool';
            } else if (/null/.test(match)) {
                cls = 'json-null';
            }

            return '<span class="' + cls + '">' + match + '</span>';
        }
    );
};

// ─── Components ──────────────────────────────────────────────────────────────

function FieldInput({ field, value, defaultValue, onChange }) {
    const isOverridden = value !== undefined && value !== '' && JSON.stringify(value) !== JSON.stringify(defaultValue);

    if (field.type === 'boolean') {
        const checked = value ?? defaultValue ?? false;

        return h`
            <div class="field-row flex items-center justify-between px-4 py-3 rounded-xl transition-colors">
                <div class="flex items-center gap-2">
                    ${isOverridden ? h`<span class="override-dot" title="Overridden from default" />` : h`<span class="w-[6px] mr-[6px]" />`}
                    <div>
                        <div class="text-sm font-medium text-gs-800">${field.label}</div>
                        ${field.help ? h`<div class="text-xs text-gs-400 mt-0.5">${field.help}</div>` : null}
                    </div>
                </div>
                <button
                    onClick=${() => onChange(field.path, !checked)}
                    class="relative w-11 h-6 rounded-full transition-colors ${checked ? 'bg-emerald-500' : 'bg-gs-300'}"
                >
                    <span class="absolute top-0.5 ${checked ? 'left-[22px]' : 'left-0.5'} w-5 h-5 bg-white rounded-full shadow transition-all" />
                </button>
            </div>
        `;
    }

    if (field.type === 'select') {
        return h`
            <div class="field-row px-4 py-3 rounded-xl transition-colors">
                <div class="flex items-center gap-2 mb-1.5">
                    ${isOverridden ? h`<span class="override-dot" title="Overridden from default" />` : h`<span class="w-[6px] mr-[6px]" />`}
                    <label class="text-sm font-medium text-gs-800">${field.label}</label>
                </div>
                <select
                    value=${value ?? defaultValue ?? ''}
                    onChange=${(e) => onChange(field.path, e.target.value)}
                    class="w-full py-2.5 px-3 border border-gs-200 rounded-xl text-sm text-gs-900 bg-white"
                >
                    ${(field.options || []).map(opt => h`
                        <option key=${opt} value=${opt}>${opt}</option>
                    `)}
                </select>
            </div>
        `;
    }

    if (field.type === 'color') {
        const displayValue = value ?? defaultValue ?? '';

        return h`
            <div class="field-row px-4 py-3 rounded-xl transition-colors">
                <div class="flex items-center gap-2 mb-1.5">
                    ${isOverridden ? h`<span class="override-dot" title="Overridden from default" />` : h`<span class="w-[6px] mr-[6px]" />`}
                    <label class="text-sm font-medium text-gs-800">${field.label}</label>
                </div>
                <div class="flex items-center gap-2">
                    <input
                        type="color"
                        value=${displayValue || '#000000'}
                        onChange=${(e) => onChange(field.path, e.target.value)}
                        class="w-10 h-10 rounded-lg border border-gs-200 cursor-pointer p-0.5"
                    />
                    <input
                        type="text"
                        value=${displayValue}
                        onChange=${(e) => onChange(field.path, e.target.value)}
                        placeholder=${defaultValue || 'e.g. #4F46E5'}
                        class="flex-1 py-2.5 px-3 border border-gs-200 rounded-xl text-sm text-gs-900 bg-white placeholder:text-gs-400"
                    />
                    ${displayValue ? h`
                        <div class="w-6 h-6 rounded-full border border-gs-200" style=${{ background: displayValue }} />
                    ` : null}
                </div>
            </div>
        `;
    }

    // Default: string input
    return h`
        <div class="field-row px-4 py-3 rounded-xl transition-colors">
            <div class="flex items-center gap-2 mb-1.5">
                ${isOverridden ? h`<span class="override-dot" title="Overridden from default" />` : h`<span class="w-[6px] mr-[6px]" />`}
                <label class="text-sm font-medium text-gs-800">
                    ${field.label}
                    ${field.required ? h`<span class="text-red-400 ml-0.5">*</span>` : null}
                </label>
                ${defaultValue && !value ? h`<span class="text-xs text-gs-400 ml-auto">default</span>` : null}
            </div>
            <input
                type="text"
                value=${value ?? ''}
                onChange=${(e) => onChange(field.path, e.target.value)}
                placeholder=${defaultValue || field.help || ''}
                class="w-full py-2.5 px-3 border border-gs-200 rounded-xl text-sm text-gs-900 bg-white placeholder:text-gs-400"
            />
            ${field.help ? h`<div class="text-xs text-gs-400 mt-1 pl-[18px]">${field.help}</div>` : null}
        </div>
    `;
}

function SectionCard({ section, merged, defaults, overrides, onChange, isExpanded, onToggle }) {
    const overrideCount = section.fields.filter(f => {
        const val = getNestedValue(overrides, f.path);

        return val !== undefined && val !== '';
    }).length;

    return h`
        <div class="section-card bg-white rounded-2xl border border-gs-200 overflow-hidden">
            <button
                onClick=${onToggle}
                class="w-full px-5 py-4 flex items-center justify-between hover:bg-gs-10 transition-colors"
            >
                <div class="flex items-center gap-3">
                    <span class="text-lg">${section.icon}</span>
                    <span class="font-semibold text-gs-900">${section.label}</span>
                    ${overrideCount > 0 ? h`
                        <span class="px-2 py-0.5 bg-emerald-50 text-emerald-700 text-xs font-medium rounded-full">
                            ${overrideCount} override${overrideCount > 1 ? 's' : ''}
                        </span>
                    ` : null}
                </div>
                <svg class="w-5 h-5 text-gs-400 transition-transform ${isExpanded ? 'rotate-180' : ''}" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                </svg>
            </button>
            ${isExpanded ? h`
                <div class="px-2 pb-3 border-t border-gs-100 fade-in">
                    <div class="space-y-1 mt-2">
                        ${section.fields.map(field => h`
                            <${FieldInput}
                                key=${field.path}
                                field=${field}
                                value=${getNestedValue(overrides, field.path)}
                                defaultValue=${getNestedValue(defaults, field.path)}
                                onChange=${onChange}
                            />
                        `)}
                    </div>
                </div>
            ` : null}
        </div>
    `;
}

                >
                    <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
                    </svg>
                    Copy
                </button>
            </div>
            <div class="text-xs text-gs-400">${lineCount} lines · overrides only</div>
            <pre
                class="bg-white rounded-2xl border border-gs-200 p-4 text-xs font-mono leading-relaxed overflow-auto max-h-[500px] scrollbar-thin"
                dangerouslySetInnerHTML=${{ __html: highlighted }}
            />

            ${validationErrors.length > 0 ? h`
                <div class="bg-red-50 border border-red-100 rounded-2xl p-3">
                    <div class="text-xs font-medium text-red-700 mb-1">Validation Errors</div>
                    ${validationErrors.map((err, i) => h`
                        <div key=${i} class="text-xs text-red-600 font-mono">${err}</div>
                    `)}
                </div>
            ` : h`
                <div class="bg-emerald-50 border border-emerald-100 rounded-2xl p-3 flex items-center gap-2">
                    <svg class="w-4 h-4 text-emerald-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                    </svg>
                    <span class="text-xs font-medium text-emerald-700">Config is valid</span>
                </div>
            `}
        </div>
    `;
}

// ─── Main App ────────────────────────────────────────────────────────────────

function App() {
    const [tenants, setTenants] = useState([]);
    const [activeTenant, setActiveTenant] = useState(null);
    const [defaults, setDefaults] = useState({});
    const [overrides, setOverrides] = useState({});
    const [merged, setMerged] = useState({});
    const [validationErrors, setValidationErrors] = useState([]);
    const [expandedSections, setExpandedSections] = useState(new Set(['general', 'branding']));
    const [saving, setSaving] = useState(false);
    const [saveStatus, setSaveStatus] = useState(null);
    const [rightTab, setRightTab] = useState('preview');
    const [newTenantName, setNewTenantName] = useState('');
    const [showNewTenant, setShowNewTenant] = useState(false);
    const debounceRef = useRef(null);

    // Load initial data
    useEffect(() => {
        api.get('/api/defaults').then(setDefaults);
        api.get('/api/tenants').then(setTenants);
    }, []);

    // Load tenant config
    const loadTenant = useCallback(async (name) => {
        setActiveTenant(name);
        setSaveStatus(null);

        const data = await api.get('/api/tenant/' + name);

        setOverrides(data.overrides);
        setMerged(data.merged);
        setValidationErrors([]);
    }, []);

    // Deep merge overrides onto defaults for preview
    const recomputeMerged = useCallback((newOverrides) => {
        const deepMergeLocal = (base, over) => {
            const result = { ...base };

            for (const key of Object.keys(over)) {
                const bv = base[key];
                const ov = over[key];

                if (bv && ov && typeof bv === 'object' && !Array.isArray(bv) && typeof ov === 'object' && !Array.isArray(ov)) {
                    result[key] = deepMergeLocal(bv, ov);
                } else {
                    result[key] = ov;
                }
            }

            return result;
        };

        return deepMergeLocal(defaults, newOverrides);
    }, [defaults]);

    // Validate with debounce
    const validateDebounced = useCallback((overridesToValidate) => {
        if (debounceRef.current) clearTimeout(debounceRef.current);

        debounceRef.current = setTimeout(async () => {
            const result = await api.post('/api/validate', overridesToValidate);

            setValidationErrors(result.errors || []);
        }, 300);
    }, []);

    // Handle field change
    const handleChange = useCallback((path, value) => {
        setOverrides(prev => {
            const next = setNestedValue(prev, path, value);
            const newMerged = recomputeMerged(next);

            setMerged(newMerged);
            validateDebounced(next);
            setSaveStatus(null);

            return next;
        });
    }, [recomputeMerged, validateDebounced]);

    // Save
    const handleSave = useCallback(async () => {
        if (!activeTenant) return;

        setSaving(true);

        try {
            const result = await api.put('/api/tenant/' + activeTenant, { overrides });

            if (result.saved) {
                setSaveStatus('saved');
                api.get('/api/tenants').then(setTenants);
            } else {
                setSaveStatus('error');
                setValidationErrors(result.errors || ['Unknown error']);
            }
        } catch {
            setSaveStatus('error');
        }

        setSaving(false);
    }, [activeTenant, overrides]);

    // Create new tenant
    const handleCreateTenant = useCallback(async () => {
        const name = newTenantName.trim().toLowerCase().replace(/[^a-z0-9_-]/g, '');

        if (!name) return;

        await api.put('/api/tenant/' + name, {
            overrides: { tenantId: name, domain: name + '.app' }
        });

        setNewTenantName('');
        setShowNewTenant(false);

        const list = await api.get('/api/tenants');

        setTenants(list);
        loadTenant(name);
    }, [newTenantName, loadTenant]);

    // Toggle section
    const toggleSection = useCallback((key) => {
        setExpandedSections(prev => {
            const next = new Set(prev);

            if (next.has(key)) next.delete(key);
            else next.add(key);

            return next;
        });
    }, []);

    const overrideCount = useMemo(() => {
        const count = (obj) => {
            let n = 0;

            for (const v of Object.values(obj || {})) {
                if (v && typeof v === 'object' && !Array.isArray(v)) n += count(v);
                else if (v !== undefined && v !== '') n++;
            }

            return n;
        };

        return count(overrides);
    }, [overrides]);

    return h`
        <div class="h-screen flex flex-col">
            <!-- Top bar -->
            <header class="h-14 bg-white border-b border-gs-200 flex items-center justify-between px-5 flex-shrink-0">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 bg-gradient-to-br from-violet-500 to-indigo-600 rounded-lg flex items-center justify-center">
                        <svg class="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                        </svg>
                    </div>
                    <h1 class="font-bold text-gs-900">Tenant Config Editor</h1>
                    ${activeTenant ? h`
                        <span class="text-gs-400 mx-1">/</span>
                        <span class="font-medium text-gs-700">${activeTenant}</span>
                        ${overrideCount > 0 ? h`
                            <span class="px-2 py-0.5 bg-emerald-50 text-emerald-700 text-xs font-medium rounded-full">
                                ${overrideCount} override${overrideCount > 1 ? 's' : ''}
                            </span>
                        ` : null}
                    ` : null}
                </div>
                <div class="flex items-center gap-3">
                    ${validationErrors.length === 0 && activeTenant ? h`
                        <div class="flex items-center gap-1.5 text-emerald-600">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                            </svg>
                            <span class="text-xs font-medium">Valid</span>
                        </div>
                    ` : null}
                    ${validationErrors.length > 0 ? h`
                        <div class="flex items-center gap-1.5 text-red-500">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                            </svg>
                            <span class="text-xs font-medium">${validationErrors.length} error${validationErrors.length > 1 ? 's' : ''}</span>
                        </div>
                    ` : null}
                    ${activeTenant ? h`
                        <button
                            onClick=${handleSave}
                            disabled=${saving || validationErrors.length > 0}
                            class="pill px-4 py-2 bg-gs-900 text-white text-sm font-medium hover:opacity-90 transition-opacity disabled:opacity-40 disabled:cursor-not-allowed flex items-center gap-2"
                        >
                            ${saving ? h`<span class="w-3.5 h-3.5 border-2 border-white/30 border-t-white rounded-full animate-spin" />` : null}
                            ${saving ? 'Saving...' : saveStatus === 'saved' ? 'Saved!' : 'Save Config'}
                        </button>
                    ` : null}
                </div>
            </header>

            <div class="flex flex-1 overflow-hidden">
                <!-- Sidebar: tenant list -->
                <aside class="w-56 bg-white border-r border-gs-200 flex flex-col flex-shrink-0">
                    <div class="p-3 border-b border-gs-100">
                        <div class="text-xs font-semibold text-gs-500 uppercase tracking-wider mb-2 px-2">Tenants</div>
                        <div class="space-y-0.5">
                            ${tenants.map(t => h`
                                <button
                                    key=${t.name}
                                    onClick=${() => loadTenant(t.name)}
                                    class="w-full text-left px-3 py-2 rounded-xl text-sm transition-colors flex items-center justify-between group
                                        ${activeTenant === t.name ? 'bg-gs-900 text-white' : 'text-gs-700 hover:bg-gs-50'}"
                                >
                                    <span class="font-medium">${t.name}</span>
                                    <div class="flex items-center gap-1.5">
                                        ${t.hasConfig ? h`
                                            <span class="w-1.5 h-1.5 rounded-full ${activeTenant === t.name ? 'bg-emerald-400' : 'bg-emerald-500'}" title="Has config" />
                                        ` : null}
                                        ${t.hasAssets ? h`
                                            <span class="w-1.5 h-1.5 rounded-full ${activeTenant === t.name ? 'bg-violet-400' : 'bg-violet-500'}" title="Has assets" />
                                        ` : null}
                                    </div>
                                </button>
                            `)}
                        </div>
                    </div>
                    <div class="p-3">
                        ${showNewTenant ? h`
                            <div class="space-y-2 fade-in">
                                <input
                                    type="text"
                                    value=${newTenantName}
                                    onChange=${(e) => setNewTenantName(e.target.value)}
                                    onKeyDown=${(e) => e.key === 'Enter' && handleCreateTenant()}
                                    placeholder="tenant-name"
                                    class="w-full py-2 px-3 border border-gs-200 rounded-xl text-sm text-gs-900 bg-white placeholder:text-gs-400"
                                    autoFocus
                                />
                                <div class="flex gap-2">
                                    <button
                                        onClick=${handleCreateTenant}
                                        class="flex-1 pill py-1.5 bg-gs-900 text-white text-xs font-medium"
                                    >Create</button>
                                    <button
                                        onClick=${() => { setShowNewTenant(false); setNewTenantName(''); }}
                                        class="flex-1 pill py-1.5 border border-gs-300 text-gs-700 text-xs font-medium"
                                    >Cancel</button>
                                </div>
                            </div>
                        ` : h`
                            <button
                                onClick=${() => setShowNewTenant(true)}
                                class="w-full pill py-2 border border-dashed border-gs-300 text-gs-500 text-sm font-medium hover:border-gs-400 hover:text-gs-700 transition-colors"
                            >+ New Tenant</button>
                        `}
                    </div>
                </aside>

                ${activeTenant ? h`
                    <!-- Editor: sections -->
                    <main class="flex-1 overflow-y-auto p-6 scrollbar-thin">
                        <div class="max-w-2xl mx-auto space-y-3">
                            ${SECTIONS.map(section => h`
                                <${SectionCard}
                                    key=${section.key}
                                    section=${section}
                                    merged=${merged}
                                    defaults=${defaults}
                                    overrides=${overrides}
                                    onChange=${handleChange}
                                    isExpanded=${expandedSections.has(section.key)}
                                    onToggle=${() => toggleSection(section.key)}
                                />
                            `)}
                        </div>
                    </main>

                    <!-- Right panel: preview + JSON -->
                    <aside class="w-80 bg-white border-l border-gs-200 flex flex-col flex-shrink-0 overflow-hidden">
                        <div class="flex border-b border-gs-100">
                            <button
                                onClick=${() => setRightTab('preview')}
                                class="flex-1 py-3 text-sm font-medium transition-colors
                                    ${rightTab === 'preview' ? 'text-gs-900 border-b-2 border-gs-900' : 'text-gs-400 hover:text-gs-700'}"
                            >Preview</button>
                            <button
                                onClick=${() => setRightTab('json')}
                                class="flex-1 py-3 text-sm font-medium transition-colors
                                    ${rightTab === 'json' ? 'text-gs-900 border-b-2 border-gs-900' : 'text-gs-400 hover:text-gs-700'}"
                            >JSON Output</button>
                        </div>
                        <div class="flex-1 overflow-y-auto p-4 scrollbar-thin">
                            ${rightTab === 'preview'
                                ? h`<${BrandingPreview} merged=${merged} />`
                                : h`<${JsonPanel} overrides=${overrides} validationErrors=${validationErrors} />`
                            }
                        </div>
                    </aside>
                ` : h`
                    <!-- Empty state -->
                    <main class="flex-1 flex items-center justify-center">
                        <div class="text-center space-y-3">
                            <div class="w-16 h-16 mx-auto bg-gs-100 rounded-2xl flex items-center justify-center">
                                <svg class="w-8 h-8 text-gs-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
                                </svg>
                            </div>
                            <div>
                                <h2 class="text-lg font-semibold text-gs-900">Select a tenant</h2>
                                <p class="text-sm text-gs-500 mt-1">Choose a tenant from the sidebar or create a new one.</p>
                            </div>
                        </div>
                    </main>
                `}
            </div>
        </div>
    `;
}

// ─── Mount ───────────────────────────────────────────────────────────────────

const root = createRoot(document.getElementById('root'));
root.render(h`<${App} />`);
    </script>
</body>
</html>
