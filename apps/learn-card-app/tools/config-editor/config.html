// ─── Utility functions ───────────────────────────────────────────────────────

const getNestedValue = (obj, path) => {
    return path.split('.').reduce((o, k) => o?.[k], obj);
};

const setNestedValue = (obj, path, value) => {
    const clone = JSON.parse(JSON.stringify(obj));
    const keys = path.split('.');
    let current = clone;

    for (let i = 0; i < keys.length - 1; i++) {
        if (current[keys[i]] === undefined || current[keys[i]] === null) {
            current[keys[i]] = {};
        }

        current = current[keys[i]];
    }

    if (value === '' || value === undefined) {
        delete current[keys[keys.length - 1]];
    } else {
        current[keys[keys.length - 1]] = value;
    }

    return clone;
};

const syntaxHighlight = (json) => {
    if (typeof json !== 'string') json = JSON.stringify(json, null, 2);

    return json.replace(
        /("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g,
        (match) => {
            let cls = 'json-num';

            if (/^"/.test(match)) {
                cls = /:$/.test(match) ? 'json-key' : 'json-str';
            } else if (/true|false/.test(match)) {
                cls = 'json-bool';
            } else if (/null/.test(match)) {
                cls = 'json-null';
            }

            return '<span class="' + cls + '">' + match + '</span>';
        }
    );
};

// ─── Dynamic options (populated on load) ─────────────────────────────────────

let availableThemes = [];
api.get('/api/themes').then(list => { availableThemes = list; }).catch(() => {});

// ─── Components ──────────────────────────────────────────────────────────────

function FieldInput({ field, value, defaultValue, onChange }) {
    const isOverridden = value !== undefined && value !== '' && JSON.stringify(value) !== JSON.stringify(defaultValue);

    if (field.type === 'boolean') {
        const checked = value ?? defaultValue ?? false;

        return h`
            <div class="field-row flex items-center justify-between px-4 py-3 rounded-xl transition-colors">
                <div class="flex items-center gap-2">
                    ${isOverridden ? h`<span class="override-dot" title="Overridden from default" />` : h`<span class="w-[6px] mr-[6px]" />`}
                    <div>
                        <div class="text-sm font-medium text-gs-800">${field.label}</div>
                        ${field.help ? h`<div class="text-xs text-gs-400 mt-0.5">${field.help}</div>` : null}
                    </div>
                </div>
                <button
                    onClick=${() => onChange(field.path, !checked)}
                    class="relative w-11 h-6 rounded-full transition-colors ${checked ? 'bg-emerald-500' : 'bg-gs-300'}"
                >
                    <span class="absolute top-0.5 ${checked ? 'left-[22px]' : 'left-0.5'} w-5 h-5 bg-white rounded-full shadow transition-all" />
                </button>
            </div>
        `;
    }

    if (field.type === 'select') {
        return h`
            <div class="field-row px-4 py-3 rounded-xl transition-colors">
                <div class="flex items-center gap-2 mb-1.5">
                    ${isOverridden ? h`<span class="override-dot" title="Overridden from default" />` : h`<span class="w-[6px] mr-[6px]" />`}
                    <label class="text-sm font-medium text-gs-800">${field.label}</label>
                </div>
                <select
                    value=${value ?? defaultValue ?? ''}
                    onChange=${(e) => onChange(field.path, e.target.value)}
                    class="w-full py-2.5 px-3 border border-gs-200 rounded-xl text-sm text-gs-900 bg-white"
                >
                    ${(field.optionsFrom === 'themes' && availableThemes.length
                        ? availableThemes.map(t => t.id)
                        : field.options || []
                    ).map(opt => h`
                        <option key=${opt} value=${opt}>${opt}</option>
                    `)}
                </select>
            </div>
        `;
    }

    if (field.type === 'array') {
        const items = Array.isArray(value) ? value : (Array.isArray(defaultValue) ? defaultValue : []);
        const isOverriddenArr = value !== undefined && JSON.stringify(value) !== JSON.stringify(defaultValue);
        const [draft, setDraft] = useState('');

        const addItem = () => {
            const trimmed = draft.trim();

            if (!trimmed) return;

            const next = [...(Array.isArray(value) ? value : []), trimmed];

            onChange(field.path, next);
            setDraft('');
        };

        const removeItem = (idx) => {
            const next = items.filter((_, i) => i !== idx);

            onChange(field.path, next.length > 0 ? next : undefined);
        };

        return h`
            <div class="field-row px-4 py-3 rounded-xl transition-colors">
                <div class="flex items-center gap-2 mb-1.5">
                    ${isOverriddenArr ? h`<span class="override-dot" title="Overridden from default" />` : h`<span class="w-[6px] mr-[6px]" />`}
                    <label class="text-sm font-medium text-gs-800">${field.label}</label>
                    ${defaultValue && !value ? h`<span class="text-xs text-gs-400 ml-auto">default</span>` : null}
                </div>
                <div class="flex flex-wrap gap-1.5 mb-2 min-h-[28px]">
                    ${items.map((item, idx) => h`
                        <span key=${idx} class="inline-flex items-center gap-1 px-2.5 py-1 bg-gs-100 text-gs-800 text-xs font-medium rounded-full">
                            ${item}
                            <button
                                onClick=${() => removeItem(idx)}
                                class="w-3.5 h-3.5 flex items-center justify-center rounded-full hover:bg-gs-300 transition-colors text-gs-500 hover:text-gs-800"
                            >
                                <svg class="w-2.5 h-2.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                                </svg>
                            </button>
                        </span>
                    `)}
                    ${items.length === 0 ? h`<span class="text-xs text-gs-400 py-1">No items</span>` : null}
                </div>
                <div class="flex gap-1.5">
                    <input
                        type="text"
                        value=${draft}
                        onChange=${(e) => setDraft(e.target.value)}
                        onKeyDown=${(e) => { if (e.key === 'Enter') { e.preventDefault(); addItem(); } }}
                        placeholder=${field.help || 'Add item...'}
                        class="flex-1 py-2 px-3 border border-gs-200 rounded-xl text-sm text-gs-900 bg-white placeholder:text-gs-400"
                    />
                    <button
                        onClick=${addItem}
                        disabled=${!draft.trim()}
                        class="px-3 py-2 rounded-xl border border-gs-200 text-xs font-medium text-gs-600 hover:bg-gs-10 transition-colors disabled:opacity-30"
                    >Add</button>
                </div>
            </div>
        `;
    }

    if (field.type === 'color') {
        const displayValue = value ?? defaultValue ?? '';

        return h`
            <div class="field-row px-4 py-3 rounded-xl transition-colors">
                <div class="flex items-center gap-2 mb-1.5">
                    ${isOverridden ? h`<span class="override-dot" title="Overridden from default" />` : h`<span class="w-[6px] mr-[6px]" />`}
                    <label class="text-sm font-medium text-gs-800">${field.label}</label>
                </div>
                <div class="flex items-center gap-2">
                    <input
                        type="color"
                        value=${displayValue || '#000000'}
                        onChange=${(e) => onChange(field.path, e.target.value)}
                        class="w-10 h-10 rounded-lg border border-gs-200 cursor-pointer p-0.5"
                    />
                    <input
                        type="text"
                        value=${displayValue}
                        onChange=${(e) => onChange(field.path, e.target.value)}
                        placeholder=${defaultValue || 'e.g. #4F46E5'}
                        class="flex-1 py-2.5 px-3 border border-gs-200 rounded-xl text-sm text-gs-900 bg-white placeholder:text-gs-400"
                    />
                    ${displayValue ? h`
                        <div class="w-6 h-6 rounded-full border border-gs-200" style=${{ background: displayValue }} />
                    ` : null}
                </div>
            </div>
        `;
    }

    // Default: string input
    return h`
        <div class="field-row px-4 py-3 rounded-xl transition-colors">
            <div class="flex items-center gap-2 mb-1.5">
                ${isOverridden ? h`<span class="override-dot" title="Overridden from default" />` : h`<span class="w-[6px] mr-[6px]" />`}
                <label class="text-sm font-medium text-gs-800">
                    ${field.label}
                    ${field.required ? h`<span class="text-red-400 ml-0.5">*</span>` : null}
                </label>
                ${defaultValue && !value ? h`<span class="text-xs text-gs-400 ml-auto">default</span>` : null}
            </div>
            <input
                type="text"
                value=${value ?? ''}
                onChange=${(e) => onChange(field.path, e.target.value)}
                placeholder=${defaultValue || field.help || ''}
                class="w-full py-2.5 px-3 border border-gs-200 rounded-xl text-sm text-gs-900 bg-white placeholder:text-gs-400"
            />
            ${field.help ? h`<div class="text-xs text-gs-400 mt-1 pl-[18px]">${field.help}</div>` : null}
        </div>
    `;
}

function SectionCard({ section, merged, defaults, overrides, onChange, isExpanded, onToggle }) {
    const overrideCount = section.fields.filter(f => {
        const val = getNestedValue(overrides, f.path);

        return val !== undefined && val !== '';
    }).length;

    return h`
        <div class="section-card bg-white rounded-2xl border border-gs-200 overflow-hidden">
            <button
                onClick=${onToggle}
                class="w-full px-5 py-4 flex items-center justify-between hover:bg-gs-10 transition-colors"
            >
                <div class="flex items-center gap-3">
                    <span class="text-lg">${section.icon}</span>
                    <span class="font-semibold text-gs-900">${section.label}</span>
                    ${overrideCount > 0 ? h`
                        <span class="px-2 py-0.5 bg-emerald-50 text-emerald-700 text-xs font-medium rounded-full">
                            ${overrideCount} override${overrideCount > 1 ? 's' : ''}
                        </span>
                    ` : null}
                </div>
                <svg class="w-5 h-5 text-gs-400 transition-transform ${isExpanded ? 'rotate-180' : ''}" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                </svg>
            </button>
            ${isExpanded ? h`
                <div class="px-2 pb-3 border-t border-gs-100 fade-in">
                    <div class="space-y-1 mt-2">
                        ${section.fields.map(field => h`
                            <${FieldInput}
                                key=${field.path}
                                field=${field}
                                value=${getNestedValue(overrides, field.path)}
                                defaultValue=${getNestedValue(defaults, field.path)}
                                onChange=${onChange}
                            />
                        `)}
                    </div>
                </div>
            ` : null}
        </div>
    `;
}

function AssetThumb({ src, label, large }) {
    const [errored, setErrored] = useState(false);
    const isSvg = src && src.endsWith('.svg');

    if (!src) {
        return h`
            <div class="flex flex-col items-center gap-1.5">
                <div class="flex items-center justify-center rounded-xl border-2 border-dashed border-gs-200 bg-gs-50 text-gs-300 ${large ? 'w-full h-28' : 'w-16 h-16'}">
                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                    </svg>
                </div>
                <span class="text-[10px] text-gs-400 text-center leading-tight">${label}</span>
            </div>
        `;
    }

    if (errored) {
        return h`
            <div class="flex flex-col items-center gap-1.5">
                <div class="flex items-center justify-center rounded-xl border border-red-200 bg-red-50 text-red-300 ${large ? 'w-full h-28' : 'w-16 h-16'}">
                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 9v2m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                </div>
                <span class="text-[10px] text-red-400 text-center leading-tight">${label}</span>
            </div>
        `;
    }

    return h`
        <div class="flex flex-col items-center gap-1.5">
            <div class="flex items-center justify-center rounded-xl border border-gs-200 bg-white overflow-hidden ${large ? 'w-full h-28' : 'w-16 h-16'} p-1.5">
                <img
                    src=${src}
                    alt=${label}
                    onError=${() => setErrored(true)}
                    class="max-w-full max-h-full object-contain ${isSvg ? '' : 'rounded'}"
                />
            </div>
            <span class="text-[10px] text-gs-500 text-center leading-tight max-w-[80px] truncate" title=${label}>${label}</span>
        </div>
    `;
}

function BrandingPreview({ merged, activeTenant }) {
    const b = merged?.branding || {};
    const cats = b.categoryLabels || {};
    const [diskAssets, setDiskAssets] = useState([]);
    const [showAllDisk, setShowAllDisk] = useState(false);

    useEffect(() => {
        if (!activeTenant) { setDiskAssets([]); return; }

        api.get('/api/tenant/' + activeTenant + '/assets').then(setDiskAssets);
    }, [activeTenant]);

    // Resolve asset URLs: absolute URLs used as-is, relative paths proxied through server
    const resolveUrl = (url) => {
        if (!url) return null;
        if (url.startsWith('http://') || url.startsWith('https://')) return url;
        if (url.startsWith('/') && activeTenant) return '/assets/' + activeTenant + url.replace(/^\/branding\//, 'branding/');

        return activeTenant ? '/assets/' + activeTenant + '/branding/' + url : null;
    };

    // Configured branding asset URLs from the config
    const configuredAssets = [
        { key: 'textLogoUrl', label: 'Text Logo', url: b.textLogoUrl, large: true },
        { key: 'brandMarkUrl', label: 'Brand Mark', url: b.brandMarkUrl },
        { key: 'appIconUrl', label: 'App Icon', url: b.appIconUrl },
        { key: 'logoUrl', label: 'Logo', url: b.logoUrl },
        { key: 'faviconUrl', label: 'Favicon', url: b.faviconUrl },
        { key: 'desktopLoginBgUrl', label: 'Desktop BG', url: b.desktopLoginBgUrl, large: true },
        { key: 'desktopLoginBgAltUrl', label: 'Desktop BG Alt', url: b.desktopLoginBgAltUrl, large: true },
    ];

    const hasAnyConfigured = configuredAssets.some(a => a.url);

    // Group disk assets by top-level directory
    const diskGroups = useMemo(() => {
        const groups = {};

        for (const asset of diskAssets) {
            const parts = asset.path.split('/');
            const group = parts.length > 1 ? parts[0] : 'root';

            if (!groups[group]) groups[group] = [];

            groups[group].push(asset);
        }

        return groups;
    }, [diskAssets]);

    const diskGroupKeys = Object.keys(diskGroups).sort();

    return h`

                                <${AssetThumb} key=${a.key} src=${resolveUrl(a.url)} label=${a.label} />

                    <div class="text-center py-4">

                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                            </svg>
                        </div>
                        <div class="text-xs text-gs-400">No branding asset URLs configured.</div>

                    </div>
                `}
            </div>

            <!-- Disk Assets (on-disk files in environments/<tenant>/assets/) -->
            ${diskAssets.length > 0 ? h`
                <div class="preview-card rounded-2xl p-4 border border-gs-200">
                    <div class="text-xs text-gs-500 mb-2 font-medium flex items-center justify-between">

            <!-- Colors Preview -->
            ${(b.primaryColor || b.secondaryColor) ? h`
                <div class="preview-card rounded-2xl p-4 border border-gs-200">
                    <div class="text-xs text-gs-500 mb-2 font-medium">Colors</div>
                    <div class="flex gap-3">
                        ${b.primaryColor ? h`
                            <div class="flex flex-col items-center gap-1">
                                <div class="w-12 h-12 rounded-xl shadow-sm border border-gs-100" style=${{ background: b.primaryColor }} />
                                <span class="text-[10px] text-gs-500">Primary</span>
                            </div>
                        ` : null}
                        ${b.secondaryColor ? h`
                            <div class="flex flex-col items-center gap-1">
                                <div class="w-12 h-12 rounded-xl shadow-sm border border-gs-100" style=${{ background: b.secondaryColor }} />
                                <span class="text-[10px] text-gs-500">Secondary</span>
                            </div>

                    </div>
                </div>
            ` : null}

            <!-- Category Labels Preview -->
            <div class="preview-card rounded-2xl p-4 border border-gs-200">
                <div class="text-xs text-gs-500 mb-2 font-medium">Category Labels</div>
                <div class="flex flex-wrap gap-1.5">
                    <span class="px-2.5 py-1 bg-violet-100 text-violet-700 text-xs font-medium rounded-full">Achievement</span>
                    <span class="px-2.5 py-1 bg-blue-100 text-blue-700 text-xs font-medium rounded-full">${cats.learningHistory || 'Study'}</span>
                    <span class="px-2.5 py-1 bg-amber-100 text-amber-700 text-xs font-medium rounded-full">${cats.workHistory || 'Experience'}</span>
                    <span class="px-2.5 py-1 bg-emerald-100 text-emerald-700 text-xs font-medium rounded-full">${cats.accomplishment || 'Portfolio'}</span>
                    <span class="px-2.5 py-1 bg-pink-100 text-pink-700 text-xs font-medium rounded-full">${cats.socialBadge || 'Boost'}</span>
                    <span class="px-2.5 py-1 bg-sky-100 text-sky-700 text-xs font-medium rounded-full">${cats.accommodation || 'Assistance'}</span>
                </div>

            <!-- Identity Card Preview -->
            <div class="preview-card rounded-2xl p-4 border border-gs-200">
                <div class="text-xs text-gs-500 mb-2 font-medium">Identity</div>
                <div class="space-y-1.5 text-xs">
                    <div class="flex justify-between"><span class="text-gs-500">Tenant ID</span><span class="font-mono font-medium">${merged?.tenantId || '—'}</span></div>

function ActionsPanel({ activeTenant, merged, onAssetsChanged }) {
    const [logoFile, setLogoFile] = useState(null);
    const [logoPreview, setLogoPreview] = useState(null);
    const [bgColor, setBgColor] = useState('#FFFFFF');
    const [displayName, setDisplayName] = useState('');

    const [uploading, setUploading] = useState(false);
    const [generating, setGenerating] = useState(false);
    const [applying, setApplying] = useState(false);
    const [resetting, setResetting] = useState(false);
    const [actionOutput, setActionOutput] = useState(null);
    const [actionError, setActionError] = useState(null);
    const [actionSuccess, setActionSuccess] = useState(null);

    // Dev server state
    const [devStatus, setDevStatus] = useState(null);
    const [devLines, setDevLines] = useState([]);
    const [devLineCursor, setDevLineCursor] = useState(0);
    const [devStarting, setDevStarting] = useState(false);
    const [devStopping, setDevStopping] = useState(false);
    const [netlifyMode, setNetlifyMode] = useState(false);
    const devLogRef = useRef(null);

    const fileInputRef = useRef(null);

    // Auto-populate display name from merged config
    useEffect(() => {
        if (merged?.branding?.name && !displayName) {
            setDisplayName(merged.branding.name);
        }
    }, [merged?.branding?.name]);

    // Auto-populate bg color from merged config
    useEffect(() => {
        if (merged?.branding?.primaryColor && bgColor === '#FFFFFF') {
            setBgColor(merged.branding.primaryColor);
        }
    }, [merged?.branding?.primaryColor]);

    const handleFileSelect = (e) => {
        const file = e.target.files?.[0];

        if (!file) return;

        setLogoFile(file);

        const reader = new FileReader();

        reader.onload = () => setLogoPreview(reader.result);
        reader.readAsDataURL(file);
    };

    const clearStatus = () => {
        setActionOutput(null);
        setActionError(null);
        setActionSuccess(null);
    };

    const handleUploadAndGenerate = async () => {
        if (!logoFile || !activeTenant) return;

        clearStatus();

        // Step 1: Upload logo
        setUploading(true);

        try {
            const reader = new FileReader();
            const base64 = await new Promise((resolve) => {
                reader.onload = () => resolve(reader.result.split(',')[1]);
                reader.readAsDataURL(logoFile);
            });

            const ext = logoFile.name.split('.').pop() || 'png';

            const uploadResult = await api.post('/api/actions/upload-logo', {
                tenant: activeTenant,
                filename: 'logo.' + ext,
                data: base64,
            });

            if (!uploadResult.saved) {
                setActionError('Failed to upload logo');
                setUploading(false);
                return;
            }
        } catch (err) {
            setActionError('Upload failed: ' + String(err));
            setUploading(false);
            return;
        }

        setUploading(false);

        // Step 2: Generate assets
        setGenerating(true);

        try {
            const result = await api.post('/api/actions/generate-assets', {
                tenant: activeTenant,
                bgColor,
                name: displayName || undefined,
            });

            setActionOutput(result.output);

            if (result.exitCode === 0) {
                setActionSuccess('Assets generated successfully!');

                if (onAssetsChanged) onAssetsChanged();
            } else {
                setActionError('Asset generation failed (exit code ' + result.exitCode + ')');
            }
        } catch (err) {
            setActionError('Generation failed: ' + String(err));
        }

        setGenerating(false);
    };

    const handleApplyConfig = async () => {
        if (!activeTenant) return;

        clearStatus();
        setApplying(true);

        try {
            const result = await api.post('/api/actions/apply-config', { tenant: activeTenant });

            setActionOutput(result.output);

            if (result.exitCode === 0) {
                setActionSuccess('Config applied for ' + activeTenant);
            } else {
                setActionError('Apply failed (exit code ' + result.exitCode + ')');
            }
        } catch (err) {
            setActionError('Apply failed: ' + String(err));
        }

        setApplying(false);
    };

    const handleReset = async () => {
        clearStatus();
        setResetting(true);

        try {
            const result = await api.post('/api/actions/reset-config', {});

            setActionOutput(result.output);

            if (result.exitCode === 0) {
                setActionSuccess('Config reset complete. Run prepare-native-config to restore a tenant.');
            } else {
                setActionError('Reset failed (exit code ' + result.exitCode + ')');
            }
        } catch (err) {
            setActionError('Reset failed: ' + String(err));
        }

        setResetting(false);
    };

    // --- Dev server polling ---
    const isDevActive = devStatus?.active && (devStatus.phase === 'preparing' || devStatus.phase === 'starting' || devStatus.phase === 'running');

    useEffect(() => {
        // Poll for dev server status
        let timer = null;

        const poll = async () => {
            try {
                const status = await api.get('/api/actions/dev-server/status?since=' + devLineCursor);

                setDevStatus(status);

                if (status.active && status.lines?.length > 0) {
                    setDevLines(prev => [...prev, ...status.lines]);
                    setDevLineCursor(status.totalLines);

                    // Auto-scroll log
                    requestAnimationFrame(() => {
                        if (devLogRef.current) {
                            devLogRef.current.scrollTop = devLogRef.current.scrollHeight;
                        }
                    });
                }
            } catch { /* ignore poll errors */ }
        };

        poll();

        // Poll faster when actively running, slower otherwise
        timer = setInterval(poll, isDevActive ? 1500 : 5000);

        return () => clearInterval(timer);
    }, [devLineCursor, isDevActive]);

    const handleDevStart = async () => {
        if (!activeTenant) return;

        setDevStarting(true);
        setDevLines([]);
        setDevLineCursor(0);

        try {
            await api.post('/api/actions/dev-server/start', { tenant: activeTenant, netlify: netlifyMode });
        } catch (err) {
            setActionError('Failed to start dev server: ' + String(err));
        }

        setDevStarting(false);
    };

    const handleDevStop = async () => {
        setDevStopping(true);

        try {
            await api.post('/api/actions/dev-server/stop', {});
        } catch (err) {
            setActionError('Failed to stop dev server: ' + String(err));
        }

        setDevStopping(false);
    };

    const formatUptime = (ms) => {
        if (!ms) return '0s';

        const secs = Math.floor(ms / 1000);

        if (secs < 60) return secs + 's';

        const mins = Math.floor(secs / 60);
        const remSecs = secs % 60;

        if (mins < 60) return mins + 'm ' + remSecs + 's';

        const hrs = Math.floor(mins / 60);

        return hrs + 'h ' + (mins % 60) + 'm';
    };

    const phaseConfig = {
        preparing: { label: 'Preparing', color: 'bg-amber-100 text-amber-700', dot: 'bg-amber-400 animate-pulse' },
        starting:  { label: 'Starting',  color: 'bg-blue-100 text-blue-700',   dot: 'bg-blue-400 animate-pulse' },
        running:   { label: 'Running',   color: 'bg-emerald-100 text-emerald-700', dot: 'bg-emerald-400' },
        stopped:   { label: 'Stopped',   color: 'bg-gs-100 text-gs-600',       dot: 'bg-gs-400' },
        error:     { label: 'Error',     color: 'bg-red-100 text-red-700',     dot: 'bg-red-400' },
    };

    return h`
        <div class="space-y-5">
            <h3 class="text-sm font-semibold text-gs-700 uppercase tracking-wider">Dev Actions</h3>

            <!-- Dev Server Monitor -->
            <div class="space-y-3">
                <div class="text-xs font-semibold text-gs-600 uppercase tracking-wider flex items-center gap-2">
                    <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">

// ─── Main App ────────────────────────────────────────────────────────────────

function App() {
    const [tenants, setTenants] = useState([]);
    const [activeTenant, setActiveTenant] = useState(null);
    const [defaults, setDefaults] = useState({});
    const [overrides, setOverrides] = useState({});
    const [merged, setMerged] = useState({});
    const [validationErrors, setValidationErrors] = useState([]);
    const [expandedSections, setExpandedSections] = useState(new Set(['general', 'branding']));
    const [saving, setSaving] = useState(false);
    const [saveStatus, setSaveStatus] = useState(null);
    const [rightTab, setRightTab] = useState('preview');
    const [newTenantName, setNewTenantName] = useState('');
    const [showNewTenant, setShowNewTenant] = useState(false);
    const [assetsVersion, setAssetsVersion] = useState(0);
    const [rightWidth, setRightWidth] = useState(320);
    const isResizing = useRef(false);
    const debounceRef = useRef(null);

    // Right sidebar resize
    const handleResizeStart = useCallback((e) => {
        e.preventDefault();
        isResizing.current = true;

        const startX = e.clientX;
        const startW = rightWidth;

        const onMove = (ev) => {
            if (!isResizing.current) return;

            const delta = startX - ev.clientX;
            const newW = Math.min(Math.max(startW + delta, 280), 800);

            setRightWidth(newW);
        };

        const onUp = () => {
            isResizing.current = false;
            document.removeEventListener('mousemove', onMove);
            document.removeEventListener('mouseup', onUp);
            document.body.style.cursor = '';
            document.body.style.userSelect = '';
        };

        document.body.style.cursor = 'col-resize';
        document.body.style.userSelect = 'none';
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onUp);
    }, [rightWidth]);

    // Load initial data
    useEffect(() => {
        api.get('/api/defaults').then(setDefaults);
        api.get('/api/tenants').then(setTenants);
    }, []);

    // Load tenant config
    const loadTenant = useCallback(async (name) => {
        setActiveTenant(name);
        setSaveStatus(null);

        const data = await api.get('/api/tenant/' + name);

        setOverrides(data.overrides);
        setMerged(data.merged);
        setValidationErrors([]);
    }, []);

    // Deep merge overrides onto defaults for preview
    const recomputeMerged = useCallback((newOverrides) => {
        const deepMergeLocal = (base, over) => {
            const result = { ...base };

            for (const key of Object.keys(over)) {
                const bv = base[key];
                const ov = over[key];

                if (bv && ov && typeof bv === 'object' && !Array.isArray(bv) && typeof ov === 'object' && !Array.isArray(ov)) {
                    result[key] = deepMergeLocal(bv, ov);
                } else {
                    result[key] = ov;
                }
            }

            return result;
        };

        return deepMergeLocal(defaults, newOverrides);
    }, [defaults]);

    // Validate with debounce
    const validateDebounced = useCallback((overridesToValidate) => {
        if (debounceRef.current) clearTimeout(debounceRef.current);

        debounceRef.current = setTimeout(async () => {
            const result = await api.post('/api/validate', overridesToValidate);

            setValidationErrors(result.errors || []);
        }, 300);
    }, []);

    // Handle field change
    const handleChange = useCallback((path, value) => {
        setOverrides(prev => {
            const next = setNestedValue(prev, path, value);
            const newMerged = recomputeMerged(next);

            setMerged(newMerged);
            validateDebounced(next);
            setSaveStatus(null);

            return next;
        });
    }, [recomputeMerged, validateDebounced]);

    // Save
    const handleSave = useCallback(async () => {
        if (!activeTenant) return;

        setSaving(true);

        try {
            const result = await api.put('/api/tenant/' + activeTenant, { overrides });

            if (result.saved) {
                setSaveStatus('saved');
                api.get('/api/tenants').then(setTenants);
            } else {
                setSaveStatus('error');
                setValidationErrors(result.errors || ['Unknown error']);
            }
        } catch {
            setSaveStatus('error');
        }

        setSaving(false);
    }, [activeTenant, overrides]);

    // Create new tenant
    const handleCreateTenant = useCallback(async () => {
        const name = newTenantName.trim().toLowerCase().replace(/[^a-z0-9_-]/g, '');

        if (!name) return;

        await api.put('/api/tenant/' + name, {
            overrides: { tenantId: name, domain: name + '.app' }
        });

        setNewTenantName('');
        setShowNewTenant(false);

        const list = await api.get('/api/tenants');

        setTenants(list);
        loadTenant(name);
    }, [newTenantName, loadTenant]);

    // Toggle section
    const toggleSection = useCallback((key) => {
        setExpandedSections(prev => {
            const next = new Set(prev);

            if (next.has(key)) next.delete(key);
            else next.add(key);

            return next;
        });
    }, []);

    const overrideCount = useMemo(() => {
        const count = (obj) => {
            let n = 0;

            for (const v of Object.values(obj || {})) {
                if (v && typeof v === 'object' && !Array.isArray(v)) n += count(v);
                else if (v !== undefined && v !== '') n++;
            }

            return n;
        };

        return count(overrides);
    }, [overrides]);

    return h`
        <div class="h-screen flex flex-col">
            <!-- Top bar -->
            <header class="h-14 bg-white border-b border-gs-200 flex items-center justify-between px-5 flex-shrink-0">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 bg-gradient-to-br from-violet-500 to-indigo-600 rounded-lg flex items-center justify-center">
                        <svg class="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                        </svg>
                    </div>

                    <a href="/" class="text-xs font-medium text-gs-400 hover:text-gs-700 transition-colors flex items-center gap-1">
                        <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
                        </svg>
                        Home
                    </a>

                    ${activeTenant ? h`
                        <span class="text-gs-400 mx-1">/</span>
                        <span class="font-medium text-gs-700">${activeTenant}</span>
                        ${overrideCount > 0 ? h`
                            <span class="px-2 py-0.5 bg-emerald-50 text-emerald-700 text-xs font-medium rounded-full">
                                ${overrideCount} override${overrideCount > 1 ? 's' : ''}
                            </span>
                        ` : null}
                    ` : null}
                </div>
                <div class="flex items-center gap-3">
                    ${validationErrors.length === 0 && activeTenant ? h`
                        <div class="flex items-center gap-1.5 text-emerald-600">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                            </svg>
                            <span class="text-xs font-medium">Valid</span>
                        </div>
                    ` : null}
                    ${validationErrors.length > 0 ? h`
                        <div class="flex items-center gap-1.5 text-red-500">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                            </svg>
                            <span class="text-xs font-medium">${validationErrors.length} error${validationErrors.length > 1 ? 's' : ''}</span>
                        </div>
                    ` : null}
                    ${activeTenant ? h`
                        <button
                            onClick=${handleSave}
                            disabled=${saving || validationErrors.length > 0}
                            class="pill px-4 py-2 bg-gs-900 text-white text-sm font-medium hover:opacity-90 transition-opacity disabled:opacity-40 disabled:cursor-not-allowed flex items-center gap-2"
                        >
                            ${saving ? h`<span class="w-3.5 h-3.5 border-2 border-white/30 border-t-white rounded-full animate-spin" />` : null}
                            ${saving ? 'Saving...' : saveStatus === 'saved' ? 'Saved!' : 'Save Config'}
                        </button>
                    ` : null}
                </div>
            </header>

            <div class="flex flex-1 overflow-hidden">
                <!-- Sidebar: tenant list -->
                <aside class="w-56 bg-white border-r border-gs-200 flex flex-col flex-shrink-0">
                    <div class="p-3 border-b border-gs-100">
                        <div class="text-xs font-semibold text-gs-500 uppercase tracking-wider mb-2 px-2">Tenants</div>
                        <div class="space-y-0.5">
                            ${tenants.map(t => h`
                                <button
                                    key=${t.name}
                                    onClick=${() => loadTenant(t.name)}
                                    class="w-full text-left px-3 py-2 rounded-xl text-sm transition-colors flex items-center justify-between group
                                        ${activeTenant === t.name ? 'bg-gs-900 text-white' : 'text-gs-700 hover:bg-gs-50'}"
                                >
                                    <span class="font-medium">${t.name}</span>
                                    <div class="flex items-center gap-1.5">
                                        ${t.hasConfig ? h`
                                            <span class="w-1.5 h-1.5 rounded-full ${activeTenant === t.name ? 'bg-emerald-400' : 'bg-emerald-500'}" title="Has config" />
                                        ` : null}
                                        ${t.hasAssets ? h`
                                            <span class="w-1.5 h-1.5 rounded-full ${activeTenant === t.name ? 'bg-violet-400' : 'bg-violet-500'}" title="Has assets" />
                                        ` : null}
                                    </div>
                                </button>
                            `)}
                        </div>
                    </div>
                    <div class="p-3">
                        ${showNewTenant ? h`
                            <div class="space-y-2 fade-in">
                                <input
                                    type="text"
                                    value=${newTenantName}
                                    onChange=${(e) => setNewTenantName(e.target.value)}
                                    onKeyDown=${(e) => e.key === 'Enter' && handleCreateTenant()}
                                    placeholder="tenant-name"
                                    class="w-full py-2 px-3 border border-gs-200 rounded-xl text-sm text-gs-900 bg-white placeholder:text-gs-400"
                                    autoFocus
                                />
                                <div class="flex gap-2">
                                    <button
                                        onClick=${handleCreateTenant}
                                        class="flex-1 pill py-1.5 bg-gs-900 text-white text-xs font-medium"
                                    >Create</button>
                                    <button
                                        onClick=${() => { setShowNewTenant(false); setNewTenantName(''); }}
                                        class="flex-1 pill py-1.5 border border-gs-300 text-gs-700 text-xs font-medium"
                                    >Cancel</button>
                                </div>
                            </div>
                        ` : h`
                            <button
                                onClick=${() => setShowNewTenant(true)}
                                class="w-full pill py-2 border border-dashed border-gs-300 text-gs-500 text-sm font-medium hover:border-gs-400 hover:text-gs-700 transition-colors"
                            >+ New Tenant</button>
                        `}
                    </div>
                </aside>

                ${activeTenant ? h`
                    <!-- Editor: sections -->
                    <main class="flex-1 overflow-y-auto p-6 scrollbar-thin">
                        <div class="max-w-2xl mx-auto space-y-3">
                            ${SECTIONS.map(section => h`
                                <${SectionCard}
                                    key=${section.key}
                                    section=${section}
                                    merged=${merged}
                                    defaults=${defaults}
                                    overrides=${overrides}
                                    onChange=${handleChange}
                                    isExpanded=${expandedSections.has(section.key)}
                                    onToggle=${() => toggleSection(section.key)}
                                />
                            `)}
                        </div>
                    </main>

                    <!-- Right panel: preview + JSON -->
                    <aside class="bg-white border-l border-gs-200 flex flex-col flex-shrink-0 overflow-hidden relative" style=${{ width: rightWidth + 'px' }}>
                        <!-- Resize handle -->
                        <div
                            onMouseDown=${handleResizeStart}
                            class="absolute left-0 top-0 bottom-0 w-1.5 cursor-col-resize z-10 hover:bg-violet-400/30 active:bg-violet-400/50 transition-colors"
                        />
                        <div class="flex border-b border-gs-100">
                            <button
                                onClick=${() => setRightTab('preview')}
                                class="flex-1 py-3 text-sm font-medium transition-colors
                                    ${rightTab === 'preview' ? 'text-gs-900 border-b-2 border-gs-900' : 'text-gs-400 hover:text-gs-700'}"
                            >Preview</button>
                            <button
                                onClick=${() => setRightTab('json')}
                                class="flex-1 py-3 text-sm font-medium transition-colors
                                    ${rightTab === 'json' ? 'text-gs-900 border-b-2 border-gs-900' : 'text-gs-400 hover:text-gs-700'}"
                            >JSON</button>
                            <button
                                onClick=${() => setRightTab('actions')}
                                class="flex-1 py-3 text-sm font-medium transition-colors
                                    ${rightTab === 'actions' ? 'text-gs-900 border-b-2 border-gs-900' : 'text-gs-400 hover:text-gs-700'}"
                            >Actions</button>
                        </div>
                        <div class="flex-1 overflow-y-auto p-4 scrollbar-thin">
                            ${rightTab === 'preview'
                                ? h`<${BrandingPreview} merged=${merged} activeTenant=${activeTenant} key=${'bp-' + assetsVersion} />`
                                : rightTab === 'actions'
                                ? h`<${ActionsPanel} activeTenant=${activeTenant} merged=${merged} onAssetsChanged=${() => setAssetsVersion(v => v + 1)} />`
                                : h`<${JsonPanel} overrides=${overrides} validationErrors=${validationErrors} />`
                            }
                        </div>
                    </aside>
                ` : h`
                    <!-- Empty state -->
                    <main class="flex-1 flex items-center justify-center">
                        <div class="text-center space-y-3">
                            <div class="w-16 h-16 mx-auto bg-gs-100 rounded-2xl flex items-center justify-center">
                                <svg class="w-8 h-8 text-gs-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
                                </svg>
                            </div>
                            <div>
                                <h2 class="text-lg font-semibold text-gs-900">Select a tenant</h2>
                                <p class="text-sm text-gs-500 mt-1">Choose a tenant from the sidebar or create a new one.</p>
                            </div>
                        </div>
                    </main>
                `}
            </div>
        </div>
    `;
}

// ─── Mount ───────────────────────────────────────────────────────────────────

const root = createRoot(document.getElementById('root'));
root.render(h`<${App} />`);
    </script>
</body>
</html>
