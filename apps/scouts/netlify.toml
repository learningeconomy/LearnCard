#############################################
##  Configuration for Netlify deployments  ##
#############################################

[build.environment]
BUN_VERSION = "1.3.14"
SKIP_DIDKIT_NAPI = "1"
# Global Context Default
[build]
command = "bunx nx build scouts --skip-nx-cache"
publish = "build/"

# Netlify Deploy Preview (still built by Netlify's git integration for PRs)
[context.deploy-preview]
environment = { NODE_ENV = 'staging', VITE_NODE_ENV = "staging-learncardapp", NETLIFY_BUILD_TYPE = "deploy-preview", SENTRY_ENV="scouts-deploy-preview", SENTRY_DSN='https://68210fb71359458b9746c55cf5f545b4@o246842.ingest.us.sentry.io/4505432118984704'  }

# Production Scouts is deployed from CI via `netlify deploy --prod --no-build`, keyed off
# the scout-app-production GitHub Environment's NETLIFY_SITE_ID (see deploy.yml). Build-time
# env is supplied by the CI "Build App" step, so no production build context is needed here.


###################################
#      Redirects + Headers        #
###################################
# Redirects and headers are GLOBAL for all builds. For context-specific
# rules, use _headers or _redirects files, which are PER-DEPLOY.

[[redirects]] # For use with SPAs that handle routing internally
from = "/*"
to = "/index.html"
status = 200

[redirects.headers]
X-From = "Netlify"

# Edge Handler declaration
[[edge_handlers]]
path = "/*"
handler = "filterRequests"


[[headers]]
for = "/.well-known/apple-app-site-association"
[headers.values]
Cache-Control = "public, max-age=0"
Content-Type = "application/json"
X-Content-Type-Options = "nosniff"

[[headers]]
for = "/manifest.json"
[headers.values]
Access-Control-Allow-Origin = "*"

[[headers]]
for = "/*"
[headers.values]
Access-Control-Allow-Origin = "*"

[[headers]]
for = "/assets/icon/icon.png"
[headers.values]
Access-Control-Allow-Origin = "*"

[[headers]]
for = "/assets/icon/favicon.png"
[headers.values]
Access-Control-Allow-Origin = "*"

[[headers]]
  for = "/assets/*.wasm"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
